culty":"High","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"puns; fast stepping forward; concise jokes","tags":"Short Form, High, puns, fast stepping forward, concise jokes, audience","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["puns","fast stepping forward","concise jokes"],"tags":["Short Form","High","puns","fast stepping forward","concise jokes","audience"],"roles":["Player 1","Player 2","Player 3","Player 4","Player 5"],"introScript":"Our next game is called Oh Waiter. It's for all [number] players.\n\nTo get us started, may I please have (audience get).\n\n[Confirm get.]\n\n[Game starts.]","fullMarkdown":"**Skills**\npuns; fast stepping forward; concise jokes\n\n**Rules**\nOne player sits in a chair as the restaurant patron. The rest stand in a line.\n\nThe audience provides a suggestion. The seated player says: \"Oh Waiter! There is a [suggestion] in my soup.\"\n\nA player steps forward from the line and delivers a joke or pun based on the suggestion.\n\nThat player takes the seat; the previous patron returns to the line. Repeat.\n\nExample:\n- Patron: \"Oh Waiter! There is a piano in my soup.\"\n- Waiter steps forward: \"Sorry about that — it must have been a key ingredient.\"\n\n**Success Looks Like**\nPlayers step forward quickly without waiting for the perfect pun; the game keeps a fast, even rhythm; the audience rewards speed and commitment over cleverness.\n\n**For Students**\nA bad pun delivered with confidence beats a great pun delivered late. Step forward on \"good enough.\"\n\nDon't undercut yourself after the joke — deliver it and move.\n\nAssociation paths when you're stuck: sound-alike words, category, famous phrase, object function, literal visual image.\n\n**For Teachers**\nThe game breaks down when players hang back. Hesitation is the failure mode, not weak puns.\n\nIf a small number of players are carrying the game, name it and redistribute.\n\nStrong support players — ones who step forward to protect tempo — are the backbone of this game even if they're not the best pun-makers.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Oh Waiter","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"ef9fffbd47210a2e"}},{"id":"sit-stand-lay","name":"Sit, Stand, Lay","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Force physical awareness during scene work; Encourage players to justify movement and position changes.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Three players","minimumPlayers":"3","maximumPlayers":"3","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"Yes","propsMaterialsNeeded":"Chairs/bench optional; clear floor space","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"physical awareness; justification; ensemble adjustment","tags":"Short Form, Medium-High, physical awareness, justification, ensemble adjustment","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["physical awareness","justification","ensemble adjustment"],"tags":["Short Form","Medium-High","physical awareness","justification","ensemble adjustment"],"fullMarkdown":"**Skills**\nphysical awareness; justification; ensemble adjustment\n\n**Rules**\nThree players perform a scene. At all times: one player must be sitting, one standing, one laying down.\n\nWhen any player changes position, the others must adjust immediately to restore the required distribution.\n\nPosition changes should be justified within the scene — not treated as arbitrary mechanics.\n\n**Success Looks Like**\nPosition changes feel motivated by the scene — emotion, status, environment — not just rule-keeping; the constraint increases energy rather than replacing scene work.\n\n**For Students**\nMake every position change a gift to the scene — collapse from grief, stand to assert status, lie down to surrender or hide.\n\nKeep positions visually clear for the audience. Ambiguous postures create confusion.\n\nDon't freeze to avoid disrupting the pattern. Moving is the game.\n\n**For Teachers**\nCommon failure: players watch the rule so tightly they stop listening emotionally and the scene goes flat.\n\nIf one player is driving all movement while others passively react, redirect ownership to the whole ensemble.\n\nPush players to use position changes to affect relationship and stakes — not just to comply with the rule.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Sit, Stand, Lay","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"4976c1225c923107"}},{"id":"lines-from-a-box","name":"Lines from a Box","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Force players to justify unexpected text; Practice incorporation of audience-generated offers.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Usually 2; occasionally 3","minimumPlayers":"2","maximumPlayers":"3","requiresHost":"Maybe / format-dependent","requiresAudience":"Yes","requiresProps":"Yes","propsMaterialsNeeded":"Box/hat/bucket; audience-written slips","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"justification; audience line integration; scene continuity","tags":"Short Form, High, justification, audience line integration, scene continuity, audience","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["justification","audience line integration","scene continuity"],"tags":["Short Form","High","justification","audience line integration","scene continuity","audience"],"roles":["Host","Player 1","Player 2","Player 3","Player 4"],"fullMarkdown":"**Skills**\njustification; audience line integration; scene continuity\n\n**Rules**\n- Two to three players perform a scene.\n- Before the game begins, audience members write lines of dialogue on slips of paper.\n- The slips are placed in a box, hat, bucket, or similar container.\n- During the scene, players periodically draw a line from the box.\n- The drawn line must be read aloud and incorporated into the scene.\n- Players should justify the line as if it naturally belongs in the scene.\n- The scene should still be a good scene, not just a sequence of random line readings.\n- Players continue until the scene is edited, reaches a button, or the host ends the game.\n\n**For Students**\n- The scene must matter before the line matters.\n- Players should build a clear who/what/where early so the random lines have something to disrupt.\n- Justify the line through:\n  - emotional reaction,\n  - relationship history,\n  - status,\n  - confession,\n  - misunderstanding,\n  - metaphor,\n  - memory,\n  - threat,\n  - secret,\n  - or sudden revelation.\n- Do not apologize for a strange line.\n- Read the line clearly, then immediately make it true.\n- The best use of a line often changes the relationship, not just the topic.\n- Players should not over-explain every line; a strong emotional commitment can justify more than logic.\n- Use the line as fuel, then return to scene work.\n\n**For Teachers**\n- Players treat the lines as interruptions instead of offers.\n- The scene becomes only about the written lines.\n- Players stop building relationship or situation between line pulls.\n- Players laugh at or comment on the line instead of justifying it.\n- Players draw lines too frequently, preventing the scene from developing.\n- Players wait too long to draw lines, making the game mechanic disappear.\n- The line is read without commitment or emotional point of view.\n- Players force a literal interpretation when a looser emotional or metaphorical justification would work better.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Lines from a Box","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"9c5a2d51c3414976"}},{"id":"home-shopping-network-hsn","name":"Home Shopping Network / HSN","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice guessing out loud under pressure; Practice charades-based support.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common Variation / Guessing Game","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Five players","minimumPlayers":"5","maximumPlayers":"5","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"High","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"guessing; charades; producer pacing; salesmanship","tags":"Short Form, High, guessing, charades, producer pacing, salesmanship, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["guessing","charades","producer pacing","salesmanship"],"tags":["Short Form","High","guessing","charades","producer pacing","salesmanship","audience","host"],"roles":["Producer","Host 1","Host 2","Intern 1","Intern 2"],"fullMarkdown":"**Skills**\nguessing; charades; producer pacing; salesmanship\n\n**Rules**\n- Five players participate.\n- One player acts as the producer or game introducer.\n- Two players are the home shopping hosts.\n- Two players are interns who will silently assist the hosts.\n- The producer introduces the game and sends the two host players out of the room.\n- The producer then gets audience suggestions for three products.\n- Each product has:\n  - an item,\n  - a unique ability or characteristic,\n  - a celebrity endorser.\n- The host players are called back into the room.\n- The producer tells the hosts that the teleprompters are down, but the two interns will help them with their lines.\n- The show then goes live with a countdown: “3…2…1.”\n- The interns play charades to help the hosts guess what they are selling.\n- The producer calls “Camera 1” or “Camera 2” to determine which intern is actively giving charades clues.\n- The producer may switch cameras to change clue-givers, create rhythm, or rescue a stalled clue path.\n- The hosts attempt to identify each item, its unique ability or characteristic, and its celebrity endorser.\n- The audience snaps when the hosts are close.\n- The audience claps when the hosts correctly guess something.\n- If the hosts are stuck, the producer may “go to commercial” and give the hosts a verbal tip.\n- The game continues until the hosts identify the required information or the producer ends the game.\n\n**For Students**\n- Silence is failure; wrong guesses are part of the game.\n- Hosts should guess constantly and broadly:\n  - category,\n  - size,\n  - material,\n  - function,\n  - setting,\n  - emotion,\n  - celebrity type,\n  - famous roles,\n  - rhyming or sound-alike clues.\n- Interns should change tactics when a clue does not work.\n- Charades should be large, specific, and repeated only when it is clearly helping.\n- Hosts should remain cheerful, promotional, and committed to the broadcast even while confused.\n- The home shopping frame gives the hosts permission to over-sell partial guesses.\n- Audience snaps and claps are part of the information system; players should listen to them.\n- The producer should use camera switches actively, not passively.\n- Camera switches should help manage rhythm, reset unclear charades, and distribute support between the interns.\n- Commercial breaks should be used as rescue tools, not as the main guessing mechanism.\n- The producer should give tips that narrow the search without solving the answer for the hosts.\n- The best versions keep the energy of a real sales pitch while the hosts slowly discover the truth.\n- Interns should separate the clue targets: item, characteristic, and celebrity endorser.\n- The producer should choose audience suggestions that are specific and playable, but not impossible.\n- The producer needs judgment, not just confidence.\n- A strong producer watches four things at once:\n  - whether the hosts are still guessing,\n  - whether the interns’ charades are readable,\n  - whether the audience is still engaged,\n  - whether the current clue path needs a camera switch or commercial break.\n- Weak producers either under-intervene and let the game stall, or over-intervene and rob the hosts of the discovery.\n- The best producer keeps the game moving while preserving the illusion that the hosts are figuring it out live.\n\n**For Teachers**\n- Hosts stop guessing and wait silently for perfect clues.\n- Interns repeat unclear charades instead of changing tactics.\n- Hosts fail to use audience snaps and claps as feedback.\n- Players get stuck on one part of the product and lose momentum.\n- Interns act out the item but not the unique characteristic or celebrity endorser.\n- Hosts guess too narrowly too early instead of using broad category guesses.\n- The game becomes slow if the hosts are afraid of being wrong.\n- Interns become frantic and physically unclear.\n- The producer forgets to switch cameras, leaving one intern trapped in a failing clue path.\n- The producer goes to commercial too late, after the audience has already felt the stall.\n- The producer gives too much away during a commercial break.\n- The scene frame collapses and players stop behaving like a home shopping broadcast.\n- The products become too complicated for the hosts to reasonably guess.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Home Shopping Network / HSN","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"faabde0c3f619629"}},{"id":"alphabet-game","name":"Alphabet Game","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice scene work under a verbal constraint; Train players to maintain relationship and situation while tracking an external rule.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Two players","minimumPlayers":"2","maximumPlayers":"2","requiresHost":"Maybe / format-dependent","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"alphabet tracking; constrained scene work; recovery","tags":"Short Form, Medium-High, alphabet tracking, constrained scene work, recovery, audience","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["alphabet tracking","constrained scene work","recovery"],"tags":["Short Form","Medium-High","alphabet tracking","constrained scene work","recovery","audience"],"roles":["Player 1","Player 2"],"introScript":"For our next game, [Player 1] and [Player 2] are going to do a scene — but every time they speak, the first word has to start with the next letter of the alphabet.\n\nTo get us started, may I please have (a letter from someone's name in the audience).\n\n[Confirm get.]\n\nThis is the Alphabet Game.","fullMarkdown":"**Skills**\nalphabet tracking; constrained scene work; recovery\n\n**Rules**\n- Two players perform a scene. The audience gives a suggestion used to pick the starting letter.\n- Each time a player speaks, their first word must start with the next letter of the alphabet. A player may use multiple sentences in a single turn — only the first word of that turn must carry the letter. Players cycle through the full alphabet back to the starting letter.\n- The scene should still be coherent — the alphabet is the constraint, not the content.\n\n**Success Looks Like**\nPlayers stay in the scene while tracking the alphabet; lines start cleanly and quickly; difficult letters (Q, X, Z) land without killing the momentum.\n\n**For Students**\n- Establish who, what, and where early — the scene needs something to ride on as the constraint tightens.\n- A simple, clear line fast beats a clever line slow. Names, commands, and exclamations are fair game.\n- Hard letters have go-to openers: \"Quick…\", \"Xavier…\", \"You…\", \"Zero chance…\" — have them ready.\n\n**For Teachers**\n- Players who struggle here are usually splitting their attention between the alphabet and the scene — the goal is to reduce the cognitive load of the alphabet so they can stay present.\n- Watch for scenes that flatten to just letter-hunting. Coach players to advance the relationship, not just survive the constraint.\n- Missed letters: recover and keep moving unless the format requires correction.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Alphabet Game","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"23a2ce29c2501b1c"}},{"id":"duets","name":"Duets","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice paired verbal coordination; Practice salesmanship and product invention.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Unknown; possible common variation or Flying Pig house variant","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Five players","minimumPlayers":"5","maximumPlayers":"5","requiresHost":"Functionally yes — shopper role controls structure","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Paired verbal coordination; product invention; salesmanship; one-voice support; jingle payoff","coreSkills":"paired speaking; sales pitch; hosting; rhythm","tags":"Short Form, High, paired speaking, sales pitch, hosting, rhythm, audience, host","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["paired speaking","sales pitch","hosting","rhythm"],"tags":["Short Form","High","paired speaking","sales pitch","hosting","rhythm","audience","host"],"fullMarkdown":"**Skills**\npaired speaking; sales pitch; hosting; rhythm\n\n**Rules**\n- Five players participate.\n- One player is the shopper.\n- Four players are divided into two pairs.\n- Each pair represents a rival company.\n- The shopper asks the audience for a product or thing they are shopping for.\n- The shopper then asks each duet pair for its company name.\n- The shopper asks each duet what makes its product special.\n- The shopper asks each duet two to three follow-up questions.\n- The duets may occasionally cross-talk or respond to each other.\n- One duet pair speaks every other word.\n- The other duet pair speaks at the same time.\n- The finale is usually the shopper asking each duet for its jingle.\n- After hearing the pitches and jingles, the shopper picks a winner.\n\n**For Students**\n- The shopper should make the structure easy for the duets.\n- Good shopper questions are specific enough to create usable answers:\n  - “What makes your version safer?”\n  - “Why is your product better for families?”\n  - “What happens if I use it incorrectly?”\n  - “Who should never buy this?”\n  - “What celebrity uses your product?”\n- The every-other-word pair should favor simple sentence construction.\n- The simultaneous-speaking pair should choose bold obvious answers rather than subtle ones.\n- In simultaneous speech, matching energy and direction matters more than exact wording.\n- A strong partner in the simultaneous duet can help by physically and vocally committing early, giving the other player something to join.\n- Duets should build product identity early so the jingle has something to summarize.\n- The shopper should heighten the rivalry without making the duets fight for airtime chaotically.\n- The winning choice should feel like a button or payoff, not just an administrative ending.\n\n**For Teachers**\n- The every-other-word duet becomes grammatically tangled.\n- The simultaneous-speaking duet fails because one partner leads too passively or too aggressively.\n- A passive partner makes the simultaneous duet nearly impossible to coordinate.\n- Players focus so hard on the speech mechanic that the product pitch becomes vague.\n- The shopper asks questions that are too broad, too complex, or not useful.\n- The shopper does not balance time between the two companies.\n- The companies do not differentiate themselves enough.\n- The duets forget to sell the product and only play the mechanic.\n- Cross-talk becomes muddy rather than competitive.\n- Jingles become hesitant because the duet has not established a clear product identity.\n- The game stalls if the shopper does not actively manage pacing.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Duets","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"bd500696ba660a16"}},{"id":"master-debater","name":"Master Debater","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice fast verbal justification; Practice committing to absurd arguments.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common Short Form / Possible House Variant","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Judge plus line of debaters","minimumPlayers":"4","maximumPlayers":"Large group","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"rhetorical confidence; objection; justification; tangent control","tags":"Short Form, High, rhetorical confidence, objection, justification, tangent control, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["rhetorical confidence","objection","justification","tangent control"],"tags":["Short Form","High","rhetorical confidence","objection","justification","tangent control","audience","host"],"roles":["Host / Moderator","Debater 1","Debater 2"],"fullMarkdown":"**Skills**\nrhetorical confidence; objection; justification; tangent control\n\n**Rules**\n- One player serves as the judge.\n- The other players stand in a line.\n- The judge introduces the game and asks the audience for a topic.\n- One player steps forward and begins making a case on the topic.\n- At any point, another player in the line may step forward and say, “Objection!”\n- The objecting player then objects to something the current speaker just said.\n- The objection may be directly related to the topic or may be a tangent inspired by a word, phrase, implication, or detail.\n- The judge rules on the objection by saying either:\n  - “Sustained,” or\n  - “Overruled.”\n- If the objection is overruled, the current speaker continues.\n- If the objection is sustained, the objecting player takes over and must continue arguing the point made in the objection.\n- The new speaker continues until another player objects.\n- The game continues through a series of arguments, objections, rulings, and takeovers until the judge ends the game.\n\n**For Students**\n- The speaker should make bold claims quickly.\n- The objector should object to something specific, even if the objection is ridiculous.\n- A good objection creates a new playable argument, not just a correction.\n- The judge should rule fast.\n- “Sustained” should usually be used when the objection creates better momentum.\n- “Overruled” should be used when the objection is unclear, weak, or would derail a stronger current run.\n- The game rewards confidence more than legal accuracy.\n- Tangents are useful when they are committed to as if they matter.\n- Players should maintain debate energy: formal, passionate, overly certain, and rhetorically inflated.\n- The best arguments sound structured even when the logic is absurd.\n- Players who are good at setup/punchline construction may thrive if they use that skill to create playable objections rather than simply dropping jokes.\n- The ideal move is not just “say a funny objection”; it is “create a funny objection that forces the next argument into a stronger absurd position.”\n\n**For Teachers**\n- Players wait too long to object.\n- Players object without a clear playable angle.\n- Objections become too logical and not theatrical enough.\n- Speakers become vague instead of making strong claims.\n- The judge rules too slowly and kills momentum.\n- The judge sustains weak objections that do not create a playable direction.\n- The judge overrules too often and prevents the game from changing hands.\n- Players argue realistically instead of heightening the absurd debate frame.\n- Tangents become disconnected noise instead of a new argument to commit to.\n- Players abandon the debate tone and start casual banter.\n- One strong speaker dominates because others hesitate to object.\n- Players break character or go meta when they cannot find a strong objection or argument.\n- Players comment on the difficulty of the game instead of sustaining the debate frame.\n- The game collapses into self-consciousness if players treat weak objections as failures rather than playable offers.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Master Debater","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"6d71ae07eba8a938"}},{"id":"spelling-bee","name":"Spelling Bee","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice fast group coordination; Practice one-word-at-a-time team speaking.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common Short Form / Flying Pig Variant","beginnerClassSuitability":"Late","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Seven players","minimumPlayers":"7","maximumPlayers":"7","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No / Optional","propsMaterialsNeeded":"Optional bell/host framing; no documented required prop","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"one-word team speaking; character under constraint; host escalation","tags":"Short Form, High, one-word team speaking, character under constraint, host escalation, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["one-word team speaking","character under constraint","host escalation"],"tags":["Short Form","High","one-word team speaking","character under constraint","host escalation","audience","host"],"fullMarkdown":"**Skills**\none-word team speaking; character under constraint; host escalation\n\n**Rules**\nOne host runs the spelling bee; two teams of three compete. The host establishes a setting (e.g., fourth grade, senior center, prison).\n\nTeams introduce themselves one word at a time.\n\nWhen asked to spell a word, the team: repeats the word → claps → spells one letter at a time → says the word again → claps.\n\nThe host follows up with questions: \"Use it in a sentence,\" \"Define it,\" \"Give me the etymology,\" etc.\n\nWords escalate: simple real words → harder real words → invented or absurd words.\n\nExample:\n- Host: \"Your word is 'banana.'\"\n- Team: \"Banana. [clap] B-A-N-A-N-A. Banana. [clap]\"\n- Host: \"Use it in a sentence.\"\n- Team (one word at a time): \"I / once / ate / a / banana / on / the / moon.\"\n\nIn beginner class, the coach typically serves as host, freeing students to focus on team speaking and character.\n\n**Success Looks Like**\nTeams go fast and stay in character; correct spelling matters less than confident shared commitment; invented words are defined with total authority.\n\n**For Students**\nSpeed and character over spelling accuracy. Commit to wrong answers confidently.\n\nYour team introduction establishes a shared identity — make it playable, not generic.\n\nTreat invented words as real. Define them with authority and let the definition reveal character.\n\n**For Teachers**\nHosts: escalate word difficulty gradually. Early words let the audience learn the pattern; later words create pressure and absurdity.\n\nFollow-up questions should heighten character or world — not just be administrative checkboxes.\n\nCommon failure: players prioritize correctness over rhythm and the game loses energy. Redirect to confidence and speed.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Spelling Bee","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"27d9348583d4c9ac"}},{"id":"breaking-news","name":"Breaking News","category":"Short Form","type":"Short Form Game / Long-Form Insert","formatRole":"Short Form","shortDescription":"Practice one-word-at-a-time coordination; Practice maintaining a recognizable genre frame.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game / Long-Form Insert","standardHouseUnknownStatus":"Common Short Form / Possible House Variant","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Two players","minimumPlayers":"2","maximumPlayers":"2","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"one-word speaking; genre frame; pacing","tags":"Short Form, High, one-word speaking, genre frame, pacing","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["one-word speaking","genre frame","pacing"],"tags":["Short Form","High","one-word speaking","genre frame","pacing"],"fullMarkdown":"**Skills**\none-word speaking; genre frame; pacing\n\n**Rules**\n- Two players perform as newscasters.\n- The players deliver breaking news stories one word at a time.\n- The stories are usually absurd, heightened, or ridiculous.\n- The players maintain the tone and posture of serious newscasters while building the story together.\n- The game may move through multiple breaking news stories.\n- The players must decide when a story has reached a natural endpoint and when to advance to the next story.\n- The game ends when the news sequence reaches a strong final button or when the host/players call the end.\n- The game may also appear as an improvised insert inside a long-form set, when players briefly shift into a breaking-news frame to comment on, heighten, or transition from the ongoing long-form material.\n\n**For Students**\n- The newscaster genre matters.\n- Players should use posture, vocal tone, urgency, seriousness, and broadcast rhythm to sell the frame.\n- The comedy often comes from treating absurd events as legitimate breaking news.\n- A good story should have a clear enough structure that the audience can follow it:\n  - event,\n  - who is affected,\n  - where it happened,\n  - why it matters,\n  - absurd escalation,\n  - button.\n- Players should learn to feel when a story has peaked.\n- Moving to the next story is a pacing skill, not an escape hatch.\n- Strong transitions can sound like real news pivots:\n  - “In other news…”,\n  - “We now go to…”,\n  - “Authorities are reporting…”,\n  - “This just in…”.\n- The ending should feel deliberate, not like the players ran out of steam.\n- The best versions combine fast one-word-at-a-time rhythm with believable newscaster authority.\n- As a long-form insert, Breaking News should be used sparingly.\n- The player initiating it needs strong judgment; otherwise it can feel like a random genre interruption.\n- It works best when it clarifies, heightens, or reframes something already present in the long-form.\n- The insert should still preserve the newscaster tone: serious delivery, clean pacing, and a clear button.\n\n**For Teachers**\n- Players lose the newscaster frame and simply play a word game.\n- Players speak too slowly, causing the story to drag.\n- Players rush and create incoherent sentences.\n- Players fail to recognize when a story has ended.\n- Players stay on one story too long after the joke has peaked.\n- Players advance to a new story too early before the first story lands.\n- The game has no clear ending.\n- Younger players may lack strong reference points for traditional television newscaster behavior.\n- The delivery becomes casual instead of formal, urgent, and broadcast-like.\n- Players prioritize absurd words over a clear news-story shape.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Breaking News","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"7a0d7c839be29dee"}},{"id":"pillars","name":"Pillars","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Incorporate audience participation directly into a scene; Practice justifying unexpected words or phrases.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Two players plus two audience volunteers","minimumPlayers":"4","maximumPlayers":"4","requiresHost":"No documented","requiresAudience":"Yes","requiresProps":"Yes","propsMaterialsNeeded":"Two audience volunteers","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"High","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"audience care; justification; volunteer support","tags":"Short Form, High, audience care, justification, volunteer support, audience","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["audience care","justification","volunteer support"],"tags":["Short Form","High","audience care","justification","volunteer support","audience"],"roles":["Director","Actor 1","Actor 2","Pillar 1","Pillar 2"],"fullMarkdown":"**Skills**\naudience care; justification; volunteer support\n\n**Rules**\nTwo audience members come onstage — one assigned to each player.\n\nThe two players perform a normal scene. At any point a player may pause mid-sentence and tap their assigned volunteer.\n\nThe volunteer supplies a word or short phrase. The player immediately incorporates it and continues the scene.\n\nThis is a performer-struggle game, not a volunteer-struggle game. The audience member supplies the offer; the improviser carries the responsibility for making it work.\n\nExample:\n- Player: \"I'm sorry I was late, I had to clean my…\" [taps volunteer]\n- Volunteer: \"Cat.\"\n- Player: \"My cat. He was so dirty. Too much catnip.\"\n\n**Success Looks Like**\nThe volunteer feels safe, funny, and included; inserted words affect the relationship or stakes, not just decorate sentences; the scene stays a real scene.\n\n**For Students**\nSet up a clear blank before you tap: \"I brought you a…\" / \"We can't go back to…\" — not after you've already finished the sentence.\n\nThe volunteer's answer is always right. Your job is to make them look clever, not show how hard the offer was.\n\nUse the inserted word to affect the relationship, not just fill space.\n\n**For Teachers**\nCommon mistakes: tapping too early (no blank set up), tapping too late (sentence already finished), or using the pillar so often the scene can't develop.\n\nIf the volunteer gives a basic or obvious answer, the player still owns the justification — make it work anyway.\n\nThe best versions make the audience volunteer feel like they were funny. That's the performer's responsibility, not luck.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Pillars","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"b5d2949cf43c8967"}},{"id":"3-chairs","name":"3 Chairs","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice large physical character choices; Train players to sustain and inherit characters.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Unknown; possible house variant or local variation","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Six players","minimumPlayers":"6","maximumPlayers":"6","requiresHost":"No documented","requiresAudience":"Maybe / optional","requiresProps":"Yes","propsMaterialsNeeded":"Three chairs; bell","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Big character work; character inheritance; physical/vocal commitment; ensemble memory","coreSkills":"character inheritance; observation; big physical choices","tags":"Short Form, High, character inheritance, observation, big physical choices","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["character inheritance","observation","big physical choices"],"tags":["Short Form","High","character inheritance","observation","big physical choices"],"fullMarkdown":"**Skills**\ncharacter inheritance; observation; big physical choices\n\n**Rules**\n- Three chairs are placed on stage.\n- Six players participate.\n- The audience gives a location where people would gather.\n- Three players begin seated in the chairs.\n- Each seated player creates a very large physical and character choice.\n- The three offstage players watch closely.\n- When the offstage players see a button, they ring a bell.\n- The seated players exit.\n- The three offstage players replace them in the chairs.\n- Each incoming player plays the exact same character associated with the chair they take over.\n- The characters remain tied to the chairs throughout the game.\n- The game continues through multiple rounds.\n- The game often continues until players eventually return to their original chairs/characters.\n\n**For Students**\n- Big does not mean random.\n- The best characters are physically large, vocally clear, and easy for another player to reproduce.\n- Players should make choices that are:\n  - obvious enough to copy,\n  - specific enough to preserve,\n  - and playable enough to sustain.\n- Offstage players should watch the whole body, not just the voice.\n- Incoming players should honor the existing character before adding new heightening.\n- A strong replacement performance says: “I understood the offer, and now I am carrying it forward.”\n- The bell should land on a button, not merely on confusion or impatience.\n- Repetition is part of the game; the audience enjoys seeing the same character filtered through different performers.\n- The location should continue to matter. It gives the characters something to do besides display quirks.\n- The game works best when the inherited characters have clear wants, emotions, and relationships, not just physical abnormalities.\n\n**For Teachers**\n- Players make character choices that are too small to inherit.\n- Incoming players copy only the surface voice or catchphrase and miss the body.\n- Characters drift over multiple rotations until they become unrecognizable.\n- Players change the character instead of heightening the existing offer.\n- Offstage players miss good buttons or ring too late.\n- The game becomes chaotic without clear character preservation.\n- Players focus on being weird instead of being specific.\n- The location disappears after the opening.\n- Practice versions can become frustrating if players are pushed toward extreme absurdity before they understand the inheritance mechanic.\n- Players may confuse “big character” with random Looney Tunes behavior.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"3 Chairs","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"83ea902ce1a05b2d"}},{"id":"foreign-film","name":"Foreign Film","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice gibberish performance; Practice translating physical and vocal offers into clear meaning.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Four players","minimumPlayers":"4","maximumPlayers":"4","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"gibberish; translation; host support; emotional intent","tags":"Short Form, High, gibberish, translation, host support, emotional intent","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["gibberish","translation","host support","emotional intent"],"tags":["Short Form","High","gibberish","translation","host support","emotional intent"],"roles":["Host 1 / Translator 1","Host 2 / Translator 2","Player 1","Player 2","Player 3","Player 4"],"introScript":"[Host 1, in character:] Welcome to (host-invented venue). I'm (fake name that fits the venue) and this is (fake name).\n\n[Host 2:] Hi!\n\n[Host 1:] Tonight we're bringing you a masterpiece from (host-invented country or region) — but unfortunately there was a mistake in the shipment and our copy arrived without subtitles. So [Player 2] and I will be translating.\n\nTo get us started, may we please have (audience get — becomes the adjective in the film title).\n\nAnd may we please have (audience get — becomes the noun in the film title).\n\nWithout further ado, we present: (get one) (get two).","fullMarkdown":"**Skills**\ngibberish; translation; host support; emotional intent\n\n**Rules**\n- Four players participate.\n- Two players are the hosts introducing a foreign film.\n- Two players are the actors inside the film.\n- The hosts ask the audience for a suggestion.\n- The hosts use the suggestion to create the title of the foreign film.\n- The premise is that the film is in an obscure language, but the subtitles are not working.\n- The actors perform a scene speaking gibberish.\n- After each gibberish line, the actor pauses.\n- One of the hosts translates the line into English.\n- The actors continue the scene based on the emotional and physical meaning being created by the translations.\n- The game continues until the scene reaches a strong ending or the host/editor ends it.\n\n**For Students**\n- Gibberish still needs intention.\n- Strong gibberish uses rhythm, volume, pauses, emotional tone, repeated sounds, gesture, eye contact, and physical relationship.\n- The host should translate the whole offer, not just the sound.\n- Good translations come from what the actor gives: fear becomes confession, pride becomes boast, desperation becomes plea, anger becomes accusation, tenderness becomes vulnerability.\n- Hosts should translate quickly enough to preserve rhythm.\n- The best translations give the actors a next playable move.\n- If an actor gives too little gibberish, the host may still translate from body language, facial expression, or silence.\n- The hosts should make the actors look intentional, not expose that they are struggling.\n\n**For Teachers**\n- Actors do not say enough gibberish for the hosts to translate.\n- Actors mumble or undercommit vocally.\n- Actors use gibberish with no emotional or physical intent.\n- Actors forget to pause for translation.\n- Hosts translate too literally or too cautiously.\n- Hosts ignore the actor’s physical and emotional offers.\n- Hosts over-control the scene and leave the actors nothing to play.\n- Hosts make translations that contradict the actor’s obvious emotional tone.\n- The scene becomes a series of jokes instead of a developing scene.\n- Actors fail to incorporate the host’s translation into their next line or behavior.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Foreign Film","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"753f439f2e9b7724"}},{"id":"slideshow","name":"Slideshow","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice physical tableau; Practice creating clear stage pictures quickly.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Presenter, listener, 2-3 photo players","minimumPlayers":"4","maximumPlayers":"5","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"tableau; narration; visual offers; justification","tags":"Short Form, Medium-High, tableau, narration, visual offers, justification","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["tableau","narration","visual offers","justification"],"tags":["Short Form","Medium-High","tableau","narration","visual offers","justification"],"roles":["Presenter (Player 1)","Viewer (Player 2)","Ensemble 1","Ensemble 2","Ensemble 3"],"introScript":"For our next game, [Player 1] is going to be sharing a slideshow from vacation with [Player 2], and as they do, the other players are going to demonstrate what they're looking at.\n\nTo get us started, may I please have (audience get — a place you might go on vacation).\n\n[Confirm get.]\n\nThis is Slideshow.","fullMarkdown":"**Skills**\ntableau; narration; visual offers; justification\n\n**Rules**\nOne player (Presenter) shows vacation photos to another player (Listener). Two or three others create the photos and videos.\n\nThe Presenter narrates each image; the Listener reacts, asks questions, and provides stakes.\n\nPhoto players freeze strongly for photos; move clearly for videos.\n\nThe Presenter may pause, rewind, slow-motion, or freeze-frame a video as needed.\n\nPhoto/Video players: Make bold, readable images quickly. Use levels, distance, facial expression. Give the Presenter something interesting to justify.\n\nPresenter: Frame the vacation story. Treat every pose as intentional. Build escalation across photos — location, disaster, relationship turn, consequence.\n\nListener: React as someone being shown the album. Ask questions. Notice odd details. Provide emotional stakes through surprise, suspicion, or concern.\n\n**Success Looks Like**\nEach photo adds something new — images are readable from the back of the room; the vacation story escalates; the Presenter treats every pose as a gift.\n\n**For Students**\nPhoto players: make your image readable before the Presenter speaks. Don't wait for instruction — commit to a bold pose.\n\nPresenter: if a pose is confusing, define it confidently. The physical offer is always right.\n\nListener: you're not a prop. Your reactions create stakes and give the Presenter somewhere to go.\n\n**For Teachers**\nCommon failure: vague or unreadable images — push players to use levels, distance, and eye-line.\n\nThe vacation story should escalate, not just list unrelated pictures. Coach Presenters to build consequences across photos.\n\nIf a video becomes chaotic, the Presenter has tools: pause, rewind, slow-motion, freeze-frame. Teach them to use these.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Slideshow","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"bad0bb24704877fa"}},{"id":"gibberish-switch","name":"Gibberish Switch","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice gibberish; Train players to preserve meaning, emotion, and intention across language changes.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common gibberish / language-switching short-form family","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Two players plus bell player","minimumPlayers":"3","maximumPlayers":"3","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"Yes","propsMaterialsNeeded":"Bell","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"gibberish; continuity; language switching","tags":"Short Form, High, gibberish, continuity, language switching","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["gibberish","continuity","language switching"],"tags":["Short Form","High","gibberish","continuity","language switching"],"fullMarkdown":"**Skills**\ngibberish; continuity; language switching\n\n**Rules**\n- Two players perform a scene.\n- A third player stands offstage or to the side with a bell.\n- The scene begins in gibberish.\n- Whenever the bell rings, the players immediately switch languages.\n- If they were speaking gibberish, they switch to English.\n- If they were speaking English, they switch back to gibberish.\n- The bell may ring during a sentence, forcing the player to continue the same thought in the new language.\n- The scene continues until it reaches a strong ending or the host/editor ends it.\n\n**For Students**\n- The strongest version preserves the sentence across the switch.\n- If the bell rings mid-sentence, continue the same thought in the new language.\n- Gibberish should still have syntax, rhythm, emotional tone, and intention.\n- The audience does not need to understand every gibberish word; they need to understand the emotional and relational direction.\n- Good gibberish has shape. It should sound like a real language even though it is not one.\n- Strong physical choices make the gibberish much easier for the audience to follow.\n\n**For Teachers**\n- Players freeze when the bell rings.\n- Players restart the sentence instead of continuing the same thought.\n- The gibberish has no emotional or physical intention.\n- Players use gibberish as filler instead of communication.\n- English sections become exposition dumps.\n- Players wait for the bell instead of playing the scene.\n- The bell player rings too often and prevents development.\n- The bell player waits too long and the game mechanic disappears.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Gibberish Switch","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"98cce1f7cb13dac0"}},{"id":"new-choice","name":"New Choice","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Train players to make fast alternate offers; Break players out of predictable first instincts.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Two players plus caller","minimumPlayers":"3","maximumPlayers":"3","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"Yes","propsMaterialsNeeded":"Caller; no physical prop required","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"alternate offers; flexibility; meaningful substitutions","tags":"Short Form, Medium-High, alternate offers, flexibility, meaningful substitutions","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["alternate offers","flexibility","meaningful substitutions"],"tags":["Short Form","Medium-High","alternate offers","flexibility","meaningful substitutions"],"fullMarkdown":"**Skills**\nalternate offers; flexibility; meaningful substitutions\n\n**Rules**\nTwo players perform a scene. A third player is the caller.\n\nAt any point the caller issues a call — the player who just spoke or acted must immediately replace that offer with a new one. The new choice becomes the scene's reality. The caller may call multiple times in a row.\n\nCaller options: \"New Choice\" (replace the last offer with something meaningfully different) · \"New Accent\" · \"New Reaction\" · \"New Genre: [genre]\" · and other scene-modifying calls. Replacements must be meaningfully different — a new meaning or quality, not a synonym.\n\nExample:\n- Original: \"I brought you flowers.\"\n- Weak: \"I brought you roses.\" (same meaning)\n- Strong: \"I brought you divorce papers.\"\n- Stronger: \"I brought you the raccoon that ruined our wedding.\"\n\n**Success Looks Like**\nEach new choice creates a meaningfully different reality; the caller pushes frequently enough that the game stays alive; players commit instantly without explaining the rejected offer.\n\n**For Students**\nDon't give a new word — give a new world. The replacement should change intention, relationship, or stakes.\n\nTreat the newest choice as true immediately. Don't explain or resist the call.\n\nThe audience loves watching you abandon safety and discover something better.\n\n**For Teachers**\nUnder-calling is the most common failure — if the caller isn't calling often, the game disappears into a normal scene.\n\nIf the replacement is a synonym, call again immediately. Don't let weak substitutions slide.\n\nCoach callers to push toward bigger emotion, clearer stakes, more specific objects, or stranger relationships — not just different words.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"New Choice","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"63f7428cd49ecc88"}},{"id":"entrances-and-exits","name":"Entrances and Exits","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice listening for cue words; Train justified entrances and exits.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Usually 3 players; can vary","minimumPlayers":"3","maximumPlayers":"Needs Review","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"cue listening; justified entrances/exits","tags":"Short Form, Medium-High, cue listening, justified entrances/exits","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["cue listening","justified entrances/exits"],"tags":["Short Form","Medium-High","cue listening","justified entrances/exits"],"fullMarkdown":"**Skills**\ncue listening; justified entrances/exits\n\n**Rules**\n- Each player is assigned a common word from the audience. Players begin a scene.\n- Whenever a player's assigned word is spoken, they must change stage status: enter if offstage, exit if onstage.\n- All entrances and exits must be justified within the reality of the scene. Multiple triggers can fire at once.\n- Watch out: accidentally saying your own trigger word counts.\n\n**Success Looks Like**\nPlayers catch every cue; entrances and exits feel motivated, not mechanical; the scene still has relationship, stakes, and location underneath the constraint.\n\n**For Students**\n- Don't just walk on or off — make the movement part of the story. A forced exit can be fear, urgency, embarrassment, or betrayal.\n- Stay in the scene even while tracking your word. The constraint is not the whole job.\n- A forced entrance should bring energy, information, or pressure — not just presence.\n\n**For Teachers**\n- Choose words that are common enough to appear naturally but not so common the scene becomes unplayable.\n- Watch for scenes that devolve into players just saying each other's trigger words — coach them to serve the scene, not the mechanic.\n- Missing a trigger is fixable; a scene with no relationship underneath it isn't.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Entrances and Exits","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"aaafcd8ad866fe0d"}},{"id":"number-of-words","name":"Number of Words","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice scene work under a verbal constraint; Train players to speak clearly and economically.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Usually 3; sometimes 4","minimumPlayers":"3","maximumPlayers":"4","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"word-count constraint; economy; sentence control","tags":"Short Form, High, word-count constraint, economy, sentence control","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["word-count constraint","economy","sentence control"],"tags":["Short Form","High","word-count constraint","economy","sentence control"],"roles":["Host","Player 1","Player 2","Player 3"],"fullMarkdown":"**Skills**\nword-count constraint; economy; sentence control\n\n**Rules**\nThree players (sometimes four) perform a scene. The audience assigns each player a number between 1 and 7.\n\nEvery line each player speaks must contain exactly their assigned number of words. Contractions count as one word.\n\nIncorrect word counts are buzzed. Players are expected to count.\n\nThe scene continues until it reaches a strong ending or the host ends it.\n\nExample:\n- Player A (1): \"Dad.\"\n- Player B (4): \"You missed dinner again.\"\n- Player C (7): \"I was trapped inside the old carnival.\"\n\n**Success Looks Like**\nPlayers manage the technical constraint without losing the scene — relationship, stakes, and location stay alive; word counts feel deliberate rather than stumbled into.\n\n**For Students**\nThe word count is the constraint, not the scene — keep playing the relationship.\n\nFewer words demands stronger words. Load each one with intention.\n\nMore words doesn't mean padding — use them to add specificity.\n\nIf you miscounted, recover and keep moving. Don't break the scene to correct yourself.\n\n**For Teachers**\nThe one-word player tends to go passive — coach them to use loaded, active words.\n\nHigh-count players often pad. Push for specificity over filler.\n\nCommon failure: players focus so hard on counting that the scene goes flat. Redirect to the scene first.\n\nPhysical action can carry meaning when the verbal constraint is tight.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Number of Words","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"ea73702fb986c84e"}},{"id":"worlds-worst","name":"World’s Worst","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice rapid joke generation; Build comfort stepping forward with imperfect ideas.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Late","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"One host; typically five performers","minimumPlayers":"6","maximumPlayers":"6","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Rapid joke generation; concise character snapshots; stepping forward; confidence","coreSkills":"rapid jokes; character snapshots; brevity","tags":"Short Form, High, rapid jokes, character snapshots, brevity, audience, host","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["rapid jokes","character snapshots","brevity"],"tags":["Short Form","High","rapid jokes","character snapshots","brevity","audience","host"],"roles":["Host","Player 1","Player 2","Player 3","Player 4","Player 5"],"introScript":"This next game is for all [number] players.\n\nTo get us started, may I please have (an occupation or role — something a person does).\n\n[Confirm get.]\n\nThis is World's Worst.","fullMarkdown":"**Skills**\nrapid jokes; character snapshots; brevity\n\n**Rules**\n- Host gets a suggestion from the audience (profession, role, situation) and announces: \"World's worst [suggestion].\"\n- Players step forward one at a time, deliver a short bit or line demonstrating the world's worst version, then step back. Others continue stepping in.\n- Host ends the round when energy dips or a strong button lands, then starts a new round with a fresh suggestion.\n- Examples: \"World's worst doctor: Good news. I watched half a YouTube video.\" / \"World's worst babysitter: Whoever finds the snake first gets dessert.\"\n\n**Success Looks Like**\nPlayers step forward quickly with confident, brief bits; the pace stays high; jokes land and get out cleanly; the host pulls the ripcord at the right moment.\n\n**For Students**\n- Step forward on a good-enough idea. Waiting for the perfect joke kills the game.\n- One clear premise delivered confidently beats a long setup every time.\n- Get out cleanly after the joke lands. Don't extend it.\n\n**For Teachers**\n- A small group carrying the round is the most common failure — coach everyone to step forward early and often.\n- Hesitation hurts more than a mediocre line. Weak jokes at pace are survivable; dead air isn't.\n- End each round on a strong laugh or when energy drops — don't let a weak stretch run long.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"World’s Worst","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"a739f02ab456509a"}},{"id":"survivor","name":"Survivor","category":"Short Form","type":"Short Form Game / Replay-Elimination Game","formatRole":"Short Form","shortDescription":"Practice scene memory; Practice replaying and preserving a shared scene structure.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game / Replay-Elimination Game","standardHouseUnknownStatus":"Standard/common improv replay-elimination structure / Flying Pig observed","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"5 scene players plus host","minimumPlayers":"6","maximumPlayers":"6","requiresHost":"Yes","requiresAudience":"Optional, but useful for removals","requiresProps":"No / Optional","propsMaterialsNeeded":"No prop required; host may use voting","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Scene memory; replay discipline; ensemble support; final solo payoff","coreSkills":"memory; replay discipline; role coverage; solo clarity","tags":"Short Form, Survivor, Shrinking Scene, Replay, Elimination, Audience Vote, Memory, Role Coverage, Final Solo Payoff, Show Ready","confidenceReviewStatus":"Reviewed / renamed from Shrinking Scene to Survivor (V16)","sourceBasisInferenceNotes":"Originally documented as Shrinking Scene; Troy identified February show name as Survivor. Renamed in V16. Alias Shrinking Scene preserved.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["memory","replay discipline","role coverage","solo clarity"],"tags":["Short Form","Survivor","Shrinking Scene","Replay","Elimination","Audience Vote","Memory","Role Coverage","Final Solo Payoff","Show Ready"],"fullMarkdown":"**Skills**\nmemory; replay discipline; role coverage; solo clarity\n\n**Rules**\nFive players perform a scene together. It must establish clear who, what, and where — every player needs at least one memorable contribution.\n\nAfter each replay, the host removes one player (audience may vote). The remaining players replay the scene from the top, covering the missing player's lines and actions.\n\nThe scene resets from the beginning each time. Coverage is flexible — any remaining player may jump in.\n\nWhen only one player remains, they perform the entire scene solo, covering all characters.\n\nRound 1: 5 players\nRound 2: 4 players → cover 1 missing role\nRound 3: 3 players → cover 2 missing roles\nRound 4: 2 players → cover 3 missing roles\nRound 5: 1 player → covers all 5 roles solo\n\n**Success Looks Like**\nEach replay is recognizably the same scene but increasingly difficult; missing lines are covered without hesitation; the final solo performance is energetic and readable.\n\n**For Students**\nIn the first scene, give the group something memorable — a distinctive line, action, or physical position worth replaying.\n\nDon't wait for permission to cover a missing line. If no one else is moving, move.\n\nIn the final solo, physical and vocal separation between characters is everything — the audience needs to know who you're being.\n\n**For Teachers**\nIf the original scene is too vague to replay, the whole game falls apart. Coach the first scene to have clear landmarks.\n\nCommon failure: remaining players drop missing material rather than covering it. Redirect — preserving the scene's skeleton is the game.\n\nKeep transitions between replays tight. Let the host keep the pace; dragging kills momentum.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Survivor","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"1296d3acca8cb66e"}},{"id":"growing-and-shrinking","name":"Growing and Shrinking","category":"Short Form","type":"Short Form Game / Long-Form-Adjacent Structure","formatRole":"Short Form","shortDescription":"Practice scene memory; Practice clear scene initiations.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game / Long-Form-Adjacent Structure","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerCl
