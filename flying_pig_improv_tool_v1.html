// ACTIVITY DETAIL MODAL
// ═══════════════════════════════════════════
function openActivityModal(id) {
    const a = getById(id);
    if (!a) return;
    const m = a.metadata;
    const modal = document.getElementById('activity-modal');

    // Title
    document.getElementById('modal-title').textContent = a.name;

    // Meta row: category + difficulty badge + suitability badges
    const badges = [];
    function suitLabel(val) {
        const valid = ['Warmup','Early','Mid','Late','Capstone','Closer','Exercise','Shortform','Longform'];
        if (!val || !valid.includes(val.trim())) return '';
        return val.trim();
    }
    const begLabel = suitLabel(m.beginnerClassSuitability||'');
    if (begLabel) badges.push(`<span class="badge badge-beginner">Beg: ${begLabel}</span>`);
    const advLabel = suitLabel(m.advancedClassSuitability||'');
    if (advLabel) badges.push(`<span class="badge badge-advanced">Adv: ${advLabel}</span>`);
    if (['Strong','Yes'].some(v => (m.showSuitability||'').includes(v)))
        badges.push('<span class="badge badge-show">Show</span>');
    document.getElementById('modal-meta-row').innerHTML =
        `<span class="activity-category">${a.category}</span>` +
        `<span class="activity-difficulty diff-${normDiff(m.difficulty)}">${m.difficulty||''}</span>` +
        badges.join('');

    // Body
    document.getElementById('modal-body').innerHTML = `
        <div class="modal-meta-grid">
            <div><strong>Format Role:</strong> ${a.formatRole||'—'}</div>
            <div><strong>Difficulty:</strong> ${m.difficulty||'—'}</div>
            <div><strong>Energy:</strong> ${m.energyLevel||'—'}</div>
            <div><strong>Players:</strong> ${m.playerCount||'—'}</div>
            <div><strong>Runtime:</strong> ${m.estimatedRuntime||'—'}</div>
            ${['No','No / Optional','No documented prop requirement'].includes(m.requiresProps||'') ? '' : `<div><strong>Props:</strong> ${m.requiresProps}</div>`}
        </div>
        ${a.coreSkills && a.coreSkills.length ? '<p class="meta-skills"><strong>Core Skills:</strong> ' + a.coreSkills.join('; ') + '</p>' : ''}
        ${m.bestUse ? '<p class="meta-use" style="margin-top:8px;"><strong>Best Use:</strong> ' + m.bestUse + '</p>' : ''}

        <div class="full-markdown" style="margin-top:14px;">${renderMD(a.fullMarkdown)}</div>
    `;

    modal.classList.add('open');
    document.addEventListener('keydown', _modalKeyHandler);
}

function closeModal() {
    document.getElementById('activity-modal').classList.remove('open');
    document.removeEventListener('keydown', _modalKeyHandler);
}

function _modalKeyHandler(e) {
    if (e.key === 'Escape') closeModal();
}

// FEEDBACK
// ═══════════════════════════════════════════
function sendFeedback() {
    const tab = state.tab === 'browse' ? 'Browse Activities' : 'Lineup Generator';
    const filters = [];
    if (state.filterCategory) filters.push('Category: ' + state.filterCategory);
    if (state.filterSuitability) filters.push('Suitability: ' + state.filterSuitability);
    if (state.filterDifficulty) filters.push('Difficulty: ' + state.filterDifficulty);
    if (state.search) filters.push('Search: "' + state.search + '"');
    const expanded = state.expandedId ? 'Activity open: ' + (getById(state.expandedId)||{}).name : '';
    const mode = state.lineup ? 'Lineup mode: ' + state.lineup.mode : '';

    const context = [
        'Tab: ' + tab,
        filters.join(', '),
        expanded,
        mode
    ].filter(Boolean).join('\n');

    const subject = encodeURIComponent('Flying Pig Improv Tool — Feedback');
    const body = encodeURIComponent(
        'Hi Troy,\n\nI noticed something that may need attention:\n\n[describe the issue here]\n\n--- Context ---\n' + context + '\n'
    );
    window.location.href = 'mailto:Troy@spectrumware.net?subject=' + subject + '&body=' + body;
}


// ═══════════════════════════════════════════
// CUSTOM SHOW
// ═══════════════════════════════════════════
function startCustomShow() {
    ['beginner','advanced','show'].forEach(m => {
        document.getElementById('btn-'+m).classList.remove('active');
    });
    document.getElementById('btn-custom-show').classList.add('active');
    state.lineup = null;
    renderCustomShow();
}

function renderCustomShow() {
    const showElig = ACTIVITIES.filter(a => {
        const s = a.metadata.showSuitability || '';
        return s === 'Strong' || s === 'Yes';
    });

    // Group by category
    const groups = {};
    showElig.forEach(a => {
        const cat = a.category || 'Other';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push(a);
    });

    const customList = window._customList || [];
    const customIds = new Set(customList.map(a => a.id));

    // Build available panel
    let availHtml = '<input class="custom-search" id="custom-search" placeholder="Filter activities…" oninput="filterCustomAvail()" />';
    Object.keys(groups).sort().forEach(cat => {
        const items = groups[cat];
        availHtml += `<div class="custom-section-label">${cat}</div>`;
        items.forEach(a => {
            const already = customIds.has(a.id);
            availHtml += `<div class="custom-avail-item" data-name="${a.name.toLowerCase()}" data-cat="${cat.toLowerCase()}">
                <span>${a.name}</span>
                <button class="custom-add-btn" onclick="addToCustom('${a.id}')" ${already ? 'disabled style="opacity:.4"' : ''}>
                    ${already ? '✓' : '+ Add'}
                </button>
            </div>`;
        });
    });

    // Build lineup panel
    let lineupHtml = '';
    if (customList.length === 0) {
        lineupHtml = '<div class="custom-empty">No activities added yet.</div>';
    } else {
        customList.forEach((a, i) => {
            lineupHtml += `<div class="custom-slot">
                <div class="custom-slot-num">${i+1}</div>
                <div class="custom-slot-name">${a.name}</div>
                <div class="custom-slot-btns">
                    <button class="custom-move-btn" onclick="moveCustomSlot(${i},-1)" ${i===0?'disabled':''}>▲</button>
                    <button class="custom-move-btn" onclick="moveCustomSlot(${i},1)" ${i===customList.length-1?'disabled':''}>▼</button>
                    <button class="custom-remove-btn" onclick="removeFromCustom(${i})">✕</button>
                </div>
            </div>`;
        });
    }

    document.getElementById('lineup-display').innerHTML = `
        <div style="margin-bottom:10px">
            ${customList.length > 0 ? '<button class="print-btn" onclick="printSetList()">🎭 Print Set List</button>' : ''}
        </div>
        <div class="custom-show-wrap">
            <div class="custom-available">
                <div class="custom-section-label" style="margin-top:0">Available Show Activities</div>
                ${availHtml}
            </div>
            <div class="custom-lineup-col">
                <div class="custom-lineup-header">
                    <div class="custom-section-label" style="margin:0">Your Lineup (${customList.length})</div>
                    ${customList.length > 0 ? '<button class="custom-clear-btn" onclick="clearCustomShow()">Clear all</button>' : ''}
                </div>
                ${lineupHtml}
            </div>
        </div>`;
}

function addToCustom(id) {
    if (!window._customList) window._customList = [];
    const a = ACTIVITIES.find(x => x.id === id);
    if (a && !window._customList.find(x => x.id === id)) {
        window._customList.push(a);
    }
    renderCustomShow();
}

function removeFromCustom(idx) {
    if (!window._customList) return;
    window._customList.splice(idx, 1);
    renderCustomShow();
}

function moveCustomSlot(idx, dir) {
    if (!window._customList) return;
    const list = window._customList;
    const target = idx + dir;
    if (target < 0 || target >= list.length) return;
    [list[idx], list[target]] = [list[target], list[idx]];
    renderCustomShow();
}

function clearCustomShow() {
    window._customList = [];
    renderCustomShow();
}

function filterCustomAvail() {
    const q = document.getElementById('custom-search').value.toLowerCase();
    document.querySelectorAll('.custom-avail-item').forEach(el => {
        const name = el.dataset.name || '';
        const cat = el.dataset.cat || '';
        el.style.display = (!q || name.includes(q) || cat.includes(q)) ? '' : 'none';
    });
    // Hide section labels when all items in that section are hidden
    document.querySelectorAll('.custom-section-label').forEach(lbl => {
        const next = lbl.nextElementSibling;
        if (!next) return;
        // collect all siblings until next label
        let sibling = lbl.nextElementSibling;
        let anyVisible = false;
        while (sibling && !sibling.classList.contains('custom-section-label') && !sibling.classList.contains('custom-search')) {
            if (sibling.style.display !== 'none') anyVisible = true;
            sibling = sibling.nextElementSibling;
        }
        lbl.style.display = anyVisible ? '' : 'none';
    });
}


function extractRules(md) {
    if (!md) return [];
    const match = md.match(/\*\*Rules\*\*\n([\s\S]*?)(?=\n\*\*|---\s*$|$)/);
    if (!match) return [];
    return match[1].trim().split('\n')
        .map(l => l.replace(/^[-*]\s*/, '').trim())
        .filter(l => l.length > 0);
}

function printSetList() {
    const slots = state.lineup ? state.lineup.slots :
                  (window._customList || []).map(a => ({activity: a}));
    const activities = slots.map(s => s.activity).filter(Boolean);
    if (!activities.length) { alert('No activities in lineup.'); return; }

    const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

    let html = `<div class="sl-header"><h1>Flying Pig Improv — Show Set List</h1><div class="sl-date">${today}</div></div>`;

    activities.forEach((a, idx) => {
        const rules = extractRules(a.fullMarkdown);
        const intro = a.introScript || '';
        const roles = a.roles || Array.from({length: parseInt(a.metadata.minimumPlayers)||2}, (_,i) => `Player ${i+1}`);

        const rulesHtml = rules.length
            ? `<div class="sl-section-label">Rules</div><ul class="sl-rules">${rules.map(r=>`<li>${r}</li>`).join('')}</ul>`
            : '';

        const introHtml = intro
            ? `<div class="sl-section-label">Intro Script</div><div class="sl-intro">${
                intro.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .split(/\n\n+/)
                    .map(para => `<p>${para.replace(/\n/g,'<br>')}</p>`)
                    .join('')
              }</div>`
            : '';

        const rolesHtml = `<div class="sl-section-label">Players</div><div class="sl-roles">${
            roles.map(r => `<div class="sl-role"><span class="sl-role-label">${r}:</span><span style="flex:1">&nbsp;</span></div>`).join('')
        }</div>`;

        html += `<div class="sl-game">
            <div class="sl-game-name">${idx+1}. ${a.name}</div>
            ${rulesHtml}${introHtml}${rolesHtml}
        </div>`;
    });

    document.getElementById('show-setlist').innerHTML = html;
    document.body.classList.add('printing-setlist');
    setTimeout(() => {
        window.print();
        document.body.classList.remove('printing-setlist');
    }, 150);
}
