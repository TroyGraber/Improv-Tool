<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flying Pig Improv Tool v1</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: clip; }

/* ── BASE ────────────────────────────────── */
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
  background: #f0f0f0;
  color: #111;
  font-size: 14px;
  min-height: 100vh;
}

/* ── HEADER ──────────────────────────────── */
#app-header {
  background: #1a3a5c;
  color: white;
  padding: 10px 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
#app-header h1 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.02em;
  padding-bottom: 8px;
  line-height: 1.2;
}
#app-header h1 span { opacity: 0.7; font-weight: 400; font-size: 13px; }
@media (max-width: 540px) {
  #app-header h1 { font-size: 15px; }
  #app-header h1 span { display: none; }
}
.tab-nav { display: flex; gap: 0; }
.tab-btn {
  background: none;
  border: none;
  color: rgba(255,255,255,0.65);
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  font-weight: 500;
  transition: all 0.15s;
}
.tab-btn:hover { color: white; }
.tab-btn.active { color: white; border-bottom-color: #5ba4e0; }
.feedback-btn {
  margin-left: auto;
  background: none;
  border: none;
  color: rgba(255,255,255,0.55);
  font-size: 12px;
  padding: 8px 12px 11px;
  cursor: pointer;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}
.feedback-btn:hover { color: white; }

/* ── TABS ────────────────────────────────── */
.tab { display: none; }
.tab.active { display: block; }

/* ── BROWSE TAB ──────────────────────────── */
#tab-browse { padding: 12px; }
.search-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 8px;
}
.search-row input {
  grid-column: 1 / -1;
  padding: 7px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 13px;
  background: white;
  width: 100%;
  box-sizing: border-box;
}
.search-row select {
  padding: 7px 4px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 12px;
  background: white;
  color: #333;
  width: 100%;
  box-sizing: border-box;
  min-width: 0;
}
@media (max-width: 600px) {
  .search-row { grid-template-columns: 1fr 1fr; }
}
.result-count {
  font-size: 11px;
  color: #888;
  margin-bottom: 8px;
}

/* ── ACTIVITY CARDS ─────────────────────── */
.activity-card {
  background: white;
  border: 1px solid #ddd;
  border-radius: 5px;
  margin-bottom: 6px;
  overflow: hidden;
}
.activity-card.expanded { border-color: #1a3a5c; }
.activity-header {
  padding: 10px 12px;
  cursor: pointer;
  user-select: none;
}
.activity-header:hover { background: #f8f8f8; }
.activity-name-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.activity-name {
  font-weight: 600;
  font-size: 14px;
  color: #111;
  flex: 1;
}
.expand-icon { color: #999; font-size: 11px; flex-shrink: 0; }
.activity-meta-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 4px;
  flex-wrap: wrap;
}
.activity-category {
  font-size: 11px;
  color: #777;
}
.activity-short-desc {
  font-size: 12px;
  color: #555;
  margin-top: 5px;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.activity-difficulty {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.diff-low     { background: #d4edda; color: #155724; }
.diff-mid-low { background: #e8f5c2; color: #3d6b1a; }
.diff-medium  { background: #fff3cd; color: #856404; }
.diff-mid-high{ background: #ffe5cc; color: #7d3800; }
.diff-high    { background: #f8d7da; color: #721c24; }

.badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.02em;
  vertical-align: middle;
  display: inline-block;
}
.badge-beginner { background: #cce5ff; color: #004085; }
.badge-advanced { background: #e2d9f3; color: #4a1d96; }
.badge-show     { background: #ffd6a5; color: #7d3800; }

/* ── ACTIVITY EXPANDED ───────────────────── */
.activity-full {
  border-top: 1px solid #eee;
  padding: 12px;
  background: #fafafa;
}
.activity-meta-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 4px 12px;
  margin-bottom: 10px;
  font-size: 12px;
  color: #444;
}
.meta-skills, .meta-use, .meta-avoid {
  font-size: 12px;
  color: #444;
  margin-bottom: 6px;
  line-height: 1.4;
}
.meta-avoid { color: #7d3800; }
.full-markdown {
  font-size: 12px;
  line-height: 1.5;
  color: #333;
  margin-top: 10px;
  border-top: 1px solid #e0e0e0;
  padding-top: 10px;
  max-height: 400px;
  overflow-y: auto;
  overflow-x: auto;
}
.full-markdown h1, .full-markdown h2, .full-markdown h3 {
  font-size: 12px;
  font-weight: 700;
  color: #1a3a5c;
  margin: 8px 0 4px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.full-markdown h1 { font-size: 13px; }
.full-markdown p { margin-bottom: 6px; }
.full-markdown ul { padding-left: 16px; margin-bottom: 6px; }
.full-markdown li { margin-bottom: 2px; }
.full-markdown strong { color: #222; }
.full-markdown hr { border: none; border-top: 1px solid #ddd; margin: 8px 0; }
.no-results { color: #888; font-size: 13px; padding: 20px; text-align: center; }

/* ── LINEUP TAB ──────────────────────────── */
#tab-lineup { padding: 12px; }
.mode-buttons {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.mode-btn {
  padding: 9px 16px;
  border: 2px solid #1a3a5c;
  background: white;
  color: #1a3a5c;
  font-size: 13px;
  font-weight: 600;
  border-radius: 5px;
  cursor: pointer;
  transition: all 0.15s;
}
.mode-btn:hover { background: #eef3f8; }
.mode-btn.active { background: #1a3a5c; color: white; }
.lineup-placeholder {
  text-align: center;
  color: #aaa;
  padding: 40px 20px;
  font-size: 13px;
}

.lineup-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
  gap: 10px;
  flex-wrap: wrap;
}
.lineup-title-row { display: flex; align-items: baseline; gap: 10px; }
.lineup-title-row h2 { font-size: 16px; color: #1a3a5c; }
.lineup-duration { font-size: 12px; color: #888; }
.print-btn {
  padding: 7px 14px;
  background: #1a3a5c;
  color: white;
  border: none;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
.print-btn:hover { background: #2a5080; }

.lineup-slot {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 5px;
  padding: 10px 12px;
  margin-bottom: 6px;
}
.slot-opening { border-left: 4px solid #5ba4e0; }
.slot-warmup  { border-left: 4px solid #6cc99a; }
.slot-circle  { border-left: 4px solid #6cc99a; }
.slot-capstone { border-left: 4px solid #f9a825; }
.slot-closer  { border-left: 4px solid #ef5350; }
.slot-shortform { border-left: 4px solid #7e57c2; }
.slot-longform  { border-left: 4px solid #26a69a; }
.slot-guessing  { border-left: 4px solid #ff7043; }
.slot-final     { border-left: 4px solid #ef5350; }
.slot-opener    { border-left: 4px solid #5ba4e0; }
.slot-formal-opening  { border-left: 4px solid #90a4ae; }
.slot-formal-closing  { border-left: 4px solid #90a4ae; }
.slot-early           { border-left: 4px solid #81c784; }
.slot-mid             { border-left: 4px solid #4db6ac; }
.slot-late            { border-left: 4px solid #7e57c2; }
.slot-skills          { border-left: 4px solid #26c6da; }
.slot-filler          { border-left: 4px solid #bdbdbd; }
.slot-conducted-song  { border-left: 4px solid #ffa726; }

.slot-number {
  font-size: 16px;
  font-weight: 700;
  color: #bbb;
  min-width: 24px;
  text-align: right;
  padding-top: 1px;
}
.slot-body { flex: 1; }
.slot-name { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 3px; }
.slot-name-link { cursor: pointer; text-decoration: underline; text-decoration-color: #bbb; text-underline-offset: 2px; }
.slot-name-link:hover { color: #1a3a5c; text-decoration-color: #1a3a5c; }
.slot-desc { font-size: 11px; color: #666; margin-bottom: 5px; line-height: 1.4; }
.slot-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.reason-tag {
  font-size: 10px;
  background: #eef0f2;
  color: #555;
  padding: 2px 6px;
  border-radius: 3px;
}
.slot-actions { flex-shrink: 0; padding-top: 2px; display: flex; flex-direction: row; gap: 8px; align-items: flex-start; }
.regen-btn {
  background: none;
  border: 1px solid #ccc;
  color: #555;
  padding: 9px 13px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.regen-btn:hover { background: #f0f0f0; border-color: #999; }
.pick-btn {
  background: none;
  border: 1px solid #ccc;
  color: #555;
  padding: 9px 13px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  min-width: 44px;
  min-height: 44px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  justify-content: center;
}
.pick-btn:hover { background: #eef3f8; border-color: #5ba4e0; color: #1a3a5c; }
.locked-icon { font-size: 12px; opacity: 0.4; }

/* ── ACTIVITY PICKER PANEL ───────────────── */
#activity-picker {
  position: fixed;
  background: white;
  border: 1px solid #ccc;
  border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  z-index: 1000;
  width: 240px;
  max-height: 280px;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
#activity-picker.open { display: flex; }
#picker-search {
  padding: 7px 10px;
  border: none;
  border-bottom: 1px solid #eee;
  font-size: 12px;
  outline: none;
  flex-shrink: 0;
}
#picker-list {
  overflow-y: auto;
  flex: 1;
}
.pick-item {
  padding: 10px 12px;
  font-size: 13px;
  cursor: pointer;
  color: #222;
  border-bottom: 1px solid #f5f5f5;
  min-height: 44px;
  display: flex;
  align-items: center;
}
.pick-item:hover { background: #eef3f8; color: #1a3a5c; }
.pick-item.current { font-weight: 600; background: #f0f4f8; }
#picker-empty { padding: 12px 10px; font-size: 12px; color: #aaa; text-align: center; }

/* ── PRINT VIEW (hidden on screen) ───────── */
#print-view { display: none; }

/* ── PRINT CSS ───────────────────────────── */
@media print {
  body, * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #app-header, #tab-browse, #tab-lineup { display: none !important; }
  #print-view {
    display: grid !important;
    grid-template-columns: 3.9in 3.9in;
    grid-template-rows: 3.25in 3.25in 3.25in;
    gap: 0;
    background: none;
    margin: 0;
    padding: 0;
  }
  .print-panel {
    width: 3.9in;
    height: 3.25in;
    overflow: hidden;
    border: 0.4pt solid #aaa;
    padding: 0.08in;
    font-family: Arial, Helvetica, sans-serif;
    position: relative;
    background: white;
  }
  /* All three sections span both columns */
  #pp1, #pp2, #pp3 {
    grid-column: 1 / 3;
    width: 7.8in;
    height: 3.25in;
    column-fill: auto;
    overflow: hidden;
  }
  /* Lineup and Skill Focus: 2 columns */
  #pp1, #pp2 {
    column-count: 2;
    column-gap: 0.2in;
  }
  /* Game Reference: 4 columns */
  #pp3 {
    column-count: 4;
    column-gap: 0.12in;
  }
  #pp4, #pp5, #pp6 { display: none !important; }
  .pp-title {
    font-size: 8pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #222;
    border-bottom: 1pt solid #333;
    padding-bottom: 2pt;
    margin-bottom: 3pt;
    line-height: 1.2;
    column-span: all;
  }
  .pp-subtitle {
    font-size: 7pt;
    color: #666;
    margin-bottom: 4pt;
    line-height: 1.2;
    column-span: all;
  }
  .pp-section-head {
    font-size: 6.5pt;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #444;
    border-bottom: 0.3pt solid #bbb;
    margin-top: 4pt;
    margin-bottom: 2pt;
  }
  .pp-divider {
    font-size: 6pt;
    color: #999;
    text-align: center;
    margin: 4pt 0 2pt;
    letter-spacing: 0.04em;
    break-before: avoid;
  }
  .pp-activity { margin-bottom: 3pt; break-inside: avoid; }
  .pp-activity-name { font-size: 8pt; font-weight: bold; color: #111; line-height: 1.2; }
  .pp-activity-desc { font-size: 7pt; color: #444; line-height: 1.25; padding-left: 9pt; }
  .pp-activity-tags { font-size: 6.5pt; color: #888; font-style: italic; line-height: 1.2; padding-left: 9pt; }
  .pp-look-row { margin-bottom: 3pt; break-inside: avoid; }
  .pp-look-game { font-size: 7.5pt; font-weight: bold; color: #222; line-height: 1.2; }
  .pp-look-cues { font-size: 7pt; color: #555; padding-left: 8pt; line-height: 1.25; }
  .pp-avoid { color: #8b4513; font-style: italic; }
  .pp-ref-cols { display: flex; gap: 0.1in; }
  .pp-ref-col { flex: 1; }
  .pp-ref-cat {
    font-size: 6.5pt;
    font-weight: bold;
    text-transform: uppercase;
    color: #333;
    border-bottom: 0.3pt solid #ccc;
    margin-top: 2pt;
    margin-bottom: 1pt;
  }
  .pp-ref-cat:first-child { margin-top: 0; }
  .pp-ref-game { font-size: 8pt; line-height: 1.15; color: #111; padding-left: 4pt; }
  @page { margin: 0.25in; size: 8.5in 11in portrait; }
}

/* ── ACTIVITY MODAL ─────────────────────── */
#activity-modal {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 500;
  background: rgba(0,0,0,0.45);
  padding: 16px;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
#activity-modal.open { display: flex; }
.modal-card {
  background: white;
  border-radius: 8px;
  width: 100%;
  max-width: 640px;
  max-height: calc(100vh - 32px);
  overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  display: flex;
  flex-direction: column;
  position: relative;
}
.modal-header {
  padding: 16px 40px 10px 16px;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  background: white;
  z-index: 1;
}
.modal-title { font-size: 17px; font-weight: 700; color: #111; margin-bottom: 4px; }
.modal-meta-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  background: none;
  border: none;
  font-size: 20px;
  color: #888;
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
  border-radius: 4px;
}
.modal-close:hover { background: #f0f0f0; color: #333; }
.modal-body { padding: 14px 16px 20px; }
.modal-meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4px 16px;
  font-size: 12px;
  color: #555;
  margin-bottom: 12px;
}
@media (max-width: 480px) {
  #activity-modal { padding: 0; align-items: flex-end; }
  .modal-card { border-radius: 12px 12px 0 0; max-height: 85vh; max-width: 100%; }
  .modal-meta-grid { grid-template-columns: 1fr; }
}

        .intro-script-block {
            background: #f0f4ff;
            border-left: 3px solid #4a6fa5;
            border-radius: 4px;
            padding: 10px 14px;
            margin: 10px 0 14px 0;
        }
        .intro-script-label {
            font-weight: 700;
            font-size: 0.8em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #4a6fa5;
            margin-bottom: 6px;
        }
        .intro-script-text {
            font-size: 0.88em;
            line-height: 1.6;
            white-space: normal;
            color: #1a1a2e;
        }
        .intro-script-text br + br {
            display: block;
            content: '';
            margin-top: 6px;
        }

        /* ── Custom Show ── */
        .custom-show-wrap { display: flex; gap: 14px; flex-wrap: wrap; }
        .custom-available { flex: 1 1 260px; min-width: 220px; }
        .custom-lineup-col { flex: 1 1 260px; min-width: 220px; }
        .custom-section-label {
            font-size: 11px; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: .05em;
            margin: 10px 0 4px;
        }
        .custom-avail-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 5px 8px; border-radius: 4px; margin-bottom: 3px;
            background: #f4f7fb; font-size: 13px;
        }
        .custom-avail-item:hover { background: #e8eef5; }
        .custom-add-btn {
            padding: 2px 9px; font-size: 11px; font-weight: 700;
            background: #1a3a5c; color: white; border: none;
            border-radius: 3px; cursor: pointer; white-space: nowrap;
        }
        .custom-add-btn:hover { background: #2a5a8c; }
        .custom-slot {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 8px; border-radius: 4px; margin-bottom: 4px;
            background: #fff; border: 1px solid #d0d8e4; font-size: 13px;
        }
        .custom-slot-num {
            font-weight: 700; color: #888; font-size: 11px;
            min-width: 18px; text-align: center;
        }
        .custom-slot-name { flex: 1; }
        .custom-slot-btns { display: flex; gap: 3px; }
        .custom-move-btn, .custom-remove-btn {
            padding: 1px 6px; font-size: 13px; border: 1px solid #bbb;
            background: white; border-radius: 3px; cursor: pointer; line-height: 1.4;
        }
        .custom-move-btn:hover { background: #eef3f8; }
        .custom-remove-btn { color: #c0392b; border-color: #e0b0b0; }
        .custom-remove-btn:hover { background: #fdf0ee; }
        .custom-empty { color: #aaa; font-size: 13px; padding: 16px 0; text-align: center; }
        .custom-lineup-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 6px;
        }
        .custom-clear-btn {
            font-size: 11px; color: #888; background: none; border: none;
            cursor: pointer; text-decoration: underline;
        }
        .custom-clear-btn:hover { color: #c0392b; }
        .custom-search {
            width: 100%; box-sizing: border-box; padding: 6px 8px;
            font-size: 13px; border: 1px solid #ccc; border-radius: 4px;
            margin-bottom: 6px;
        }

        @media (max-width: 540px) {
            .custom-show-wrap { flex-direction: column; }
            .custom-available, .custom-lineup-col { min-width: 0; width: 100%; }
            .custom-move-btn, .custom-remove-btn {
                padding: 6px 10px;
                font-size: 15px;
                min-width: 32px;
                min-height: 32px;
            }
            .custom-add-btn {
                padding: 5px 12px;
                font-size: 12px;
                min-height: 30px;
            }
            .custom-avail-item { padding: 7px 8px; }
            .custom-slot { padding: 8px; }
        }

        /* ── Show Set List Print ── */
        @media print {
            body.printing-setlist #app-header,
            body.printing-setlist #tab-browse,
            body.printing-setlist #tab-lineup,
            body.printing-setlist #print-view { display: none !important; }
            body.printing-setlist #show-setlist {
                display: block !important;
                font-family: Georgia, serif;
                font-size: 8.5pt;
                color: #000;
                padding: 0.3in 0.4in;
                width: 100%;
                box-sizing: border-box;
                columns: 2;
                column-gap: 0.3in;
            }

const DATASET = {"datasetName":"Flying Pig Improv Activity Dataset","version":"1.0","generatedDate":"2026-06-09","sourceFiles":{"catalogMarkdown":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","reviewedMetadataCsv":"flying_pig_activity_metadata_reviewed_v2.csv"},"notes":["Catalog markdown entries are preserved verbatim in fullMarkdown for each activity.","Metadata fields include first-pass tooling inferences and reviewed suitability decisions; they should not be treated as Flying Pig doctrine unless the catalog text explicitly says so.","Existential Crisis Opening and Existential Crisis Closing were removed from the dataset because Troy clarified they are not Flying Pig exercises.","Curriculum theme headings are excluded because they are analysis/doctrine sections, not runnable activities."],"schema":{"activityObject":{"id":"Stable slug for HTML anchors, search index keys, and recommendation references.","name":"Activity display name.","category":"Catalog category from reviewed metadata.","type":"Activity type from reviewed metadata.","formatRole":"Recommendation/filter role such as Warmup, Exercise, Short Form, Long Form, Closer, Ritual, or Show Ritual.","shortDescription":"Generated from the Purpose block or Best Use field; intended for list/card view.","metadata":"All reviewed metadata fields, converted to camelCase keys.","coreSkills":"Array parsed from the Core Skills metadata field.","tags":"Array parsed from the Tags metadata field.","fullMarkdown":"Verbatim markdown catalog entry for expanded/full view.","source":"File/source metadata and checksum for maintenance."}},"activityCount":88,"activities":[{"id":"jesses-opening-meditation","name":"Jesse’s Opening Meditation","category":"Rituals","type":"Class Structure / Opening Ritual","formatRole":"Ritual","shortDescription":"Transition students from ordinary life into class readiness; Ground students in breath, body, and presence.","metadata":{"catalogCategory":"Class Structures and Rituals","type":"Class Structure / Opening Ritual","standardHouseUnknownStatus":"Flying Pig House Practice","beginnerClassSuitability":"Warmup","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Ritual","playerCount":"Whole class","minimumPlayers":"1","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No / Optional","propsMaterialsNeeded":"No prop; quiet room","estimatedRuntime":"5–10 min","difficulty":"Low","energyLevel":"Low","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Class container and risk-readiness ritual","coreSkills":"presence; risk agreement; anti-judgment; class container","tags":"Ritual, High, presence, risk agreement, anti-judgment, class container","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["presence","risk agreement","anti-judgment","class container"],"tags":["Ritual","High","presence","risk agreement","anti-judgment","class container"],"fullMarkdown":"**Skills**\npresence; risk agreement; anti-judgment; class container\n\n**Structure**\n1. Breathe deeply from the belly — Jesse frames this as breathing from where *chi* lives. Eyes closed.\n2. Notice what appears in the darkness — floaters, light, images, whatever arises.\n3. Imagine a grounding cord running from the spine down to the center of the earth.\n4. Body scan: toes → feet → ankles → legs → torso → shoulders → neck → head → fingertips.\n5. Gratitude pause: “Think of all the people that came before, all the little choices they had to make for you to be here right now in this place.”\n6. Jesse references *The Four Agreements* by Don Miguel Ruiz and may recommend students read it. Three agreements follow:\n   - **Take a risk** — do something you haven’t done before.\n   - **Release judgment of others** in the room.\n   - **Release judgment of yourself** for the length of class.\n7. Return to breath: three deep breaths with hands raised high, released with an audible sigh.\n8. Open eyes.\n\n**Success Looks Like**\nStudents enter class present, risk-ready, and with reduced self-monitoring — ready to commit and fail visibly.\n\n**For Students**\n- The meditation runs 5–10 minutes — arrive ready to commit to it fully.\n- Let the framing work for you even if it’s unfamiliar; the functional purpose is presence and openness.\n- The three agreements are the heart of it: take a risk, release judgment of others, release judgment of yourself.\n- The last agreement is the hardest — put self-judgment away for the length of class and allow play to happen.\n\n**For Teachers**\n- This is a Flying Pig house ritual, not a generic warmup — do not substitute or abbreviate casually.\n- The three agreements map directly to improv skills: risk → bold offers; releasing judgment of others → acceptance; releasing self-judgment → commitment and recovery.\n- Jesse occasionally invites students to notice the *third eye* — the seat of inner vision in the Ajna chakra tradition — as part of the inward awareness phase.\n- Students may be surprised by the length, tone, or spiritual framing; a brief warning or introduction can reduce this friction.\n- At Flying Pig, Jesse prefers the meditation be done in her established form and sequence.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Jesse’s Opening Meditation","catalogCategoryFromMarkdown":"Class Structures and Rituals","markdownSha256Short":"145dde93ff8b1348"}},{"id":"zip-zap-zop","name":"Zip Zap Zop","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Focus; Eye contact.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"focus; eye contact; reaction speed; recovery","tags":"Warmup / Focus Exercise, Low, focus, eye contact, reaction speed, recovery","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["focus","eye contact","reaction speed","recovery"],"tags":["Warmup / Focus Exercise","Low","focus","eye contact","reaction speed","recovery"],"fullMarkdown":"**Skills**\nfocus; eye contact; reaction speed; recovery\n\n**Rules**\n- Players stand in a circle. The sequence passes in order: Zip → Zap → Zop.\n- Each pass requires clear eye contact and a deliberate point to the receiver.\n- The sequence resets after Zop and continues.\n\n**Success Looks Like**\nPasses are fast, clear, and connected — eye contact made before the word lands, no hesitation, mistakes acknowledged and moved through quickly.\n\n**For Students**\n- Make eye contact before you say the word — the point and word should arrive together.\n- Don't overthink which word comes next; trust the sequence and stay present.\n- When you make a mistake, recover quickly and keep the energy moving.\n\n**For Teachers**\n- This is a good activity to introduce celebrating failures: raise your hands and say joyfully, \"I failed!\" — then move on.\n- Once players are comfortable, instigate a \"war\" by passing the sequence right back to the player who sent it to you.\n- Encourage players to speed up after a few rounds.\n- Beginners start with standard Zip Zap Zop; introduce variants once the base is comfortable.\n- Watch for: hesitation before passing, weak eye contact, or players dwelling on mistakes instead of moving through them.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Zip Zap Zop","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"63c0465eaa45001e"}},{"id":"whiskey-mixers-misty-vistas-mr-whiskers","name":"Whiskey Mixers / Misty Vistas / Mr. Whiskers","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Concentration; Presence.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"4","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"focus; task switching; phrase-direction tracking","tags":"Warmup / Focus Exercise, Medium, focus, task switching, phrase-direction tracking","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["focus","task switching","phrase-direction tracking"],"tags":["Warmup / Focus Exercise","Medium","focus","task switching","phrase-direction tracking"],"fullMarkdown":"**Skills**\nfocus; task switching; phrase-direction tracking\n\n**Rules**\n- Players stand in a circle. The active player makes eye contact, uses an offering gesture, and passes one of three phrases to a target.\n- Each phrase sends the pass in a different direction:\n  - \"Whiskey Mixers\" → pass to the left\n  - \"Mr. Whiskers\" → pass to the right\n  - \"Misty Vistas\" → pass to any non-adjacent player\n- Mistakes are corrected in place. Speed increases until the tongue-twisters become the challenge.\n\n**Success Looks Like**\nPlayers respond to the phrase without hesitation; eye contact and gesture are clear; the circle maintains momentum as speed increases.\n\n**For Students**\n- Know the phrase-direction mappings before the round starts — don't learn them under pressure.\n- Use eye contact and a clear gesture so your target knows the pass is coming.\n- When you mess up the tongue-twister, correct it in place and keep going — don't restart the whole thing.\n\n**For Teachers**\n- Walk through the three phrases and directions before starting — the game breaks down fast if players aren't clear on the mappings.\n- The tongue-twister difficulty is the fun — let speed build naturally rather than forcing it.\n- Watch for players who respond to the wrong direction; that's usually a mapping confusion, not inattention.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Whiskey Mixers / Misty Vistas / Mr. Whiskers","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"f550d1236f0e9c0f"}},{"id":"ninja-star","name":"Ninja Star","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Commitment; Engagement.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Common improv/theatre variation","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Low","energyLevel":"High","physicalityLevel":"High","verbalLanguageLoad":"Low","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"physical commitment; energy; trajectory; receiving offers","tags":"Warmup / Focus Exercise, Low, physical commitment, energy, trajectory, receiving offers","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["physical commitment","energy","trajectory","receiving offers"],"tags":["Warmup / Focus Exercise","Low","physical commitment","energy","trajectory","receiving offers"],"fullMarkdown":"**Skills**\nphysical commitment; energy; trajectory; receiving offers\n\n**Rules**\n- Players stand in a circle. One player mimes throwing a ninja star to any other player, accompanied by a strong martial arts sound.\n- The receiver catches the star in a way that matches how it was thrown — honoring its weight, speed, and trajectory.\n- The receiver then throws to any other player. The pattern continues.\n\n**Success Looks Like**\nEach throw and catch feels physically committed; the star maintains consistent weight and energy as it travels around the circle.\n\n**For Students**\n- Commit fully to the throw — weak or half-hearted choices break the game.\n- When you catch, honor what was thrown: match its weight, speed, and trajectory.\n- Martial arts sounds are welcome and encouraged — energy matters more than getting the sound exactly right.\n\n**For Teachers**\n- The sound is called a *kiai* (pronounced kee-eye) — a term from Japanese martial arts used to express energy and intent through vocalization.\n- A good kiai should come from the *chi* — deep in the belly — not from the throat.\n- The goal is physical projection and full commitment, not technique or accuracy.\n- Watch for: half-committed throws, receivers who ignore trajectory, or energy dropping as the star passes around.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Ninja Star","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"ac7c3d40158979ad"}},{"id":"pass-the-sound","name":"Sound Ball","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Object work; sound/movement matching; trajectory.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Low","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"object work; sound/movement matching; trajectory","tags":"Warmup / Focus Exercise, Low, object work, sound/movement matching, trajectory","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["object work","sound/movement matching","trajectory"],"tags":["Warmup / Focus Exercise","Low","object work","sound/movement matching","trajectory"],"fullMarkdown":"**Skills**\nobject work; sound/movement matching; trajectory\n\n**Rules**\n- Players stand in a circle. The object begins as a buzzing, softball-sized imaginary object.\n- A player throws the ball with a sound to any other player.\n- On the catch, the receiver repeats the sound the thrower made.\n- Then the receiver creates a new sound and throws to the next player.\n- Preserve the object's weight, size, and trajectory throughout.\n\n**Success Looks Like**\nThe object feels consistent and real as it travels around the circle; sounds are honored on the catch and invented freshly on the throw.\n\n**For Students**\n- Repeat the sound when you catch — don't skip it or change it immediately.\n- Honor the object's weight and size; don't let it drift into something different.\n- Track where the object is coming from and receive it at the right trajectory.\n\n**For Teachers**\n- It's useful to demonstrate object work by pulling the Sound Ball out of an imaginary cabinet before play begins.\n- Jesse typically coaches when the object returns to her — use those moments to reset object consistency.\n- Watch for: receivers skipping the catch sound, the object losing its physical properties, or trajectory being ignored.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Pass the Sound","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"79653b2f6ae2e32e"}},{"id":"where-have-your-fingers-been","name":"Where Have Your Fingers Been","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Warm up quick character and scene creation; Practice tiny physical performance through the hands.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Unknown / Flying Pig observed warmup","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group; one active at a time","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid-Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Playful physical commitment; fast character; low-stakes three-line scene practice","coreSkills":"fast tiny scenes; physical specificity; prompt acceptance","tags":"Warmup / Focus Exercise, Medium, fast tiny scenes, physical specificity, prompt acceptance","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["fast tiny scenes","physical specificity","prompt acceptance"],"tags":["Warmup / Focus Exercise","Medium","fast tiny scenes","physical specificity","prompt acceptance"],"fullMarkdown":"**Skills**\nfast tiny scenes; physical specificity; prompt acceptance\n\n**Rules**\n- Players stand in a circle. The group chants: \"Where have your fingers been, oh where have your fingers been, whoo, whoo.\"\n- One player gives the next a setting or prompt (e.g., \"in the kitchen,\" \"at Starbucks,\" \"on an airplane\").\n- The receiving player uses their index fingers as characters and acts out a short three-line scene.\n- After performing, that player gives a new prompt to the next player. Repeat around the circle.\n\n**Success Looks Like**\nFingers behave as committed characters; scenes are brief and clear; players accept prompts quickly and pass good ones.\n\n**For Students**\n- Let your fingers be the characters — commit to the puppet logic rather than apologizing for it.\n- Keep it short: a simple relationship or conflict is enough for three lines.\n- Speed matters more than polish. Start before you have a plan.\n- Pass a prompt that's easy and fun to play — specific location, not a mood or concept.\n\n**For Teachers**\n- Jesse mainly reinforces the rules and structure rather than heavily coaching scene content.\n- Watch for: fingers that just point vaguely instead of playing characters, scenes that run too long, or prompts that are too vague to play quickly.\n- Self-consciousness is the biggest blocker — acknowledge the silliness and model commitment.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Where Have Your Fingers Been","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"3c27c5a8673a4084"}},{"id":"tongue-twisters","name":"Tongue Twisters","category":"Warmups","type":"Warmup / Articulation Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"Warm up articulation; Improve stage speech clarity.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup / Articulation Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Whole group","minimumPlayers":"1","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Low","energyLevel":"Low","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"articulation; projection readiness; diction","tags":"Warmup / Focus Exercise, Low, articulation, projection readiness, diction","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["articulation","projection readiness","diction"],"tags":["Warmup / Focus Exercise","Low","articulation","projection readiness","diction"],"fullMarkdown":"**Skills**\narticulation; projection readiness; diction\n\n**Rules**\n- The instructor provides a phrase; there is no fixed Flying Pig list — phrases rotate.\n- The group repeats or works the phrase as directed.\n- The emphasis is clarity over speed: clean vowels, full consonants, and finished final sounds.\n\n**Success Looks Like**\nPlayers finish every sound — including final consonants — at a volume and clarity that would carry to the back of a room.\n\n**For Students**\n- Don't rush for speed until the phrase is clear — clarity first, then pace.\n- Finish your words: final consonants get swallowed most often.\n- Keep vowels open and intentional; don't let them flatten under pressure.\n\n**For Teachers**\n- The goal is stage-readiness, not just getting through the phrase — resist letting it become a speed race.\n- Watch for: volume dropping as difficulty increases, mumbled consonants, or swallowed endings.\n- Suggested phrases: \"Red leather, yellow leather, red leather, yellow leather.\" / \"Unique New York, unique New York, you know you need unique New York.\" / \"She sells seashells by the seashore.\" / \"Toy boat, toy boat, toy boat.\"\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Tongue Twisters","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"8319da5fe9e15d0b"}},{"id":"a-to-b","name":"A to B","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Warm up associative thinking; Reduce hesitation.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"association; speed; listening; low filter","tags":"Warmup / Focus Exercise, Low, association, speed, listening, low filter","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["association","speed","listening","low filter"],"tags":["Warmup / Focus Exercise","Low","association","speed","listening","low filter"],"fullMarkdown":"**Skills**\nassociation; speed; listening; low filter\n\n**Rules**\n- Players stand in a circle. Player 1 says any word.\n- Each player immediately responds with the first word that comes to mind — no hesitation.\n- The goal is speed and honesty, not cleverness or originality.\n- In larger circles, multiple starting words can be active simultaneously.\n\n**Success Looks Like**\nThe circle flows fast and continuously; responses are honest rather than clever; players stop monitoring themselves and just play.\n\n**For Students**\n- Say the first word that comes to mind — the \"obvious\" association is usually the right one.\n- Don't pause to evaluate whether your response is interesting or funny.\n- Try not to repeat a word someone else has already used.\n- In A to C, your job is to step past the most predictable word into the next connected idea.\n- In No Nouns, watch for yourself defaulting to objects, names, or places.\n- Once comfortable, challenge yourself with a different methodology — rhyming, matching the first letter or sound, or starting with the last letter or sound of the previous word.\n\n**For Teachers**\n- The exercise is about lowering the filter, not expanding vocabulary — keep the emphasis on momentum.\n- Start multiple words simultaneously in large circles to increase load and force presence.\n- Encourage students to reflect on how they find their word — is the association based on sound, color, feeling, or something else?\n- Watch for: players trying to be funny, pausing too long, responding to a previous word rather than the most recent one, or the circle slowing into polite caution.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"A to B","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"ca770bde9020f28a"}},{"id":"bunny-bunny","name":"Bunny Bunny","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Build group rhythm; Warm up focus and reaction speed.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Late","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"5","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"High","energyLevel":"High","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"rhythm; focus; commitment; recovery","tags":"Warmup / Focus Exercise, High, rhythm, focus, commitment, recovery","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["rhythm","focus","commitment","recovery"],"tags":["Warmup / Focus Exercise","High","rhythm","focus","commitment","recovery"],"fullMarkdown":"**Skills**\nrhythm; focus; commitment; recovery\n\n**Rules**\n- Players stand in a circle. The group establishes a rhythmic chant underneath: \"Kum-chak-a, Kum-chak-a.\"\n- The active player holds up two fingers on each hand as the bunny. Fingers toward self: \"Bunny bunny.\" Fingers toward another player: \"Bunny bunny\" — passing the bunny to them.\n- The receiving player repeats: bunny toward self, then bunny toward someone else.\n- The players immediately to either side of the active bunny raise their hands and say \"Ticky tocky, ticky tocky.\"\n- Speed increases over time until it becomes controlled chaos.\n\n**Success Looks Like**\nThe chant stays strong; bunny passes are clear and directed; side players hit their cues; the group keeps its energy through mistakes.\n\n**For Students**\n- Make your bunny pass clear and directed — vague gestures lose the circle.\n- Stay in the chant even when you're not the active bunny; it holds everyone together.\n- Watch your neighbors — the \"Ticky tocky\" role arrives fast and without warning.\n\n**For Teachers**\n- Establish the chant before adding the bunny pass; the rhythm is the foundation.\n- Add \"Ticky tocky\" only after the basic pass is stable.\n- The goal is collective focus under playful pressure — perfection isn't the point, recovery is.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Bunny Bunny","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"97b3744fec13a08c"}},{"id":"bibbity-bibbity-bop","name":"Bibbity Bibbity Bop","category":"Warmups","type":"Warmup / Focus Exercise / Reaction Circle Game","formatRole":"Warmup / Focus Exercise","shortDescription":"Build focus and reaction speed; Train players to listen precisely under pressure.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup / Focus Exercise / Reaction Circle Game","standardHouseUnknownStatus":"Yes / Common improv warmup with Flying Pig rule set","beginnerClassSuitability":"Late","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle plus center player","minimumPlayers":"5","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"High","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"rule tracking; side-player awareness; reaction speed","tags":"Warmup / Focus Exercise, High, rule tracking, side-player awareness, reaction speed","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["rule tracking","side-player awareness","reaction speed"],"tags":["Warmup / Focus Exercise","High","rule tracking","side-player awareness","reaction speed"],"fullMarkdown":"**Skills**\nrule tracking; side-player awareness; reaction speed\n\n**Rules**\n- One player starts in the center and points at circle players with one of the calls below. If the targeted player or a required side player fails, they swap into the center.\n- Rules are added gradually, not all at once.\n\n\"Bibbity Bibbity Bop\"\n- Target: Say \"Bop\" before the center finishes their last \"Bop.\"\n\n\"Bop\"\n- Target: Say nothing. Any response = fail.\n\n\"Washing Machine\"\n- Target: Washing machine sounds + hands moving back and forth (7 sec).\n- Sides: Say \"Chugga Chugga\" while moving hands toward the target.\n\n\"Elephant\"\n- Target: Elephant trunk with arms + trumpet sound (7 sec).\n- Sides: Form the elephant's ears with their hands.\n\n\"Red Baron\"\n- Target: Goggles with hands + crashing plane scream (7 sec).\n- Sides: Arms out straight as wings — both tilt the same direction.\n\n\"Charlie's Angels\"\n- Target: Mime gun upright, say \"Freeze\" sassily (7 sec).\n- Left side: Karate-chop pose.\n- Right side: Talking-into-radio pose.\n\n**Success Looks Like**\nThe circle stays alert; side players support without delay; mistakes produce quick swaps, not embarrassment; physical images are big and readable.\n\n**For Students**\n- You're always potentially active — stay ready even when you're not the target.\n- The side-player roles are as important as the targeted-player role.\n- Commit physically and vocally. Small, tentative responses break the energy.\n\n**For Teachers**\n- Add rules gradually — don't introduce all six calls at once.\n- The center player should vary targets and calls to keep the whole circle alert.\n- Watch for players who only track whether they're targeted and stop watching their neighbors — the adjacent obligations are the harder skill.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Bibbity Bibbity Bop","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"d3714f849efe6836"}},{"id":"zoom-schwartz-mafigliano","name":"Zoom, Schwartz, Mafigliano","category":"Warmups","type":"Warmup / Focus Exercise / Passing Circle Game","formatRole":"Warmup / Focus Exercise","shortDescription":"Build focus and reaction speed; Practice passing attention clearly.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup / Focus Exercise / Passing Circle Game","standardHouseUnknownStatus":"Common improv warmup family with Flying Pig local call words and added rules","beginnerClassSuitability":"Late","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"5","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"High","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"rule tracking; directionality; blocking; recovery","tags":"Warmup / Focus Exercise, High, rule tracking, directionality, blocking, recovery","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["rule tracking","directionality","blocking","recovery"],"tags":["Warmup / Focus Exercise","High","rule tracking","directionality","blocking","recovery"],"fullMarkdown":"**Skills**\nrule tracking; directionality; blocking; recovery\n\n**Rules**\n- Players stand in a circle. One player is active at a time and uses a call to pass to someone else. Rules are added gradually.\n\n\"Zoom\" — Pass to any non-adjacent player. Cannot be used if you received a Zoom.\n\"Mafigliano\" — Pass to the player immediately to your left or right.\n\"Schwartz\" — Block an incoming pass. The passer must redirect. Schwartz does not make you active.\n\"Bork\" — Look left or right — pass goes one player past that neighbor (a skip).\n\"Twizzler\" — Look left or right — pass goes to the player behind you.\n\"Twizzler Bork\" — Look left or right — pass goes to the player on the far side of the player behind you.\n\"ZoomaZoomaZooma\" — Pass to a non-adjacent player, who must ZoomaZoomaZooma to another, who must do the same. Always a forced chain of three. A Schwartzed ZoomaZoomaZooma is not canceled; you must pick another target.\n\n**Success Looks Like**\nPasses are clear and fast; the circle tracks the active player; blocks are handled cleanly; later rules increase energy rather than collapsing the game.\n\n**For Students**\n- Stay engaged even when you're not active — Zoom and ZoomaZoomaZooma can arrive without warning.\n- Make eye contact, point decisively, speak loudly. Vague passes create confusion.\n- When you mess up, correct fast and keep going. Don't stop to explain.\n\n**For Teachers**\n- Start with Zoom and Mafigliano only. Add Schwartz next, then Bork and Twizzler, then ZoomaZoomaZooma last.\n- ZoomaZoomaZooma requires chain tracking — don't introduce it until the basic pass/block mechanics are solid.\n- The game works best when confusion is treated as part of the fun rather than a reason to stop.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Zoom, Schwartz, Mafigliano","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"06fcabfc3cdd8cc5"}},{"id":"i-like-butts","name":"I Like Butts","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Warm up rhythm; Practice simple rhyming.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Unknown; likely house/local variation","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"No","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid-Low","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Rhythm; rhyme; low-stakes silliness; vocal commitment","coreSkills":"rhythm; rhyme; vocal commitment","tags":"Warmup / Focus Exercise, High, rhythm, rhyme, vocal commitment","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["rhythm","rhyme","vocal commitment"],"tags":["Warmup / Focus Exercise","High","rhythm","rhyme","vocal commitment"],"fullMarkdown":"**Skills**\nrhythm; rhyme; vocal commitment\n\n**Rules**\n- Players stand in a circle and slap their thighs to establish a beat.\n- The group sings the setup phrase twice: \"I like butts, um um um.\"\n- Players then take turns adding a rhyming \"I like butts that…\" line to the same beat. Each line must rhyme with the previous player's ending.\n- Keep pace. Easy rhymes beat clever ones every time.\n- Example: \"I like butts that are big and hairy.\" / \"I like butts that are small and airy.\"\n\n**Success Looks Like**\nThe beat stays consistent; players commit and land their lines; near-rhymes delivered confidently are fine; nobody stops to judge.\n\n**For Students**\n- Listen for the final sound of the previous line — that's what you're rhyming with, not the whole sentence.\n- Simple and on-beat beats clever and late.\n- Near-rhymes are okay. Deliver them confidently and keep moving.\n\n**For Teachers**\n- Keep the thigh-slap beat audible — it's the lifeline for players who struggle with rhyming under pressure.\n- Don't let players pause to evaluate their own rhyme. Land it and move on.\n- If the group is struggling with rhyme in general, simpler drills before adding beat pressure will help more than repetition.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"I Like Butts","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"f5641bcc5f48fee8"}},{"id":"bad-rap","name":"Bad Rap","category":"Warmups","type":"Warmup / Circle Rap Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"Anti-rhyme; listening for expected rhyme; rhythm; quick verbal choice.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup / Circle Rap Exercise","standardHouseUnknownStatus":"Unknown; likely house/local variation","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"No","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Anti-rhyme; listening for expected rhyme; rhythm; quick verbal choice","coreSkills":"anti-rhyme; rhythm; listening; surprise","tags":"Warmup / Focus Exercise, Medium, anti-rhyme, rhythm, listening, surprise","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["anti-rhyme","rhythm","listening","surprise"],"tags":["Warmup / Focus Exercise","Medium","anti-rhyme","rhythm","listening","surprise"],"fullMarkdown":"**Skills**\nanti-rhyme; rhythm; listening; surprise\n\n**Rules**\n- Players stand in a circle and take turns in order.\n- Player 1 delivers a two-line rap. The first line ends naturally; the second line is set up to rhyme — but they stop just before the final word.\n- The next player completes the line with a word that makes sense but does not rhyme.\n- That player then starts a new two-line rap for the next person. Repeat around the circle.\n- Example: \"I went to the store to buy some bread / I came home and ate a lettuce… leaf.\"\n\n**Success Looks Like**\nThe circle flows with minimal pauses; setups create clear rhyme expectations; anti-rhymes land as surprise without stopping the rhythm.\n\n**For Students**\n- Set up an obvious rhyme — the clearer the expectation, the better the break.\n- The anti-rhyme should still make grammatical sense; nonsense is fine, incoherence isn't.\n- Don't overthink the anti-rhyme. Quick and wrong beats slow and clever.\n\n**For Teachers**\n- Coach players to set up a clear, obvious rhyme — vague setups make the anti-rhyme land flat.\n- Keep the energy up; hesitation kills the rhythm more than a weak anti-rhyme does.\n- Watch for players who accidentally rhyme — celebrate it as a mistake and move on.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Bad Rap","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"8e98543aaadcfaf0"}},{"id":"pass-the-clap","name":"Pass the Clap","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Build eye contact; Build group focus.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Early","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Low","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"eye contact; timing; shared impulse","tags":"Warmup / Focus Exercise, Low, eye contact, timing, shared impulse","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["eye contact","timing","shared impulse"],"tags":["Warmup / Focus Exercise","Low","eye contact","timing","shared impulse"],"fullMarkdown":"**Skills**\neye contact; timing; shared impulse\n\n**Rules**\n- Players stand in a circle. One player locks eyes with any other player.\n- The two players attempt to clap at exactly the same time.\n- The receiver then locks eyes with another player and passes the clap.\n- The clap may go to any player in the circle, including the one who just passed it.\n- The goal is a clean shared clap — connection matters more than speed.\n\n**Success Looks Like**\nClaps feel simultaneous and mutual — like two people arriving at the same moment together rather than one person signaling and the other reacting.\n\n**For Students**\n- Establish real eye contact before initiating — don't clap until you both know it's happening.\n- A clean slow clap is better than a rushed messy one.\n- Don't anticipate; wait for the shared moment to emerge.\n- Missed claps are useful feedback, not failures — recover and move on.\n\n**For Teachers**\n- Eye contact is the setup; the clap is the agreement — not the other way around.\n- This exercise reveals who is actually connecting versus who is performing the idea of connection.\n- Strong players make the receiving player feel seen and clear before initiating.\n- Watch for: players clapping before real contact is made, rushing the pass, or becoming self-conscious after a miss.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Pass the Clap","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"16916e731228cb20"}},{"id":"pass-the-face","name":"Pass the Face","category":"Warmups","type":"Warmup","formatRole":"Warmup / Focus Exercise","shortDescription":"Build close observation; Practice physical and vocal mirroring.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Late","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Low","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"observation; physical/vocal mimicry; exact transmission","tags":"Warmup / Focus Exercise, High, observation, physical/vocal mimicry, exact transmission","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["observation","physical/vocal mimicry","exact transmission"],"tags":["Warmup / Focus Exercise","High","observation","physical/vocal mimicry","exact transmission"],"fullMarkdown":"**Skills**\nobservation; physical/vocal mimicry; exact transmission\n\n**Rules**\n- Players stand in a circle. One player turns to the next and offers a facial expression, movement, and sound.\n- The receiving player watches closely, then turns to the next player and repeats it as accurately as possible.\n- The offer passes around the circle, naturally evolving through honest repetition. Multiple passes may run simultaneously in larger groups.\n- Reflect the version you received — not the original, and not an improved version.\n\n**Success Looks Like**\nPlayers commit fully to face, body, and sound; the offer mutates gradually through honest copying rather than lazy simplification or random exaggeration.\n\n**For Students**\n- Copy the player who passed to you — not the one who started it.\n- Everything matters: face, head angle, posture, sound, rhythm. Most players only copy the obvious feature.\n- Commit even if it feels silly. Laughing or breaking is what flattens the offer.\n\n**For Teachers**\n- The exercise is about receiving and transmitting, not improving. Coach players to resist the urge to \"fix\" the offer back toward the original.\n- Watch for simplification — players often believe they're copying accurately when they've only captured the most obvious feature.\n- Strong execution preserves the full physical score: eye shape, mouth, head angle, shoulders, weight, rhythm, breath, pitch, volume.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Pass the Face","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"fb51e7c981da5c5a"}},{"id":"123454321","name":"123454321","category":"Warmups","type":"Concentration Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"Presence; Mental flexibility.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Concentration Exercise","standardHouseUnknownStatus":"Unknown / Needs Review","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"No","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid-Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Low","bestUse":"Focus; listening; group rhythm; accuracy under light pressure","coreSkills":"working memory; pattern tracking; accuracy","tags":"Warmup / Focus Exercise, Medium, working memory, pattern tracking, accuracy","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["working memory","pattern tracking","accuracy"],"tags":["Warmup / Focus Exercise","Medium","working memory","pattern tracking","accuracy"],"fullMarkdown":"**Skills**\nworking memory; pattern tracking; accuracy\n\n**Rules**\n- Players stand in a circle and count sequentially: 1 → 2 → 3 → 4 → 5 → 4 → 3 → 2 → 1, then repeat.\n- Each player says the next number in the sequence. The goal is speed, accuracy, and listening.\n- When a mistake is made, the group corrects it in place until the right number is supplied — other players may give visual cues to help.\n\n**Success Looks Like**\nThe circle keeps a steady pace, corrections are quick and supportive, and players track the descending half of the pattern as confidently as the ascending.\n\n**For Students**\n- The tricky part is the descending half — stay present after 5 and don't rush back to 1.\n- When you make a mistake, stay calm; the group will help you find the right number.\n- Pay attention for the substitutions. Stay present so you know your order when it arrives at you, and whether you need to make a substitution.\n\n**For Teachers**\n- Keep the emphasis on group rhythm and recovery — not embarrassment when someone stumbles.\n- Substitutions should be added one at a time and should include different body movements — for instance, one that involves your legs and one that involves your hands.\n- Watch for: players freezing after a mistake, helpers being too loud and disruptive, or the circle losing pace after the 5.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"123454321","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"e95729559b82df84"}},{"id":"djever","name":"D’Jever","category":"Exercises","type":"Warmup / Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"Practice building a coherent sentence one word at a time; Encourage players to listen to the developing grammar of the offer.","metadata":{"catalogCategory":"Exercises","type":"Warmup / Exercise","standardHouseUnknownStatus":"Unknown; likely house-named variation","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"No","formatRole":"Warmup / Focus Exercise","playerCount":"Circle / sequence","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid-Low","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"One-word sentence construction; clean endings; grammar awareness; restraint","coreSkills":"one-word sentence construction; restraint; clean endings","tags":"Warmup / Focus Exercise, Medium, one-word sentence construction, restraint, clean endings","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["one-word sentence construction","restraint","clean endings"],"tags":["Warmup / Focus Exercise","Medium","one-word sentence construction","restraint","clean endings"],"fullMarkdown":"**Skills**\none-word sentence construction; restraint; clean endings\n\n**Rules**\n- Players stand in a circle. Player 1 begins with “D’jever” (short for “Did you
