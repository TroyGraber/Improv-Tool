 ever”).\n- Player 2 adds a verb. Each following player adds one word at a time.\n- The sentence ends at its first reasonable completion point — the next player starts a new sentence with “D’jever.”\n- Example: “D’jever” → “eat” → “a” → “sandwich” → “while” → “crying?”\n\n**Success Looks Like**\nSentences complete cleanly at their first natural ending; players serve the sentence rather than forcing a clever turn; restarts are confident.\n\n**For Students**\n- Listen for grammar and rhythm — your job is to serve the sentence, not surprise everyone.\n- End at the first reasonable completion; don’t keep adding clauses to make it funnier.\n- Don’t hesitate searching for a clever word — a simple word that fits is always right.\n\n**For Teachers**\n- Coach players to end at the first reasonable completion — this is the core discipline of the exercise.\n- A clear, simple question is better than a long, tortured one.\n- Watch for: sentences extended past their natural end, players trying to force a joke, or grammatically tangled constructions.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"D’Jever","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"cf909c208c431212"}},{"id":"mind-meld","name":"Mind Meld","category":"Warmups","type":"Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"Practice associative thinking; Build shared mental pathways between players.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","formatRole":"Warmup / Focus Exercise","playerCount":"Pairs within group","minimumPlayers":"2","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Warmup group focus, energy, and technical readiness","coreSkills":"association; convergence; eye contact; commitment","tags":"Warmup / Focus Exercise, Medium, association, convergence, eye contact, commitment","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["association","convergence","eye contact","commitment"],"tags":["Warmup / Focus Exercise","Medium","association","convergence","eye contact","commitment"],"fullMarkdown":"**Skills**\nassociation; convergence; eye contact; commitment\n\n**Rules**\n- Two players lock eyes and pump one hand in a karate-chop motion while counting down: \"3, 2, 1.\" On the count, each says a word simultaneously.\n- A new pair then locks eyes and tries to say the same word — connecting the two words the previous pair said.\n- If they match, success. If not, the next pair uses those two new words as their bridge. Continue until two players say the same word at the same time.\n- No repeating words that have already been said in the round.\n- Example: Pair 1 says \"dog\" / \"house\" → Pair 2 aims for something like \"kennel\" or \"yard\" — both words, not just one.\n\n**Success Looks Like**\nPlayers commit instantly and vocally; the group converges without debate; misses move quickly to the next pair rather than stalling.\n\n**For Students**\n- The goal is convergence, not originality — obvious is good.\n- Connect both previous words, not just the one you find more interesting.\n- Commit vocally and physically. Hesitation makes it harder for your partner to meet you.\n\n**For Teachers**\n- Passive players weaken this exercise — convergence requires choosing, not waiting for the obvious answer to appear.\n- Don't let players debate or explain a miss; move immediately to the next pair.\n- Eye contact is part of the exercise — it's about shared timing and mutual impulse, not just vocabulary.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Mind Meld","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"cc14d800a89a7ace"}},{"id":"five-things","name":"Five Things","category":"Closers","type":"Class Closer / Exercise","formatRole":"Closer","shortDescription":"First-instinct thinking; Confidence.","metadata":{"catalogCategory":"Closers","type":"Class Closer / Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Closer","advancedClassSuitability":"Closer","showSuitability":"Not primary show piece","formatRole":"Closer","playerCount":"Circle / one active at a time","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min","difficulty":"Low","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Positive class exit / group support","coreSkills":"fast association; confidence; supportive failure","tags":"Closer, Low, fast association, confidence, supportive failure","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["fast association","confidence","supportive failure"],"tags":["Closer","Low","fast association","confidence","supportive failure"],"fullMarkdown":"**Skills**\nfast association; confidence; supportive failure\n\n**Rules**\n- One player receives a prompt or category.\n- The player rapidly lists five examples.\n- The examples may be true, false, absurd, or only loosely connected.\n- Fast is more important than accurate.\n- After completing the list, that player creates a new prompt for the next player.\n- Players usually stand in a circle.\n- The next player is usually someone who has not gone yet.\n- In practice, players often pick someone across the circle, but the functional rule is to choose someone who has not gone.\n\n**Success Looks Like**\nFirst-instinct thinking; Confidence.\n\n**For Students**\n- Momentum matters more than truth.\n- The audience/group support should make the player feel like succeeding is inevitable.\n- The player should not apologize for weak answers.\n- The prompt-giver should not use the game to trap another player.\n\n**For Teachers**\n- Hesitation.\n- Searching for the perfect answer.\n- Freezing near the end of the list.\n- Momentum matters more than truth.\n- The audience/group support should make the player feel like succeeding is inevitable.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Five Things","catalogCategoryFromMarkdown":"Closers","markdownSha256Short":"45c07b7aa9880baf"}},{"id":"name-game","name":"Name Game","category":"Closers","type":"Class Closer","formatRole":"Closer","shortDescription":"Learn names; Build physical commitment.","metadata":{"catalogCategory":"Closers","type":"Class Closer","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Closer","advancedClassSuitability":"Closer","showSuitability":"Not primary show piece","formatRole":"Closer","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"Yes","propsMaterialsNeeded":"Music/audio, usually Uptown Funk","estimatedRuntime":"5–10 min","difficulty":"Low","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Positive class exit / group support","coreSkills":"name recall; group cohesion; physical offers","tags":"Closer, Low, name recall, group cohesion, physical offers","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["name recall","group cohesion","physical offers"],"tags":["Closer","Low","name recall","group cohesion","physical offers"],"fullMarkdown":"**Skills**\nname recall; group cohesion; physical offers\n\n**Rules**\nOne player states their name and performs a physical motion. The whole group repeats the name and mirrors the motion back. Continue around the circle until every player has introduced themselves. Optionally follow with a \"ripple\" pass: point to any player, the group names them and does their motion together.\n\n**Success Looks Like**\nEvery player's name can be recalled by the group without hesitation; motions are mirrored with commitment and warmth; the room feels connected and supportive rather than pressurized.\n\n**For Students**\n- Make the motion big enough to read and simple enough to repeat.\n- The goal is not dance skill; the goal is commitment and group memory.\n- The group should support imperfect recall rather than making mistakes feel costly.\n- The exercise works best when the room treats each motion as a gift.\n\n**For Teachers**\n- Tiny actions.\n- Self-consciousness.\n- Unrepeatable actions.\n- Make the motion big enough to read and simple enough to repeat.\n- The goal is not dance skill; the goal is commitment and group memory.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Name Game","catalogCategoryFromMarkdown":"Closers","markdownSha256Short":"f2a1a9bbe7ac11ff"}},{"id":"mirroring","name":"Mirroring","category":"Exercises","type":"Exercise","formatRole":"Exercise","shortDescription":"Physical listening; Awareness.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Pairs","minimumPlayers":"2","maximumPlayers":"Even class size preferred","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Low","energyLevel":"Low","physicalityLevel":"High","verbalLanguageLoad":"Low","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"physical listening; shared leadership; observation","tags":"Exercise, Low, physical listening, shared leadership, observation","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["physical listening","shared leadership","observation"],"tags":["Exercise","Low","physical listening","shared leadership","observation"],"fullMarkdown":"**Skills**\nphysical listening; shared leadership; observation\n\n**Rules**\nTwo players face each other and begin moving simultaneously, creating the illusion that neither is leading. One player initiates subtly; leadership passes back and forth without announcement or visible handoff. The goal is seamless, undetectable shared movement — neither clearly leading, neither clearly following.\n\n**Success Looks Like**\nAn outside observer cannot identify who is leading; transitions between leaders are invisible; the pair moves as a single unit; the pace stays slow enough that true copying is possible.\n\n**For Students**\n- The illusion of no leader matters more than clever movement.\n- Move slowly enough that your partner can actually copy you.\n- Leadership should pass back and forth naturally, not through an announced handoff.\n- Jesse commonly corrects over-leading.\n\n**For Teachers**\n- One player obviously leads for too long.\n- The follower waits passively instead of contributing to shared motion.\n- Leadership changes are too abrupt.\n- The illusion of no leader matters more than clever movement.\n- Move slowly enough that your partner can actually copy you.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Mirroring","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"e6341480047d1616"}},{"id":"i-am-a-tree","name":"I Am a Tree","category":"Exercises","type":"Exercise","formatRole":"Exercise","shortDescription":"Yes-And; Association.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Capstone","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Circle; 3 in center at a time","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"yes-and; association; embodiment; group composition","tags":"Exercise, Low, yes-and, association, embodiment, group composition","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["yes-and","association","embodiment","group composition"],"tags":["Exercise","Low","yes-and","association","embodiment","group composition"],"fullMarkdown":"**Skills**\nyes-and; association; embodiment; group composition\n\n**Rules**\nPlayer 1 strikes a pose and announces what they are (\"I am a tree\"). Player 2 joins the image and names something related (\"I am a cat in the tree\"). Player 3 adds a third element connected to the existing image. Player 1 then says \"I'll take ___\" — choosing one of the two other players to stay. The two not chosen leave. The remaining player becomes the new anchor and names themselves again, and the cycle repeats.\n\n**Success Looks Like**\nEach new image has a clear spatial and conceptual relationship; players join the image quickly without over-thinking; the anchor player's choice creates surprising but logical new directions; energy stays high and physical.\n\n**For Students**\n- Modify the immediately previous object.\n- Join the game rather than staying safely outside the circle.\n- Embody the offer physically.\n- Abstract concepts are allowed and often praised when they are clear and playable.\n\n**For Teachers**\n- Player 3 modifies Player 1 instead of Player 2.\n- Players stay too concrete when a more interesting association is available.\n- Players make weak physical choices.\n- Modify the immediately previous object.\n- Join the game rather than staying safely outside the circle.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"I Am a Tree","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"b1b265db761dd321"}},{"id":"3-line-scenes","name":"3-Line Scenes","category":"Exercises","type":"Exercise","formatRole":"Exercise","shortDescription":"Relationship; Gifting.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Capstone","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Two players","minimumPlayers":"2","maximumPlayers":"2","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"relationship; gifting; emotional clarity; initiation","tags":"Exercise, Low, relationship, gifting, emotional clarity, initiation","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["relationship","gifting","emotional clarity","initiation"],"tags":["Exercise","Low","relationship","gifting","emotional clarity","initiation"],"fullMarkdown":"**Skills**\nrelationship; gifting; emotional clarity; initiation\n\n**Rules**\n1. Opening gift\n2. Response and gift\n3. Follow-up\n\n**Success Looks Like**\nRelationship; Gifting.\n\n**For Students**\n- One of Flying Pig's core exercises.\n- Frequently the final exercise before stage games.\n\n**For Teachers**\n- Vague relationships\n- Question-answer scenes\n- Weak emotional clarity\n- One of Flying Pig's core exercises.\n- Frequently the final exercise before stage games.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"3-Line Scenes","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"7396f083a51f9a0c"}},{"id":"one-minute-scenes","name":"One Minute Scenes","category":"Exercises","type":"Scene Exercise","formatRole":"Exercise","shortDescription":"Practice fast scene initiation; Build playable who/what/where quickly.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Scene Exercise","standardHouseUnknownStatus":"Yes / Common scene-work exercise","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Two players","minimumPlayers":"2","maximumPlayers":"2","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"fast initiation; relationship; emotional readability; continuation","tags":"Exercise, Medium, fast initiation, relationship, emotional readability, continuation","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["fast initiation","relationship","emotional readability","continuation"],"tags":["Exercise","Medium","fast initiation","relationship","emotional readability","continuation"],"fullMarkdown":"**Skills**\nfast initiation; relationship; emotional readability; continuation\n\n**Rules**\nTwo players are given a relationship or starting point. They have one minute to establish and play a full scene with clear who/what/where and emotional stakes. The coach may call time, redirect, or reset mid-scene. The focus is speed of initiation — get to something playable as fast as possible.\n\n**Success Looks Like**\nWithin the first 15–20 seconds the relationship is clear and the emotion is readable; by the midpoint the scene has stakes; the players are reacting to each other rather than performing at the audience.\n\n**For Students**\n- Jesse’s coaching closely resembles 3-Line Scene coaching.\n- Common coaching targets include:\n  - relationship clarity,\n  - emotional readability,\n\n**For Teachers**\n- The scene does not establish relationship quickly enough.\n- Players create setting or premise without emotional stakes.\n- Players fail to show the level or category of emotion Jesse expects.\n- Jesse’s coaching closely resembles 3-Line Scene coaching.\n- Common coaching targets include:","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"One Minute Scenes","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"cc9edfcac6c351d5"}},{"id":"pass-the-muppet","name":"Pass the Muppet","category":"Exercises","type":"Character Exercise","formatRole":"Exercise","shortDescription":"Character creation; Point of view.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Character Exercise","standardHouseUnknownStatus":"Unknown / Needs Review","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"No","formatRole":"Exercise","playerCount":"Circle; 4-person cycle","minimumPlayers":"4","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Quick character assembly; accepting stacked gifts; POV; vocal/physical commitment","coreSkills":"fast character; POV; vocal/physical commitment","tags":"Exercise, Medium, fast character, POV, vocal/physical commitment","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["fast character","POV","vocal/physical commitment"],"tags":["Exercise","Medium","fast character","POV","vocal/physical commitment"],"fullMarkdown":"**Skills**\nfast character; POV; vocal/physical commitment\n\n**Rules**\nOne player describes a character aloud to the group: name, a brief physical description, and an occupation or role. A designated player must immediately deliver exactly one line of dialogue as that character, revealing their point of view. No extended scene is played — just one strong, committed line. Then repeat with a new character description.\n\n**Success Looks Like**\nThe one line instantly communicates the character's voice, worldview, and personality; the combination of name, physicality, and role collapses into a single readable impulse; an observer could cast that character in a full scene based on that line alone.\n\n**For Students**\n- Player 4 should make one strong character offer, not perform a whole scene.\n- The line should reveal the character’s point of view quickly.\n- The best offers combine the name, description, and role into one readable character impulse.\n- Physical and vocal commitment help the character read instantly.\n\n**For Teachers**\n- Player 4 turns the moment into a full scene instead of delivering one line.\n- Player 4 gives a generic line that does not reflect the name, description, or job.\n- The one-line character has no clear voice, body, or point of view.\n- Player 4 should make one strong character offer, not perform a whole scene.\n- The line should reveal the character’s point of view quickly.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Pass the Muppet","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"a8381b03216f4e66"}},{"id":"tell-a-story-one-word-at-a-time","name":"Tell a Story One Word at a Time","category":"Exercises","type":"Exercise / Circle Storytelling Game","formatRole":"Exercise","shortDescription":"Momentum; Acceptance.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Exercise / Circle Storytelling Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"grammar; listening; shared story; momentum","tags":"Exercise, Medium, grammar, listening, shared story, momentum","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["grammar","listening","shared story","momentum"],"tags":["Exercise","Medium","grammar","listening","shared story","momentum"],"fullMarkdown":"**Skills**\ngrammar; listening; shared story; momentum\n\n**Rules**\n- Players stand in a circle.\n- Jesse usually prompts the group with a starter phrase.\n- The most common starter is:\n  - “Once upon a time…”\n\n**Success Looks Like**\n- The story moves quickly.\n- Each word makes grammatical sense.\n- Players support the sentence rather than fighting for control.\n- Connector words appear when needed.\n- The story reaches a clear natural ending.\n- Jesse can call “The End” cleanly because the group has landed the story together.\n\n**For Students**\n- Speed matters, but the word still needs to make sense.\n- The story does not need to be brilliant; it needs to keep moving.\n- Connector words are often the most important support words.\n- A simple word that preserves grammar is usually better than a clever word that breaks the sentence.\n\n**For Teachers**\n- Hesitation.\n- Trying to control the story.\n- Skipping a necessary connector word.\n- Speed matters, but the word still needs to make sense.\n- The story does not need to be brilliant; it needs to keep moving.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Tell a Story One Word at a Time","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"455f8f6012ddffac"}},{"id":"neverending-story","name":"Neverending Story","category":"Exercises","type":"Structured Storytelling Exercise","formatRole":"Exercise","shortDescription":"Narrative causality; Listening.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Structured Storytelling Exercise","standardHouseUnknownStatus":"Common story-spine variation","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"causality; narrative structure; consequence","tags":"Exercise, Medium, causality, narrative structure, consequence","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["causality","narrative structure","consequence"],"tags":["Exercise","Medium","causality","narrative structure","consequence"],"fullMarkdown":"**Skills**\ncausality; narrative structure; consequence\n\n**Rules**\n- Players stand in a circle.\n- Jesse leads the structure by supplying story prompts.\n- Players complete each prompt with one sentence.\n\n**Success Looks Like**\n- Each sentence follows clearly from the previous sentence.\n- The story develops through cause and effect.\n- Players do not contradict earlier information.\n- The repeated “Because of that…” beats build momentum rather than randomness.\n- The final “ever since then” and moral feel earned by the story.\n\n**For Students**\n- “Because of that…” means the next sentence should be a consequence.\n- The player should ask: “What happened because of the sentence immediately before mine?”\n- The story does not need to be clever; it needs cause and effect.\n- Each sentence should preserve what came before.\n\n**For Teachers**\n- Breaking causality.\n- Responding to an earlier story beat instead of the immediately previous one.\n- Modifying a beat that was not directly previous to the player’s turn.\n- “Because of that…” means the next sentence should be a consequence.\n- The player should ask: “What happened because of the sentence immediately before mine?”","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Neverending Story","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"e80431c2936d8c69"}},{"id":"things-a-cowboy-says","name":"Things a Cowboy Says","category":"Exercises","type":"Group Sentence Exercise","formatRole":"Exercise","shortDescription":"Group mind; Shared sentence construction.","metadata":{"catalogCategory":"Exercises","type":"Group Sentence Exercise","standardHouseUnknownStatus":"Unknown / Flying Pig observed sentence-building exercise","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"No","formatRole":"Exercise","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Mid-Low","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"One-word sentence construction; grammar; recognizing natural endings; group timing","coreSkills":"sentence completion; restraint; group timing","tags":"Exercise, Medium, sentence completion, restraint, group timing","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["sentence completion","restraint","group timing"],"tags":["Exercise","Medium","sentence completion","restraint","group timing"],"fullMarkdown":"**Skills**\nsentence completion; restraint; group timing\n\n**Rules**\n- Players stand in a circle.\n- The group builds a cowboy-style saying one word at a time.\n- Jesse does not start the phrase with a fixed prompt such as “Things a cowboy says…”\n- The saying begins from the first player’s word.\n\n**Success Looks Like**\n- The sentence is grammatical.\n- The saying feels cowboy-flavored enough to fit the exercise.\n- The group recognizes the first natural ending.\n- “YEE HAW” lands cleanly.\n- The sentence does not get dragged past completion.\n\n**For Students**\n- Grammar matters.\n- The group should listen for when the sentence has become complete.\n- “YEE HAW” should be called at the first clean ending, not after the sentence has been overextended.\n- Like D’Jever, the exercise trains players to recognize completion and stop.\n\n**For Teachers**\n- Breaking grammar.\n- Adding too many words after the sentence is complete.\n- Missing the natural ending.\n- Grammar matters.\n- The group should listen for when the sentence has become complete.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Things a Cowboy Says","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"4748c446de26f88b"}},{"id":"space-and-object-work","name":"Space and Object Work","category":"Exercises","type":"Exercise","formatRole":"Exercise","shortDescription":"Develop believable object work; Build physical specificity.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Whole class individually","minimumPlayers":"1","maximumPlayers":"Class size","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–20 min depending reps","difficulty":"Mid","energyLevel":"Low","physicalityLevel":"Medium","verbalLanguageLoad":"Low","memoryTrackingLoad":"Low","audienceInteractionLevel":"Low","bestUse":"Skill-building reps before heavier scene or show work","coreSkills":"object permanence; silent specificity; environment","tags":"Exercise, Medium, object permanence, silent specificity, environment","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["object permanence","silent specificity","environment"],"tags":["Exercise","Medium","object permanence","silent specificity","environment"],"fullMarkdown":"**Skills**\nobject permanence; silent specificity; environment\n\n**Rules**\n- Jesse gives the class a simple physical prompt.\n- Examples include:\n  - getting yourself a glass of water,\n  - looking through an old photo album,\n  - arriving home from work.\n- The entire class performs the action silently.\n- Students repeat the action sequence multiple times.\n- Jesse walks around the room and gives individual critiques.\n- The exercise focuses on precision, physical clarity, and consistency rather than dialogue or scene invention.\n\n**Success Looks Like**\nDevelop believable object work; Build physical specificity.\n\n**For Students**\n- Treat imaginary objects as physically real.\n- Decide where the object is and keep it there.\n- Maintain consistent size, weight, and distance.\n- Slow down enough for the audience to read the action.\n\n**For Teachers**\n- Objects change size, height, or location during the exercise.\n- Players rush through the action without detail.\n- Players use vague hand-waving instead of specific physical interaction.\n- Treat imaginary objects as physically real.\n- Decide where the object is and keep it there.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Space and Object Work","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"4b63c9ef0b776fae"}},{"id":"5-second-delay","name":"5 Second Delay","category":"Exercises","type":"Exercise","formatRole":"Exercise","shortDescription":"Slow players down; Increase listening.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Exercise","standardHouseUnknownStatus":"Common Constraint Exercise / Exact Name Unknown","beginnerClassSuitability":"","advancedClassSuitability":"Exercise","showSuitability":"No","formatRole":"Exercise","playerCount":"Two players","minimumPlayers":"2","maximumPlayers":"2","requiresHost":"No documented","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"Short reps recommended; prior run took ~60 min for 14 students","difficulty":"High","energyLevel":"Low to Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Advanced listening; alive silence; emotional reaction; physical behavior between lines","coreSkills":"alive silence; listening; emotional reaction; patience","tags":"Exercise, High, alive silence, listening, emotional reaction, patience","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Advanced-only; exclude from beginner/general auto-suggestions unless manually selecting technical listening or silence drills."},"coreSkills":["alive silence","listening","emotional reaction","patience"],"tags":["Exercise","High","alive silence","listening","emotional reaction","patience"],"fullMarkdown":"**Skills**\nalive silence; listening; emotional reaction; patience\n\n**Rules**\n- Two players perform a scene.\n- Players must leave at least five seconds between lines of dialogue.\n- During the silence, players should remain active through:\n  - eye contact,\n  - physical behavior,\n  - emotional reaction,\n  - object work,\n  - status shifts,\n  - listening,\n  - letting the previous line affect them.\n- The scene continues normally, but the pace of spoken dialogue is deliberately slowed.\n- The delay applies between lines, not merely between speeches.\n\n**Success Looks Like**\nSlow players down; Increase listening.\n\n**For Students**\n- The silence must stay alive.\n- The goal is not merely to count to five; the goal is to let the previous offer affect the character.\n- During the delay, players should do something playable:\n  - react emotionally,\n\n**For Teachers**\n- Players forget the delay and respond immediately.\n- Players become visibly anxious during silence.\n- Players treat the pause as dead air instead of playable time.\n- The silence must stay alive.\n- The goal is not merely to count to five; the goal is to let the previous offer affect the character.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"5 Second Delay","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"c223e98b689aeaf3"}},{"id":"1-minute-fairy-tale","name":"1 Minute Fairy Tale","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Story compression; Editing.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"3-5 performers plus host","minimumPlayers":"4","maximumPlayers":"6","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"story compression; time pressure; ensemble coordination","tags":"Short Form, Medium-High, story compression, time pressure, ensemble coordination, audience, host, Half Life, Half-Life, Replay Compression, Time Compression, Scene Compression","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["story compression","time pressure","ensemble coordination"],"tags":["Short Form","Medium-High","story compression","time pressure","ensemble coordination","audience","host","Half Life","Half-Life","Replay Compression","Time Compression","Scene Compression"],"roles":["Host","Player 1","Player 2","Player 3","Player 4"],"fullMarkdown":"**Skills**\nstory compression; time pressure; ensemble coordination\n\n**Rules**\n- Host gets a fairy tale or well-known story from the audience. At least one player must know it. Players get a brief organizing period — keep it quick.\n- Players perform the same story repeatedly, each version compressed into a shorter time limit. The host times each round and calls time.\n- Each version should compress the established interpretation — not introduce new beats. The 1-second version is always the finale.\n- Time limits: 60 sec → 30 sec → 15 sec → 7 sec → 3.5 sec → 1 sec\n\n**Success Looks Like**\nThe same recognizable story landmarks survive every compression; physical shorthand gets bigger as time shrinks; the 1-second finale lands as a button.\n\n**For Students**\n- Agree on the essential beats before you start — you'll be compressing those, not inventing new ones.\n- Physical storytelling becomes more important as words disappear. Make it big and readable.\n- The story under pressure should feel like the same story, just faster — not a different scene.\n\n**For Teachers**\n- Keep the planning period short — long prep kills the energy before the game begins.\n- The host should bring energy around each time cut and manage the audience while players organize between rounds.\n- Watch for players dropping the main arc in later rounds. The comedy comes from recognizable compression, not random chaos.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"1 Minute Fairy Tale","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"0f7594f3133b3e1e"}},{"id":"why-were-you-late","name":"Excuses","category":"Short Form","type":"Guessing Game","formatRole":"Short Form","shortDescription":"A guessing game in which a late employee must piece together the wild excuse stories their co-workers invented on their behalf.","metadata":{"catalogCategory":"Short Form Games","type":"Guessing Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Typically 4-5 players","minimumPlayers":"4","maximumPlayers":"5","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"High","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"guessing; charades support; host/boss steering","tags":"Short Form, Medium-High, guessing, charades support, host/boss steering, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["guessing","charades support","host/boss steering"],"tags":["Short Form","Medium-High","guessing","charades support","host/boss steering","audience","host","Why Were You Late","Late for Work"],"roles":["Boss","Coworker 1","Coworker 2","Late Person"],"introScript":"Our next game is a guessing game, so we need [Player 1] to step outside.\n\n[Player 1 leaves.]\n\n[In character as Boss, to coworkers:] Now that they're gone — may I please have a reason someone might be late for work? (audience get)\n\n[fake name] is late again. They told me it was (get) — but there's no way (get) would make you this late.\n\n[Coworker 1 — Player 2:] Yeah, you don't have the whole story. You see, after (get), they (add a new escalating reason).\n\n[Boss:] Wow. Is that all?\n\n[Coworker 2 — Player 3:] Not quite. After (Coworker 1's addition), they (add another escalating reason).\n\n[Boss:] Well, when they get in here, their story better match yours — or all of you are fired.\n\nBefore we bring them back — if [Player 1]'s guess is close, give them snaps (demonstrate). If they get it exactly right, give them a clap.\n\nLet's bring [Player 1] back in.\n\nThis is Why Were You Late.","fullMarkdown":"**Skills**\nguessing; charades support; narrative matching; boss/host steering\n\n**Flying Pig Name**\nThis game is called *Excuses* at Flying Pig. It may appear elsewhere as *Why Were You Late?* or *Late for Work*.\n\n**Setup**\n- Three players: a Boss, two Co-workers, and one Late Person (the guesser).\n- The guesser leaves the room.\n\n**Rules**\n1. The Boss solicits a mundane get from the audience — something ordinary and unremarkable. Example: *\"Cat vomited on carpet.\"*\n2. The Boss tells the two Co-workers the mundane get, then — staying in character — solicits one outrageous excuse story from each Co-worker. These are big, specific, creative narratives. Examples:\n   - *\"A troll dropped through the sunroof, and he had to do battle with the troll, and kick him out of the moving car.\"*\n   - *\"A whole truckload of Barbies spilled on the interstate, and the co-worker was too much of a gentleman to run over a woman, so he ran over the one and only Ken doll instead, and the Ken doll stuck into his tire and gave him a flat.\"*\n3. The Boss frames the stakes: *\"That seems ridiculous. His story had better match yours, or you're all fired.\"*\n4. The Late Person returns and begins guessing — the Co-workers charade their stories while the Late Person works to reconstruct them.\n\n**Success Looks Like**\nThe Late Person narrates an increasingly specific version of the Co-workers' wild stories; the Boss steers without solving; the Co-workers' charades are physical and readable; the excuse story that emerges is recognizably close to what was set up.\n\n**For Students**\n- Co-workers: work as a team when charading — you are jointly responsible for conveying all of the excuse stories, not just your own.\n- The Late Person: guess actively. Start with category (person? place? action?) and narrow from there.\n- Boss: your job is to keep the scene alive and hint without giving it away.\n\n**For Teachers**\n- The Boss role is the most critical — they manage the guesser, Co-workers, and audience simultaneously.\n- The mundane get from the audience contrasts with the wild co-worker stories; that contrast is where the comedy lives.\n- Watch for Co-workers who give uncharadeable stories — coach toward visual, physical, breakable-into-parts narratives.\n\n---","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Why Were You Late?","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"95e3022ad79183fe"}},{"id":"freeze-tag","name":"Freeze Tag","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice initiation; Encourage physicality.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common variation; Flying Pig version replaces both frozen players","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Usually about 6; scalable","minimumPlayers":"4","maximumPlayers":"Large group","requiresHost":"Maybe / format-dependent","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"High","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"physical initiation; justification; edits","tags":"Short Form, Medium-High, physical initiation, justification, edits","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["physical initiation","justification","edits"],"tags":["Short Form","Medium-High","physical initiation","justification","edits"],"roles":["Player 1","Player 2","Player 3","Player 4","Player 5","Player 6"],"introScript":"Our next game is for all [number] players. [Player 1] and [Player 2] are going to start a scene, and any time they want, another player can shout freeze and take their place.\n\nTo get us started, may I please have (audience get).\n\n[Confirm get.]\n\nThis is Freeze Tag.","fullMarkdown":"**Skills**\nphysical initiation; justification; edits\n\n**Rules**\n- Two players begin a scene. Offstage players watch for interesting physical positions.\n- An offstage player calls \"Freeze!\" — both onstage performers stop immediately.\n- Flying Pig version: two offstage players enter. Each tags the player they want to replace — the tag is what gives that player permission to leave. Both original performers exit.\n- Each new player takes the exact frozen position of the player they tagged, justifies it, and starts a completely new, unrelated scene. Repeat.\n\n**Success Looks Like**\nNew scenes start immediately and distinctly; frozen positions are honored and justified; physical choices are bold enough to inspire real premises.\n\n**For Students**\n- Call \"Freeze\" when the stage picture gives you an idea — not just to get onstage.\n- Take the position first; let it tell you the scene, relationship, or environment.\n- Create interesting physical pictures while you're onstage so others have something to work with.\n\n**For Teachers**\n- The game lives or dies on physicality. Talking-head scenes starve it.\n- Coach players to call \"Freeze\" with a plan, not out of impatience or obligation.\n- Watch for new players who ignore the frozen position — the physical picture is the whole point of the edit.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Freeze Tag","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"b56947122cc1b5d0"}},{"id":"story-story-die","name":"Story, Story, Die!","category":"Short Form","type":"Elimination Storytelling Game","formatRole":"Short Form","shortDescription":"Practice listening; Build verbal agility.","metadata":{"catalogCategory":"Short Form Games","type":"Elimination Storytelling Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Director plus several storytellers","minimumPlayers":"4","maximumPlayers":"Large group","requiresHost":"Yes","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"instant continuation; narrative pressure; playful failure","tags":"Short Form, Medium-High, instant continuation, narrative pressure, playful failure, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["instant continuation","narrative pressure","playful failure"],"tags":["Short Form","Medium-High","instant continuation","narrative pressure","playful failure","host"],"roles":["Host / Pointer","Player 1","Player 2","Player 3","Player 4","Player 5"],"introScript":"Our next game involves all [number] players.\n\nI'm going to point at a player and they're going to tell a story. When I switch who I'm pointing at, that player has to continue the story from exactly where the previous player left off.\n\nAnd if they don't continue it perfectly — you're going to yell die. Let's practice. Everyone say die!\n\n[Audience yells die.]\n\nTo get us started, may I please have (audience get — a creature or character).\n\n[Confirm get.]\n\nAnd may I please have (audience get — an emotion, name, or adjective; shape it so it will combine naturally with the first get into a title without telegraphing the link).\n\n[Confirm get.]\n\nThe (get two) (get one) — Chapter One.","fullMarkdown":"**Skills**\ninstant continuation; narrative pressure; playful failure\n\n**Rules**\nStorytellers stand in a line. The director points to one — that player immediately continues a shared story.\n\nThe director points to another player at any moment; that player must continue from the exact word where the story was handed off.\n\nIf a player hesitates, stutters, or fails to continue instantly, the audience yells \"DIE!\" — the player gets a death suggestion from the audience, performs it, and becomes a corpse onstage.\n\nThe last remaining storyteller delivers the moral of the story. The audience votes whether they live or die.\n\n**Success Looks Like**\nThe story flows seamlessly across players; deaths are quick and funny; the director creates real pressure; the final moral feels like a button.\n\n**For Students**\nContinue immediately — don't repeat the previous player's last words to buy time.\n\nDon't plan ahead. Listen. Trust the first continuation that appears.\n\nThe story doesn't need to be brilliant; it needs to keep moving.\n\nAfter elimination, commit to your death and then stay still — don't steal focus as a corpse.\n\n**For Teachers**\nDirectors: point clearly and switch often enough to create pressure. Hunt kills as the field narrows.\n\nCommon failure: players repeat the previous player's final words as a stall — call it immediately.\n\nRestarting the sentence structure is also a failure. The continuation must pick up mid-thought.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Story, Story, Die!","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"9777fb4f26f15da2"}},{"id":"four-square","name":"Four Square","category":"Short Form","type":"Scene Game","formatRole":"Short Form","shortDescription":"Practice relationship tracking; Build continuity across multiple scenes.","metadata":{"catalogCategory":"Short Form Games","type":"Scene Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"4 players plus host","minimumPlayers":"5","maximumPlayers":"5","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"Yes","propsMaterialsNeeded":"Open stage space; host rotation calls","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"scene memory; context switching; relationship tracking","tags":"Short Form, High, scene memory, context switching, relationship tracking, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["scene memory","context switching","relationship tracking"],"tags":["Short Form","High","scene memory","context switching","relationship tracking","audience","host"],"fullMarkdown":"**Skills**\nscene memory; context switching; relationship tracking\n\n**Rules**\n- Once each side has a suggestion, the game begins.\n- Only the side facing the audience is active.\n- The active pair performs the scene associated with that side.\n- At any time, the host may rotate the square.\n- Common rotation calls include:\n  - “One to the left.”\n  - “One to the right.”\n  - “Two to the left.”\n  - “Two to the right.”\n- When the square rotates, the newly front-facing side resumes its own scene.\n- Each side preserves its own relationship, premise, and emotional history.\n- Scenes often return after a time jump rather than resuming from the exact previous second.\n\n**Success Looks Like**\n- The audience can distinguish all four worlds.\n- Relationships remain clear when revisited.\n- Time jumps advance the relationship or situation.\n- Players immediately know which scene they are in after a rotation.\n- The host’s rotations create momentum and contrast.\n- The game feels like four living scenes rather than four repeated premises.\n\n---\n\n**For Students**\n- Each side needs a distinct relationship and emotional engine.\n- When a scene returns, it should continue or advance, not reset.\n- Time jumps can help the scene evolve.\n- The audience should be able to immediately recognize which scene has returned.\n- Emotional stakes and relationship clarity matter more than the rotation mechanic.\n- Strong players re-enter the scene with confidence, as if no time has passed for the performers even if time has passed in the world.\n\n**For Teachers**\n- Losing track of which relationship belongs to which side.\n- Bleeding information from one scene into another.\n- Restarting a scene instead of continuing it.\n- Returning to a scene and replaying the same emotional beat.\n- Spending too much time re-establishing context.\n- Scenes are not distinct enough from each other.\n- Players forget what changed during a prior visit.\n- Host rotations are too chaotic before scenes are established.\n- Host rotations are too predictable after the game is underway.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Four Square","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"79b7463164bc3ce8"}},{"id":"three-headed-expert","name":"Three-Headed Expert","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice listening; Build collaborative speaking.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Host plus three experts","minimumPlayers":"4","maximumPlayers":"4","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"High","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"one-word group speaking; confidence; hosting; audience questions","tags":"Short Form, Medium-High, one-word group speaking, confidence, hosting, audience questions, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["one-word group speaking","confidence","hosting","audience questions"],"tags":["Short Form","Medium-High","one-word group speaking","confidence","hosting","audience questions","audience","host"],"fullMarkdown":"**Skills**\none-word group speaking; confidence; hosting; audience questions\n\n**Rules**\nThree players form a single expert. The host begins by asking the expert their name — the three answer one word at a time.\n\nThe host asks one or two warm-up questions to establish the rhythm, then opens the floor to audience questions.\n\nThe expert answers every question one word at a time, with total authority, regardless of whether the answer makes sense.\n\nExample audience question: \"People are talking about orbital data centers — but given they're limited to radiative heat, how do you recommend they mitigate excess thermal energy?\"\n\n**Success Looks Like**\nThe expert sounds like one confident mind; the audience enjoys watching authority applied to impossible questions; the host keeps the rhythm and picks strong questions.\n\n**For Students**\nConfidence matters more than correctness. Commit to the answer — the expert always knows.\n\nDon't try to be individually funny. Support the shared sentence. Listen for where it's going.\n\nTreat impossible questions as answerable. The gap between authority and nonsense is the comedy.\n\n**For Teachers**\nThe host's first questions establish permission — they show the audience what kind of questions make the game work.\n\nStrong audience questions are technical, specialized, philosophical, or otherwise unanswerable by any real person.\n\nCommon failure: experts lack confidence and the answer becomes slow and timid. Redirect to authority over accuracy.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Three-Headed Expert","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"b4b3523a03b0931c"}},{"id":"good-bad-worse","name":"Good, Bad, Worse","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice escalation; Create clear contrast.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"No","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Host plus three players","minimumPlayers":"4","maximumPlayers":"4","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Escalation; contrast; concise joke structure; advice framing","coreSkills":"escalation; contrast; concise advice jokes","tags":"Short Form, Medium-High, escalation, contrast, concise advice jokes, audience, host","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["escalation","contrast","concise advice jokes"],"tags":["Short Form","Medium-High","escalation","contrast","concise advice jokes","audience","host"],"fullMarkdown":"**Skills**\nescalation; contrast; concise advice jokes\n\n**Rules**\n- Host gets a domain of knowledge from the audience (e.g., dating, medicine, parenting). Three players take fixed roles — Good, Bad, Worse — for the entire game.\n- The host asks a question in that domain. Good gives reasonable advice. Bad gives bad advice. Worse tops Bad with something more disastrous or absurd.\n- Repeat through multiple questions. Roles do not rotate. Host ends the game before the pattern wears out.\n\n**Success Looks Like**\nThe audience immediately hears the progression; Worse reliably tops Bad; answers are short and clear; the contrast between roles is obvious.\n\n**For Students**\n- Good establishes the baseline — play it straight so the contrast lands.\n- Bad should clearly violate good judgment. Worse should top Bad, not just repeat it.\n- Short answers work better. Don't explain the joke — land it and stop.\n\n**For Teachers**\n- The most common failure: Bad isn't bad enough, so Worse has nowhere to go. Coach players to commit to their tier.\n- The host's questions should make escalation easy — specific, situational prompts beat vague ones.\n- Watch for Good playing for jokes — it undermines the contrast the whole game depends on.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Good, Bad, Worse","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"3ca20dc61f71b67b"}},{"id":"the-dating-game","name":"The Dating Game","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice character-based hinting; Practice guessing from indirect clues.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common Short Form / Guessing Game","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Guesser, 3 contestants, usually host","minimumPlayers":"5","maximumPlayers":"5","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"High","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"character hinting; guessing; host control","tags":"Short Form, Medium-High, character hinting, guessing, host control, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["character hinting","guessing","host control"],"tags":["Short Form","Medium-High","character hinting","guessing","host control","audience","host"],"roles":["Host / MC","Contestant (guesser)","Date 1","Date 2","Date 3"],"introScript":"Our next game is a guessing game, which means [Player 1] has to leave the room.\n\n[Player 1 leaves.]\n\nAll right, now that they're gone, I need your help setting up the game.\n\nMay I please have (audience get — assign to Player 2).\n\nFor [Player 3], may I please have (audience get — assign to Player 3).\n\nAnd for [Player 4], may I please have (audience get — assign to Player 4).\n\nLet's bring our contestant back in.\n\nContestant, can I have your name please?\n\n[Player 1 gives a fake name.]\n\nWe have three lovely potential dates for you tonight.\n\nThis is the Dating Game.\n\n[Note: This is an audience-feedback guessing game. Before bringing the guesser back in, teach the audience: snaps for close, clap for exactly right.]","fullMarkdown":"**Skills**\ncharacter hinting; guessing; host control\n\n**Rules**\nThe guesser leaves. The audience gives three different identity suggestions — each contestant gets one (identities vary by type: animal, profession, character trait, fear, historical figure, etc.).\n\nThe guesser returns and asks each contestant ~3–4 dating-show-style questions. Contestants answer in character, hinting without giving away the answer.\n\nGuessing happens at the end — one contestant at a time. If the guesser is close but not exact, the contestant or host gives a hint.\n\nSample identity set: \"Has not slept in three days\" · \"Forest nymph\" · \"Chemical engineer\"\n\nStrong questions: \"Where would you take me on our first date?\" · \"What gift would you bring my parents?\" · \"What would ruin our honeymoon?\"\n\n**Success Looks Like**\nEach contestant is distinct and playable; answers are funny while still functioning as hints; the final guesses feel earned; hints close gaps without dragging.\n\n**For Students**\nBe helpful but not obvious. Answer through worldview, metaphor, and emotional reaction — not just facts about your identity.\n\nDon't hide so much that the game stalls, but don't give it away in the first answer either.\n\nLet the identity shape everything: voice, posture, word choice, what you find romantic or scary.\n\n**For Teachers**\nChoose or shape identities so each contestant has a distinct clue path — three similar identities make the game flat.\n\nCommon failure: contestants treat the identity as trivia instead of a playable character. Redirect to behavior and worldview.\n\nThe final guessing should be supported, not punitive. Hints from contestants or the host keep the ending from dragging.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"The Dating Game","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"112f809a00b3d73e"}},{"id":"job-interview","name":"Job Interview","category":"Short Form","type":"Short Form Guessing Game","formatRole":"Short Form","shortDescription":"Practice guessing out loud; Practice giving useful hints while staying in character.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Guessing Game","standardHouseUnknownStatus":"Unknown / Common guessing-game family","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Guesser, 3 interviewers, host","minimumPlayers":"5","maximumPlayers":"5","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"High","bestUse":"Guessing; hint-giving; audience feedback; structured interview frame","coreSkills":"guessing; supportive hinting; interview frame","tags":"Short Form, Medium-High, guessing, supportive hinting, interview frame, audience, host","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["guessing","supportive hinting","interview frame"],"tags":["Short Form","Medium-High","guessing","supportive hinting","interview frame","audience","host"],"roles":["Interviewer","Candidate (guesser)","Audience Panelist 1","Audience Panelist 2"],"fullMarkdown":"**Skills**\nguessing; supportive hinting; interview frame\n\n**Rules**\n- The guesser leaves the room. Host gets three hidden audience suggestions: a job, the place where it takes place, and an odd uniform.\n- Three players sit as interviewers who know the hidden answers. Guesser returns as the job applicant.\n- Interviewers ask questions that contain clues about the hidden components — staying in the interview frame throughout.\n- Guesser guesses out loud. Audience snaps = close; claps = correct component.\n- Example: Nap Coordinator · Prison · Space Suit.\n\n**Success Looks Like**\nThe guesser keeps guessing out loud; interviewers give clues across all three components; the interview frame stays intact; the final guesses feel earned.\n\n**For Students**\n- Guesser: stay in character as the applicant and keep guessing — wrong guesses narrow the search and help the audience root for you.\n- Interviewers: hide clues inside real-sounding interview questions. Job duties, uniform requirements, workplace hazards all work.\n- Spread clues across all three components — don't pile everything onto the job and leave the location a mystery.\n\n**For Teachers**\n- Interviewers who give clues too subtle or too direct both kill the game — coach them to find the playable middle.\n- Host can rescue a stall by nudging the applicant to focus on one component at a time.\n- The scene frame is what makes this more than a puzzle — if it collapses into pure clue delivery, the game loses its shape.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Job Interview","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"a57c4cb4588ba1d3"}},{"id":"oh-waiter","name":"Oh Waiter","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Practice fast joke construction; Practice committing to imperfect ideas quickly.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Common Short Form / Pun Game","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"One seated player plus line","minimumPlayers":"4","maximumPlayers":"Large group","requiresHost":"Maybe / format-dependent","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","diffi
