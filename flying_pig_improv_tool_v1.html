assSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"Usually 4-6; FP observed 6","minimumPlayers":"4","maximumPlayers":"6","requiresHost":"Maybe / format-dependent","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Practice/show piece when matching skills are the lesson or format need","coreSkills":"scene memory; layered structure; reverse returns","tags":"Short Form, High, scene memory, layered structure, reverse returns, audience","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["scene memory","layered structure","reverse returns"],"tags":["Short Form","High","scene memory","layered structure","reverse returns","audience"],"roles":["Player 1","Player 2","Player 3","Player 4","Player 5","Player 6"],"fullMarkdown":"**Skills**\nscene memory; layered structure; reverse returns\n\n**Rules**\nGrowing and Shrinking begins with a true-to-life personal monologue, then grows one player at a time until all players are onstage. It then shrinks back down as players leave in reverse order, returning to earlier scenes.\n\nA simple six-player structure:\n- Player A begins alone with a true-to-life monologue — a real, personal story told honestly.\n- Player B enters and begins a new scene with Player A.\n- Player C enters and begins a completely new scene with Players A and B.\n- Player D enters and begins a completely new scene with Players A, B, and C.\n- Player E enters and begins a completely new scene with Players A, B, C, and D.\n- Player F enters and begins a completely new scene with all six players.\n\nThen the structure reverses:\n- Player F exits, and the group returns to the previous five-person scene.\n- Player E exits, and the group returns to the previous four-person scene.\n- Player D exits, and the group returns to the previous three-person scene.\n- Player C exits, and the group returns to the previous two-person scene.\n- Player B exits, and Player A returns to the original solo scene or monologue.\n\n**For Students**\n- Each scene needs a strong, memorable label in the players’ minds.\n- Make early scenes simple and specific.\n- The first line of each new scene should strongly establish the new reality.\n- Use different relationships, locations, body positions, and emotional tones for each layer.\n- Physical specificity helps memory.\n- When returning to an earlier scene, restart with the strongest remembered offer.\n- The shrinking half is the payoff, so the growing half must establish clean, memorable scenes.\n\n**For Teachers**\n- Players forget the earlier scenes.\n- Players resume the wrong scene after an exit.\n- New scenes are not distinct enough from prior scenes.\n- Players fail to create a clear new reality when entering.\n- Players exit in the wrong order.\n- The group forgets physical positions or relationships.\n- Players over-focus on memory and stop playing the scene.\n- The first few scenes are too vague to remember later.\n- The full-stage scene becomes chaotic and hard to unwind.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Growing and Shrinking","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"bbca37dad2e05f04"}},{"id":"montage","name":"Montage","category":"Long Form","type":"Long Form Structure","formatRole":"Long Form","shortDescription":"Generate grounded scene inspiration from truthful personal material; Practice long-form editing.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"Usually 5-7; often 6","minimumPlayers":"5","maximumPlayers":"7","requiresHost":"No documented","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Advanced class, troupe practice, or long-form show set","coreSkills":"monologues; thematic listening; editing; two-person scenes","tags":"Long Form, High, monologues, thematic listening, editing, two-person scenes, audience","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["monologues","thematic listening","editing","two-person scenes"],"tags":["Long Form","High","monologues","thematic listening","editing","two-person scenes","audience"],"roles":["Player 1","Player 2","Player 3","Player 4","Player 5","Player 6"],"fullMarkdown":"**Skills**\nmonologues; thematic listening; editing; two-person scenes\n\n**Structure**\nThree true monologues open the form: the first inspired by the audience suggestion, the second by the first monologue, the third by the second. After the third, the troupe repeats the original suggestion and claps.\n\nA series of two-person scenes follows, inspired by the monologues' themes, images, emotions, or relationships — not literal reenactments.\n\nAny offstage player may edit. Edits are walk-through edits; new players enter after. Jesse generally prefers longer scenes with deeper relationship development.\n\nScenes are independent — callbacks are welcome if they arise naturally, but a shared universe is not required.\n\nThe monologues are fuel, not scripts. Use them for emotional tone, relationship dynamics, status patterns, fears, desires, specific behaviors — not to reenact what was said.\n\n**Success Looks Like**\nScenes feel grounded and specific; edits happen at strong moments; the ensemble supports each other's initiations; the form accumulates meaning without forcing connections.\n\n**For Students**\nStart scenes with clear who, what, and where. Vague premises drift.\n\nEdit on a laugh, strong emotional turn, or moment of completion — not just when you feel like entering.\n\nIf a scene starts circling the same beat, it's ready to be cut. If it hasn't found its center yet, support it.\n\n**For Teachers**\nMonologues that run too long or become too performative drain the opening. Keep them honest and personal.\n\nCommon failure: players pull only literal details from monologues. Coach them to reach for theme, emotion, and image instead.\n\nDon't force callbacks or shared-universe connections — the montage doesn't require them, and forcing them makes scenes feel mechanical.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Montage","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"025bcfaf6f6fc787"}},{"id":"town-hall","name":"Town Hall","category":"Long Form","type":"Long Form Structure / Show Opener","formatRole":"Long Form","shortDescription":"Start a show with immediate audience interaction; Establish characters publicly before scene work begins.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure / Show Opener","standardHouseUnknownStatus":"Common Long-Form Premise Structure / Possible House Variant","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"Meeting leader plus planted players","minimumPlayers":"4","maximumPlayers":"Troupe size","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"High","bestUse":"Advanced class, troupe practice, or long-form show set","coreSkills":"character POV; audience-planted opening; community world-building","tags":"Long Form, High, character POV, audience-planted opening, community world-building, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["character POV","audience-planted opening","community world-building"],"tags":["Long Form","High","character POV","audience-planted opening","community world-building","audience","host"],"roles":["Moderator","Player 1","Player 2","Player 3","Player 4"],"fullMarkdown":"**Skills**\ncharacter POV; audience-planted opening; community world-building\n\n**Structure**\n- The form begins as a public meeting, usually framed as an HOA meeting, town hall, or city council meeting.\n- One player is not undercover and serves as the meeting leader or facilitator.\n- The other players are planted undercover in the audience.\n- The meeting leader brings the meeting to order.\n- The meeting leader asks the real audience for a suggestion.\n- The meeting leader begins calling on the planted players in the audience.\n- Each planted player responds in character, giving their take on the issue and introducing themselves.\n- Once all player-characters have been introduced, the performers move to the stage.\n- The long-form scene sequence begins.\n- Scenes are performed in the characters established during the town hall opening.\n- Scenes usually begin as two-person scenes.\n- Off-scene players may edit scenes when they choose.\n- When the form reaches time, a strong culmination, or a natural endpoint, someone calls the end of the game.\n- After the long-form ends, someone introduces or transitions into the rest of the show.\n\n**Success Looks Like**\nStart a show with immediate audience interaction; Establish characters publicly before scene work begins.\n\n**For Students**\n- Each planted player should enter with a clear character POV, not just a funny complaint.\n- The town hall portion should generate usable scenic material:\n  - relationships,\n  - grudges,\n\n**For Teachers**\n- Undercover players do not commit strongly enough before the reveal.\n- Character introductions become too similar to each other.\n- Players give jokes instead of playable characters.\n- Each planted player should enter with a clear character POV, not just a funny complaint.\n- The town hall portion should generate usable scenic material:","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Town Hall","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"11b4b3f998355b69"}},{"id":"repeater","name":"Repeater","category":"Long Form","type":"Long Form Technique / Transition Structure","formatRole":"Long Form","shortDescription":"Practice self-editing from inside a scene; Practice transforming a line through character, voice, physicality, and context.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Technique / Transition Structure","standardHouseUnknownStatus":"Unknown; may be known under another name elsewhere","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"Needs Review","minimumPlayers":"Unknown","maximumPlayers":"Unknown","requiresHost":"No documented","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Relationship echoes; structural callbacks; scene patterning; character/line repetition; long-form-adjacent discipline","coreSkills":"transition; repetition; long-form continuity","tags":"Long Form, High, transition, repetition, long-form continuity","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["transition","repetition","long-form continuity"],"tags":["Long Form","High","transition","repetition","long-form continuity"],"fullMarkdown":"**Skills**\ntransition; repetition; long-form continuity\n\n**Rules**\nTwo players perform a scene. At some point, one player repeats the other's last line — as a new character, with a clear change in physicality, voice, or context.\n\nThe player whose line was repeated exits. A new player enters and responds to the repeated line as the start of a new scene.\n\nThe form continues as a chain of scenes, each launched by a transformed repeated line.\n\nThe repeated line must be exact and the character shift unmistakable — otherwise the ensemble can't tell if an edit is happening. Subtle transitions break the form.\n\n**Success Looks Like**\nThe repeated line is recognizable as both a callback and a new scene's first line; exits are clean; entries are immediate; the chain keeps momentum.\n\n**For Students**\nRepeat the line as exactly as possible. Changing even a word creates ambiguity about whether you're editing.\n\nMake the character shift unmistakable — physicality, voice, and context should all change.\n\nIf you're the player whose line was repeated, trust the edit and leave cleanly. Don't linger.\n\n**For Teachers**\nThe hardest part: players who need to edit most (stalled scenes) are often least aware they should. Practice self-editing as a skill separately.\n\nCommon confusion: players repeat lines during normal dialogue without intending an edit. The character shift is what signals the transition — drill that distinction.\n\nEntering players must respond immediately. Hesitation after a clean edit kills the momentum the technique is meant to create.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Repeater","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"adc128f86aae2360"}},{"id":"la-ronde","name":"La Ronde","category":"Long Form","type":"Long Form Structure","formatRole":"Long Form","shortDescription":"Practice linked two-person scenes; Build a long-form structure through character continuity.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"Ensemble; sequential two-person scenes","minimumPlayers":"3","maximumPlayers":"Troupe size","requiresHost":"No documented","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Advanced class, troupe practice, or long-form show set","coreSkills":"character chain; relationship transitions; continuity","tags":"Long Form, High, character chain, relationship transitions, continuity","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["character chain","relationship transitions","continuity"],"tags":["Long Form","High","character chain","relationship transitions","continuity"],"fullMarkdown":"**Skills**\ncharacter chain; relationship transitions; continuity\n\n**Structure**\nA chain of two-person scenes. One player always remains as the same character; a new player enters and begins a new scene with them.\n\nIn the Flying Pig version, an offstage player tags in for one of the active players — the other stays onstage and continues as the same character.\n\nThe form eventually circles back, revealing different sides of each character through different relationships.\n\nExample:\n- Scene 1: A + B → C tags out A\n- Scene 2: B + C → D tags out B\n- Scene 3: C + D → E tags out C\n- Scene 4: D + E → …\n\n**Success Looks Like**\nThe continuing character is clearly recognizable across scenes; each new partner reveals a different side of them; transitions are clean and the chain feels intentional.\n\n**For Students**\nIf you're the continuing character, preserve who you are — don't shift personality to match the new partner.\n\nIf you're entering, establish a new relationship immediately. Don't continue the previous scene's conversation.\n\nAsk yourself: \"Who else knows this person, and what different side of them do I bring out?\"\n\n**For Teachers**\nMost common failure: the remaining player drifts character to match each new partner, and the chain loses its anchor.\n\nTag-ins should happen on strong moments — not just when a player feels like entering. Early tags cut off scenes before relationships are established.\n\nDistinguish from Repeater: La Ronde edits are triggered from offstage; Repeater edits are triggered from inside the scene by repeating a line.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"La Ronde","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"53e4a9fbb8aad232"}},{"id":"3-rooms","name":"3 Rooms","category":"Long Form","type":"Long Form Structure / Transition Technique","formatRole":"Long Form","shortDescription":"Create a braided long-form structure from multiple recurring scene threads; Practice interrupting and returning to scenes.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure / Transition Technique","standardHouseUnknownStatus":"Flying Pig observed long-form structure; possibly related to French Braid / line-repetition forms","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"Ensemble","minimumPlayers":"3","maximumPlayers":"Troupe size","requiresHost":"No documented","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Three-strand long-form structure; offstage listening; repeated-line transitions; scene weaving; callbacks","coreSkills":"scene weaving; callbacks; transition discipline; offstage listening; line repetition","tags":"Long Form, 3 Rooms, Three Rooms, French Braid, Line Repetition, Scene Weaving, Callbacks, Transition Discipline, Offstage Listening","confidenceReviewStatus":"Reviewed / Troy-corrected name","sourceBasisInferenceNotes":"Troy originally described the mechanics; entry was cataloged as French Braid; Troy later remembered the activity/show name as 3 Rooms. Preserve French Braid as an alias / prior catalog name.","notesForFutureHTMLTool":"Primary display name should be 3 Rooms. Searching French Braid or Three Rooms should find this activity. Include warning that this is not the standard short-form Three Rooms game unless separately documented."},"coreSkills":["scene weaving","callbacks","transition discipline","offstage listening","line repetition"],"tags":["Long Form","3 Rooms","Three Rooms","French Braid","Line Repetition","Scene Weaving","Callbacks","Transition Discipline","Offstage Listening"],"fullMarkdown":"**Skills**\nscene weaving; callbacks; transition discipline; offstage listening; line repetition\n\n**Rules**\nThree fixed pairs each own a recurring scene strand. Pair A starts; the others wait offstage.\n\nAn offstage pair repeats a line from the active scene — this triggers a different offstage pair to enter. The active pair exits.\n\nPairs do not trigger their own scene. Pair C repeating a line triggers Pair B, not Pair C.\n\nWhen a pair returns, they resume their own strand and justify the repeated line in their own context. Time jumps are common.\n\nExample cycle:\n- Pair A active → Pair C repeats a line → Pair B enters, Pair A exits\n- Pair B active → Pair A or C repeats a line → Pair C enters, Pair B exits\n- Pair C active → cycle continues…\n\n**Success Looks Like**\nThe audience can track all three strands; repeated lines feel satisfying and then surprising when justified in a new context; each return advances the scene rather than replaying it.\n\n**For Students**\nListen from offstage. You need a line worth repeating before you can trigger anything.\n\nWhen you return to your strand, don't just resume — something should have changed: time, status, stakes, consequence.\n\nThe repeated line isn't just a cue — justify it so it becomes true in your scene.\n\n**For Teachers**\nMost common failure: a pair accidentally triggers itself, or players forget which pair should enter. Drill the rule — you trigger others, not yourself.\n\nReturning scenes that replay the same emotional beat kill momentum. Coach each return to escalate or reveal something new.\n\nEach pair needs a distinct identity from the first appearance — if the strands are too similar, the audience can't track the braid.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"3 Rooms","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"224f1366494dbc61"}},{"id":"slacker","name":"Slacker","category":"Long Form","type":"Long Form Structure","formatRole":"Long Form","shortDescription":"Build a long-form set through connected two-person scenes; Practice preserving one character while revealing them through new relationships.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure","standardHouseUnknownStatus":"Yes, with Flying Pig tag-out character-chain version documented here","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"Ensemble","minimumPlayers":"4","maximumPlayers":"Troupe size","requiresHost":"No documented","requiresAudience":"Maybe / optional","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Medium","bestUse":"Advanced class, troupe practice, or long-form show set","coreSkills":"tag-outs; character chain; dependency on repeated line/name","tags":"Long Form, High, tag-outs, character chain, dependency on repeated line/name","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["tag-outs","character chain","dependency on repeated line/name"],"tags":["Long Form","High","tag-outs","character chain","dependency on repeated line/name"],"fullMarkdown":"**Skills**\ntag-outs; character chain; relationship initiation\n\n**Structure**\nTwo players begin a scene. An offstage player physically tags out one of them — that player exits.\n\nThe entering player starts a new scene with the character who stayed, establishing a new relationship immediately. Time jumps are common.\n\nThe form follows the character who stayed — each new scene reveals a different side of them through a new relationship.\n\nThe entering player doesn't have to be someone mentioned in the previous scene — they invent a new relationship with whoever remains.\n\nExample chain: Dentist & patient → patient stays, wedding planner enters (patient is now a photographer) → photographer stays, bride enters → bride stays, bride's sister enters…\n\n**Success Looks Like**\nEach tag-out is clear; the audience knows who stayed; the new relationship is established fast; the staying character remains recognizable while each scene reveals something new.\n\n**For Students**\nIf you're entering, name or imply the relationship right away: \"Dad…\" / \"Officer…\" / \"Professor, the committee rejected your theory.\"\n\nIf you're the staying character, preserve who you are — let the new relationship reveal a different side, not a different person.\n\nUse time jumps to create development: later that day, years later, after the relationship changed.\n\n**For Teachers**\nMost common failure: the staying player drifts character to match the new partner, and the chain loses its anchor.\n\nEntering players who wait for the staying character to define the relationship stall the scene. The entering player owns the initiation.\n\nThe chain should evolve through relationships and emotional reveals — not just mechanical tagging from one scene to the next.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Slacker","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"33716409bb8df02f"}},{"id":"two-chairs","name":"Two Chairs","category":"Long Form","type":"Long Form Structure / Object-Transformation Structure","formatRole":"Long Form","shortDescription":"Practice building scenes from physical stage pictures; Train players to justify unusual object configurations immediately.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure / Object-Transformation Structure","standardHouseUnknownStatus":"Unknown / Flying Pig observed long-form structure","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","formatRole":"Long Form","playerCount":"6 players","minimumPlayers":"6","maximumPlayers":"6","requiresHost":"No documented","requiresAudience":"Maybe / optional","requiresProps":"Yes","propsMaterialsNeeded":"Two chairs","estimatedRuntime":"10–25 min; Montage documented ~15–20 min","difficulty":"Mid-High","energyLevel":"Medium","physicalityLevel":"Medium to High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Object/environment interpretation; physical clarity; fast scene initiation from stage picture","coreSkills":"object transformation; stage picture; two-player scene initiation","tags":"Long Form, High, object transformation, stage picture, two-player scene initiation","confidenceReviewStatus":"Reviewed","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Reviewed with Troy on 2026-06-08; suitability/recommendation fields updated from explicit review.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag in UI for review before public sharing. Reviewed; use updated suitability values for recommendation scoring."},"coreSkills":["object transformation","stage picture","two-player scene initiation"],"tags":["Long Form","High","object transformation","stage picture","two-player scene initiation"],"roles":["Player 1","Player 2"],"fullMarkdown":"**Skills**\nobject transformation; stage picture; two-player scene initiation\n\n**Structure**\n- Two chairs are placed on stage in an unusual configuration.\n- The configuration may include chairs being:\n  - upside down,\n  - tilted,\n  - sideways,\n  - stacked or partially stacked,\n  - facing odd directions,\n  - separated at strange distances,\n  - or otherwise arranged in a way that suggests an object, location, obstacle, creature, vehicle, machine, or piece of environment.\n- Six players participate.\n- Two players are active in each scene.\n- The remaining four players watch from offstage and may call edits.\n\n**Success Looks Like**\n- Each chair arrangement inspires a distinct scene.\n- The audience can clearly understand what the chairs have become.\n- Players physically use the chairs in a committed, readable way.\n- The new realities are surprising but coherent.\n- Scenes feel emotionally grounded even when the object interpretation is strange.\n- Edits feel clean because the outgoing players create a strong visual offer for the next scene.\n- The form has variety, momentum, and strong visual play.\n\n**For Teachers**\n- Players ignore the chair configuration and begin a generic scene.\n- Players identify the object but do not physically interact with it.\n- Players make the chairs into something unclear to the audience.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Two Chairs","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"a18966dbb918024a"}},{"id":"conducted-song-show-closing-conducted-song","name":"Conducted Song / Show-Closing Conducted Song","category":"Closers","type":"Show Closing / Musical-Rhythmic Short Form Closer","formatRole":"Show Ritual","shortDescription":"End a show by recycling memorable lines from earlier scenes; Create a musical or rhythmic callback to the whole performance.","metadata":{"catalogCategory":"Show Openings and Closings","type":"Show Closing / Musical-Rhythmic Short Form Closer","standardHouseUnknownStatus":"Common short-form family with Flying Pig show-closing variation","beginnerClassSuitability":"Closer","advancedClassSuitability":"Closer","showSuitability":"Yes","formatRole":"Show Ritual","playerCount":"Host/conductor plus line of players","minimumPlayers":"4","maximumPlayers":"Troupe size","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"Yes","propsMaterialsNeeded":"Possible accompaniment not documented; conductor/host required","estimatedRuntime":"1–5 min","difficulty":"High","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"High","bestUse":"Formal show framing / transition / closer","coreSkills":"musical rhythm; conductor control; show closer energy","tags":"Show Ritual, High, musical rhythm, conductor control, show closer energy, audience, host","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["musical rhythm","conductor control","show closer energy"],"tags":["Show Ritual","High","musical rhythm","conductor control","show closer energy","audience","host"],"roles":["Conductor","Player 1","Player 2","Player 3","Player 4","Player 5"],"introScript":"Thank you all for coming tonight. We've got one more game for you.\n\n[Conductor takes position. Game begins.]","fullMarkdown":"**Skills**\nmusical rhythm; conductor control; show closer energy\n\n**Rules**\n- One player serves as the conductor.\n- The conductor is usually the person ending the show.\n- The conductor was also a performer in the show earlier; they are not an outside musical director.\n- The other players stand in a line facing the audience.\n- The conductor stands in front of the line and faces the players.\n\n**Success Looks Like**\n- The audience recognizes lines from earlier in the show.\n- The repeated lines become funny or satisfying in combination.\n- The group finds a shared rhythm.\n- The conductor shapes the piece clearly.\n- Musical players add texture without making non-singers look bad.\n- The closer feels like a final callback to the whole show.\n- The group ends together on a clean cutoff.\n\n---\n\n**For Students**\n- Choose short, repeatable lines.\n- The line does not have to be witty by itself; silliness out of context is often enough.\n- Repetition creates the game.\n- The conductor should be bold and clear, even without formal conducting skills.\n\n**For Teachers**\n- Players choose lines that are not memorable enough.\n- Players choose lines that are too long to repeat cleanly.\n- Multiple players want the same obvious line.\n- Choose short, repeatable lines.\n- The line does not have to be witty by itself; silliness out of context is often enough.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Conducted Song / Show-Closing Conducted Song","catalogCategoryFromMarkdown":"Show Openings and Closings","markdownSha256Short":"e9987371552e9cea"}},{"id":"dona-nobis-pacem","name":"Dona Nobis Pacem","category":"Warmups","type":"Song / Chant / Vocal Ensemble Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"Split the class into two groups to sing different but compatible vocal parts simultaneously; build ensemble listening and vocal commitment.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Song / Chant / Vocal Ensemble Exercise","formatRole":"Warmup / Focus Exercise","standardHouseUnknownStatus":"Traditional Latin song / chant; Flying Pig usage needs review","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","playerCount":"Whole class; split into two groups","minimumPlayers":"4","maximumPlayers":"Class size","requiresHost":"Yes or functionally yes","requiresAudience":"No","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"5–10 min estimated","difficulty":"Mid","energyLevel":"Low to Medium","physicalityLevel":"Low","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Vocal warmup; ensemble listening; group cohesion; holding a part while hearing another part","coreSkills":"listening; vocal commitment; ensemble timing; holding a part; breath support; group cohesion","tags":"Warmup / Focus Exercise, Medium, listening, vocal commitment, ensemble timing, group cohesion","confidenceReviewStatus":"Needs Review / partial musical recall","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Flying Pig musical structure partially documented; exact lyrics/melody not confirmed.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag for review by someone with stronger musical recall."},"coreSkills":["listening","vocal commitment","ensemble timing","holding a part","breath support","group cohesion"],"tags":["Warmup / Focus Exercise","Medium","listening","vocal commitment","ensemble timing","group cohesion"],"fullMarkdown":"**Skills**\nlistening; vocal commitment; ensemble timing; holding a part; breath support; group cohesion\n\n**Rules**\n- Jesse splits the class into two groups.\n- Each group learns a different vocal part — two compatible melodies sung simultaneously.\n- Both groups sing at the same time, listening to each other while holding their own part.\n\n**Success Looks Like**\nBoth parts stay distinct; players remain committed and audible; the group holds together without one part collapsing into the other.\n\n**For Students**\n- Sing out — volume and commitment matter more than musical accuracy.\n- Listen to the other group without abandoning your own part.\n- This isn't a singing test. It's an ensemble exercise.\n\n**For Teachers**\n- The useful improv skill here is staying present and committed while something else is happening alongside you.\n- Watch for one group losing its part when the other enters — coach them to hold before speeding up.\n- Players who are self-conscious about singing need permission to be imperfect out loud.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Dona Nobis Pacem","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"f57a026f485ac957"}},{"id":"ive-got-a-secret","name":"I've Got a Secret","category":"Exercises","type":"Two-Person Scene Exercise / Subtext Exercise / Character Constraint Exercise","formatRole":"Exercise","shortDescription":"Each player draws a private secret from a box before the scene; play the scene letting the secret shape behavior without announcing it; guess partner's secret after.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Two-Person Scene Exercise / Subtext Exercise / Character Constraint Exercise","formatRole":"Exercise","standardHouseUnknownStatus":"Unknown / Needs Review","beginnerClassSuitability":"","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","playerCount":"Two players","minimumPlayers":"2","maximumPlayers":"2","requiresHost":"Yes","requiresAudience":"No / class observation optional","requiresProps":"Yes","propsMaterialsNeeded":"Box of secret prompts","estimatedRuntime":"5–15 min estimated","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Subtext; private wants/wounds; emotional specificity; advanced scene work","coreSkills":"subtext; character want; emotional point of view; listening; inference; playing need without exposition; partner observation; emotional specificity","tags":"Exercise, High, subtext, character want, emotional point of view, listening, inference, advanced","confidenceReviewStatus":"Needs Review / observed once","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Observed once in Troy's first advanced class; name and standard-game identity unknown.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["subtext","character want","emotional point of view","listening","inference","playing need without exposition","partner observation","emotional specificity"],"tags":["Exercise","High","subtext","character want","emotional point of view","listening","inference","advanced"],"fullMarkdown":"**Skills**\nsubtext; character want; emotional point of view; listening; inference; playing need without exposition; partner observation; emotional specificity\n\n**Rules**\n- Do not directly state your secret.\n- Do not turn the scene into interrogation or a guessing game during the scene.\n- Let the secret affect what you want, how you listen, how you react, and what you avoid.\n- The secret should influence the character without replacing the relationship, setting, or scene action.\n- The scene still needs a clear who, what, and where.\n- The secret should create playable subtext, not private mental trivia.\n\n**Success Looks Like**\n- Each character has a clear behavioral tilt from the secret.\n- The scene still has a grounded relationship and situation.\n- The secrets create tension, surprise, emotional specificity, or vulnerability.\n- The players do not directly reveal their secrets.\n- At the end, the guesses are at least directionally connected to what was played.\n- The audience or class can see how the secret influenced the performance.\n- The scene feels deeper because the characters are carrying private wants or wounds.\n\n**For Students**\n- The secret should shape behavior, not become dialogue.\n- A secret can create: need, grief, avoidance, urgency, insecurity, guilt, hope, desperation, emotional guardedness, or status behavior.\n- The scene should remain playable even if nobody guesses the secret correctly.\n- A successful scene does not require a perfect guess.\n\n**For Teachers**\n- A player blurts out their secret.\n- A player hints so obviously that the scene becomes a guessing game.\n- A player hides the secret so completely that it has no effect.\n- The secret should shape behavior, not become dialogue.\n- A secret can create: need, grief, avoidance, urgency, insecurity, guilt, hope, desperation, emotional guardedness, or status behavior.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"I've Got a Secret","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"7f2b468da2702654"}},{"id":"gets-emotional","name":"Gets Emotional","category":"Exercises","type":"Character Exercise / Scene Exercise","formatRole":"Exercise","shortDescription":"Each player receives two adjectives and a first name from classmates; build and play a character from those combined descriptors in a two-or-three-person scene.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Character Exercise / Scene Exercise","formatRole":"Exercise","standardHouseUnknownStatus":"Unknown / Needs Review","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","playerCount":"2–3 players","minimumPlayers":"2","maximumPlayers":"3","requiresHost":"Yes","requiresAudience":"No / uses class suggestions","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"5–15 min estimated","difficulty":"Mid","energyLevel":"Medium to High","physicalityLevel":"Medium to High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low to Medium","bestUse":"Character construction; emotional readability; fast embodiment; combining multiple character attributes","coreSkills":"character creation; emotional readability; physical embodiment; vocal commitment; point of view; accepting gifts; combining contradictory traits; specificity","tags":"Exercise, Medium, character creation, emotional readability, physical embodiment, point of view, accepting gifts","confidenceReviewStatus":"Needs Review / observed once","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Observed once; exact official name unknown.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["character creation","emotional readability","physical embodiment","vocal commitment","point of view","accepting gifts","combining contradictory traits","specificity"],"tags":["Exercise","Medium","character creation","emotional readability","physical embodiment","point of view","accepting gifts"],"fullMarkdown":"**Skills**\ncharacter creation; emotional readability; physical embodiment; vocal commitment; point of view; accepting gifts; combining contradictory traits; specificity\n\n**Rules**\n- Use the gets to build the character.\n- Do not merely announce the adjectives.\n- Do not ignore difficult or contradictory descriptors.\n- Let the traits affect voice, posture, rhythm, emotional state, status, reactions, and point of view.\n- The scene still needs relationship, location, and present action.\n- The character should remain playable, not just a list of traits.\n\n**Success Looks Like**\n- The character reads quickly from the back of the room.\n- The player uses all or most of the gets.\n- The traits affect behavior throughout the scene.\n- The character has a clear point of view.\n- The scene still has a relationship and present action.\n- The character becomes more playable as the scene continues rather than fading away.\n- The audience or class can recognize how the original gets shaped the performance.\n\n**For Students**\n- The useful question is: \"How does this person behave because they are calm, fiery, excitable, studious, etc.?\"\n- The name can influence voice, age, status, rhythm, social energy, or worldview.\n- Strong players convert adjectives into playable behavior:\n  - Calm might mean stillness, low vocal tempo, grounded reactions.\n\n**For Teachers**\n- The player states the traits instead of embodying them.\n- The character becomes generic despite specific gets.\n- One adjective dominates while the others disappear.\n- The useful question is: \"How does this person behave because they are calm, fiery, excitable, studious, etc.?\"\n- The name can influence voice, age, status, rhythm, social energy, or worldview.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Gets Emotional","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"8b156fc15c5419ff"}},{"id":"scramble","name":"Scramble","category":"Long Form","type":"Longform Format / Longform Exercise","formatRole":"Long Form","shortDescription":"Overlapping longform format using solo starts, stacked scenes, bolts, swinging gates, and chair pimps; players embrace chaos and commit fully to whatever scene they are currently in.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Longform Format / Longform Exercise","formatRole":"Long Form","standardHouseUnknownStatus":"Known longform improv format; IRC rules imported; local variant needs review","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","playerCount":"6 observed","minimumPlayers":"4 or 5 inferred","maximumPlayers":"6 observed / scalable unknown","requiresHost":"No documented","requiresAudience":"Yes for show use","requiresProps":"Chairs optional / likely useful for Chair Pimps","propsMaterialsNeeded":"Chairs optional","estimatedRuntime":"20–40 min estimated","difficulty":"High","energyLevel":"High","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Low after initial suggestion","bestUse":"Advanced longform; overlapping scenes; ensemble chaos; stage awareness","coreSkills":"longform structure; ensemble awareness; solo initiation; emotional and physical commitment; working with invisible characters; scene overlap; stage picture; editing through initiation; comfort with ambiguity","tags":"Long Form, High, longform structure, ensemble awareness, solo initiation, overlapping scenes, chaos, advanced","confidenceReviewStatus":"Partially documented; standard rules imported; local variant needs confirmation","sourceBasisInferenceNotes":"Standard rule structure imported from Improv Resource Center / IRC Improv Wiki. Player count of 6 from Troy's show observation. Local Flying Pig variant details not fully confirmed.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Flag standard-rules-import status."},"coreSkills":["longform structure","ensemble awareness","solo initiation","emotional and physical commitment","working with invisible characters","scene overlap","stage picture","editing through initiation","comfort with ambiguity"],"tags":["Long Form","High","longform structure","ensemble awareness","solo initiation","overlapping scenes","chaos","advanced"],"fullMarkdown":"**Skills**\nsolo initiation; overlapping scenes; ensemble awareness; stage picture; commitment under chaos\n\n**Structure**\nBegins with a solo start — one player alone, making a bold physical/emotional choice, interacting with an invisible character.\n\nPlayers initiate new scenes on top of existing ones (overlap edits), creating stacked simultaneous scenes.\n\nScenes benefit from distinct contrast in energy, tone, or tempo so the audience can separate the threads.\n\nCore techniques:\n- Solo Starts: one player alone; interact with an invisible character as if real\n- Overlap Edits: initiate a new scene on top of an existing one — previous scene doesn't end\n- Stacked Scenes: multiple scenes active simultaneously; may share the same physical space\n- Bolts: decisively leave a scene; your character stays behind for the remaining player(s)\n- Swinging Gates: use bolts to move between scenes; commit fully to whichever scene you're in\n- Chair Pimps: plant a chair as a scenic offer for later scenes to use\n\nNote: Flying Pig-specific rules for this form still need validation.\n\n**Success Looks Like**\nThe stage feels alive and chaotic but not randomly broken; players stay emotionally committed; the audience can absorb contrasting threads; bolts and gates create fluid movement.\n\n**For Students**\nEmbrace confusion — don't try to understand everything happening. Commit to the scene you're in right now.\n\nInvisible characters must be treated as real. Leave space for their lines; react to them.\n\nIn stacked scenes, contrast is how the audience tells threads apart. Different tempo, volume, or emotion makes coexistence readable.\n\n**For Teachers**\nThe form requires strong commitment, not casual randomness. Chaos without emotional investment is just noise.\n\nBolts must be decisive. A vague exit doesn't leave the character behind — it just looks like the player wandered off.\n\nCommon failure: all stacked scenes have the same energy, and the audience can't separate them. Coach for contrast.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Scramble","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"01beb4582f9a0bff"}},{"id":"5-word-cafe","name":"5 Word Cafe","category":"Exercises","type":"Scene Exercise / Verbal Constraint Exercise","formatRole":"Exercise","shortDescription":"Every spoken line must be five words or fewer; scene is set in a cafe; constraint forces concise dialogue, physical action, and emotional clarity.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Scene Exercise / Verbal Constraint Exercise","formatRole":"Exercise","standardHouseUnknownStatus":"Unknown / Jesse-named Flying Pig exercise","beginnerClassSuitability":"Mid","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","playerCount":"2–3 players","minimumPlayers":"2","maximumPlayers":"3","requiresHost":"Yes","requiresAudience":"No","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"5–15 min estimated","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Concise dialogue; physical behavior; emotional clarity under verbal constraint","coreSkills":"concision; listening; clean offers; editing dialogue internally; emotional readability; physical behavior; subtext; specificity; scene economy","tags":"Exercise, Medium, concision, listening, clean offers, verbal constraint, subtext, scene economy","confidenceReviewStatus":"High-confidence Jesse-named exercise","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Jesse-named; Troy played once in advanced class; core rules high-confidence.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["concision","listening","clean offers","editing dialogue internally","emotional readability","physical behavior","subtext","specificity","scene economy"],"tags":["Exercise","Medium","concision","listening","clean offers","verbal constraint","subtext","scene economy"],"fullMarkdown":"**Skills**\nconcision; listening; clean offers; editing dialogue internally; emotional readability; physical behavior; subtext; specificity; scene economy\n\n**Rules**\n- Every line must be five words or fewer.\n- The scene is set in a cafe.\n- Players should still establish relationship, action, and emotional point of view.\n- The word limit should not become the only interesting thing in the scene.\n- Players should not avoid speaking entirely; the exercise is concise dialogue, not silence.\n- Physical action and emotional reaction become more important because dialogue is restricted.\n\n**Success Looks Like**\n- The scene remains active despite limited dialogue.\n- Players stay under the five-word limit.\n- The cafe setting is used physically.\n- Characters have clear wants or emotional states.\n- The relationship becomes clear through short lines, behavior, and reaction.\n- The constraint creates sharper dialogue rather than dead air.\n- The audience or class can still follow the scene.\n\n**For Students**\n- The word limit should sharpen the scene, not shrink commitment.\n- Short lines still need point of view.\n- Physical action can carry information that dialogue cannot.\n- Players should use the cafe environment: ordering, serving, cleaning, waiting, spilling, paying, avoiding someone, meeting someone, or confronting someone.\n\n**For Teachers**\n- Players accidentally exceed five words.\n- Players become so focused on counting words that they stop acting.\n- Dialogue becomes choppy or unnatural.\n- The word limit should sharpen the scene, not shrink commitment.\n- Short lines still need point of view.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"5 Word Cafe","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"820b333f391bc200"}},{"id":"10-characters-in-60-seconds","name":"10 Characters in 60 Seconds","category":"Exercises","type":"Solo Character Exercise / Audition Exercise","formatRole":"Exercise","shortDescription":"One player demonstrates 10 distinct characters within 60 seconds; tests character range, physical and vocal transformation speed, and commitment under time pressure.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Solo Character Exercise / Audition Exercise","formatRole":"Exercise","standardHouseUnknownStatus":"Unknown / Needs Review","beginnerClassSuitability":"","advancedClassSuitability":"Exercise","showSuitability":"No","playerCount":"1","minimumPlayers":"1","maximumPlayers":"1","requiresHost":"Yes","requiresAudience":"No / auditors or class observation likely","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"1–2 min","difficulty":"High","energyLevel":"High","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Low","bestUse":"Character range; fast commitment; audition diagnostic; high-pressure character work","coreSkills":"character range; fast commitment; physical transformation; vocal variety; emotional variety; status shifts; point of view; speed; audition readiness; recovery under pressure","tags":"Exercise, High, character range, fast commitment, physical transformation, status shifts, audition, solo","confidenceReviewStatus":"Needs Review / audition-only; observed once","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Observed once during auditions; exact official name not confirmed.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Audition-context exercise."},"coreSkills":["character range","fast commitment","physical transformation","vocal variety","emotional variety","status shifts","point of view","speed","audition readiness","recovery under pressure"],"tags":["Exercise","High","character range","fast commitment","physical transformation","status shifts","audition","solo"],"fullMarkdown":"**Skills**\ncharacter range; fast commitment; physical transformation; vocal variety; emotional variety; status shifts; point of view; speed; audition readiness; recovery under pressure\n\n**Rules**\n- One player only.\n- 10 characters.\n- 60 seconds.\n- Each character should be distinct.\n- The player should not spend time explaining the character.\n- The character must be demonstrated through performance choices, not described from the outside.\n\n**Success Looks Like**\n- The player reaches 10 characters within 60 seconds.\n- The characters are clearly distinct.\n- The player commits physically and vocally.\n- The player uses a wide emotional and status range.\n- The transitions are fast.\n- The audience or auditors can immediately tell that a new character has appeared.\n- The player does not apologize, explain, or collapse after weak choices.\n\n**For Students**\n- Each character needs an immediate visible difference.\n- Strong changes may come from: posture, face, tempo, voice placement, emotional state, status, age, rhythm, physical center, or point of view.\n- The exercise rewards boldness over nuance.\n- A simple but committed character is better than a subtle underplayed one.\n\n**For Teachers**\n- Characters blur together.\n- The player changes only voice but not body.\n- The player changes only posture but not point of view.\n- Each character needs an immediate visible difference.\n- Strong changes may come from: posture, face, tempo, voice placement, emotional state, status, age, rhythm, physical center, or point of view.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"10 Characters in 60 Seconds","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"b4cb60a12bb96251"}},{"id":"its-tuesday","name":"It's Tuesday","category":"Exercises","type":"Solo Emotional Range Exercise / Audition Exercise","formatRole":"Exercise","shortDescription":"Given a mundane get, perform a solo scene moving through three distinct big emotions; tests emotional range, readability, and the ability to heighten ordinary material.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Solo Emotional Range Exercise / Audition Exercise","formatRole":"Exercise","standardHouseUnknownStatus":"Unknown / Needs Review","beginnerClassSuitability":"","advancedClassSuitability":"Exercise","showSuitability":"No","playerCount":"1","minimumPlayers":"1","maximumPlayers":"1","requiresHost":"Yes","requiresAudience":"No / auditors or class observation likely","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"2–5 min estimated","difficulty":"High","energyLevel":"High","physicalityLevel":"High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Emotional range; big readable emotion; solo commitment; heightening mundane material","coreSkills":"emotional range; emotional readability; solo commitment; heightening; justification; emotional transitions; making mundane material playable; vocal and physical expressiveness; audition readiness","tags":"Exercise, High, emotional range, emotional readability, solo commitment, heightening, audition, solo","confidenceReviewStatus":"Needs Review / audition-only; observed once","sourceBasisInferenceNotes":"Type/standard/player details extracted when present; suitability and load fields are first-pass tooling inferences from documented rules. Observed once during auditions; exact time limit and coaching language not confirmed.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view. Audition-context exercise."},"coreSkills":["emotional range","emotional readability","solo commitment","heightening","justification","emotional transitions","making mundane material playable","vocal and physical expressiveness","audition readiness"],"tags":["Exercise","High","emotional range","emotional readability","solo commitment","heightening","audition","solo"],"fullMarkdown":"**Skills**\nemotional range; emotional readability; solo commitment; heightening; justification; emotional transitions; making mundane material playable; vocal and physical expressiveness; audition readiness\n\n**Rules**\n- The get should be mundane.\n- The player performs alone.\n- The player must demonstrate three big emotions.\n- The emotions should be distinct, not slight variations of the same feeling.\n- The player should not merely name the emotions.\n- The emotional states should be performed through voice, body, face, rhythm, point of view, and behavior.\n- The ordinary get should remain connected to the scene.\n\n**Success Looks Like**\n- The player creates three clearly different emotional states.\n- Each emotion is physically and vocally readable.\n- The mundane get remains the anchor.\n- The emotional progression feels heightened but playable.\n- The player commits without apology.\n- The scene has momentum rather than feeling like three disconnected demonstrations.\n- The audience or auditors can easily identify the emotional shifts.\n\n**For Students**\n- The point is not realism; the point is emotional availability and readability.\n- Mundane material is useful because it forces the player to supply the stakes.\n- Strong emotional choices might include: panic, joy, grief, shame, awe, rage, desperation, heartbreak, ecstatic confidence, confusion, fear, or overwhelming relief.\n- Each emotional shift should have a playable reason, even if the reason is heightened or absurd.\n\n**For Teachers**\n- The emotions are too small to read.\n- The player changes the words but not the body or voice.\n- The emotions are not distinct enough.\n- The point is not realism; the point is emotional availability and readability.\n- Mundane material is useful because it forces the player to supply the stakes.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"It's Tuesday","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"2fcbe06c62a09b33"}},{"id":"detective","name":"LOW (Location, Occupation, Weapon)","category":"Short Form","type":"Short Form Guessing Game","formatRole":"Short Form","shortDescription":"A guessing/mime game in which detectives are called in one at a time to solve a murder, receiving clues through gibberish and mime — with information mutating through each handoff.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Guessing Game","formatRole":"Short Form","standardHouseUnknownStatus":"Unknown / Flying Pig observed guessing game","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","playerCount":"6 players","minimumPlayers":"6","maximumPlayers":"6","requiresHost":"Functionally yes — first player acts as host/setup holder","requiresAudience":"Yes","requiresProps":"Yes","propsMaterialsNeeded":"One chair representing a corpse","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium-High","physicalityLevel":"High","verbalLanguageLoad":"Medium in gibberish / high physical communication","memoryTrackingLoad":"High","audienceInteractionLevel":"High","bestUse":"Advanced guessing-game practice; show piece; gibberish/mime clue relay","coreSkills":"gibberish; mime; guessing; clue-giving; memory drift; physical storytelling","tags":"Short Form, Guessing Game, Advanced, Show Ready, Gibberish, Mime, Relay, Audience, Chair Prop","confidenceReviewStatus":"Reviewed / Troy-described","sourceBasisInferenceNotes":"Based on Troy's description and clarification on 2026-06-09; seen at Flying Pig 2–3 times; not yet personally practiced by Troy.","notesForFutureHTMLTool":"Add to guessing-game filters; mark as advanced/show-ready; include prop requirement for chair; reveal order should be preserved by category and backward player order."},"coreSkills":["gibberish","mime","guessing","clue-giving","memory drift","physical storytelling"],"tags":["Short Form","Guessing Game","Advanced","Show Ready","Gibberish","Mime","Relay","Audience","Chair Prop","Detective","LOW","Location Occupation Weapon"],"roles":["Host","Detective (guesser)","Player 3","Player 4","Player 5","Player 6"],"fullMarkdown":"**Skills**\ngibberish; mime; guessing; clue-giving; memory drift; physical storytelling\n\n**Rules**\n- Six players are selected.\n- A chair is placed in the middle of the stage.\n- The chair represents a corpse.\n- Five of the six players leave the room or otherwise cannot hear the setup.\n- The one player who remains receives three pieces of information:\n  - the corpse's profession,\n  - the location of the murder,\n  - the method of murder.\n- The audience provides or helps provide these suggestions.\n- The player who remains functions as the host / starting detective.\n- The three items correspond to the letters L (Location), O (Occupation), and W (Weapon). When miming clues, players sign the letter — L, O, or W — to tell the receiving player which of the three they are currently describing. This keeps the information organized and tells the guesser what category they are receiving.\n\n**Success Looks Like**\n- The audience can follow the broad intent of the mimed clues.\n- The players commit fully to gibberish as meaningful language.\n- Each exchange feels like a real detective conversation.\n- The information mutates in funny, trackable ways.\n- The stage murders are clear and theatrical.\n- The final reveal produces escalating comic payoff as the guesses differ from the original setup.\n- The game remains fast enough to feel like a show piece rather than a classroom puzzle.\n\n**For Students**\n- The game needs bold, readable physical offers.\n- Gibberish alone is not enough; the mime must carry the information.\n- Players should use the full stage picture, including the chair/corpse.\n- Incoming players should actively investigate through gibberish questions and physical guesses.\n- Clue-givers should respond as if they understand the detective's questions, even though the language is nonsense.\n- The scene should feel like a heightened detective investigation, not like silent charades with noise.\n- The murder transition should be sudden and clear.\n- Wrong guesses are part of the entertainment; players should not overwork the clue transfer until it becomes slow.\n- The final reveal should emphasize the drift from the original information through each relay step.\n\n**Show Format Note**\nThe game can be run with a Host and 5 players. The Host introduces the game, manages the audience, and interviews the detectives at the end of the scene — asking each detective to recount their version of the murder before revealing what the original setup actually was.\n\n**For Teachers**\n- Clues are too vague physically.\n- Players rely on gibberish tone without enough mime.\n- The clue-giver forgets one of the three categories.\n- The incoming player does not ask enough clear physical questions.\n- The exchange becomes passive instead of an active detective conversation.\n- Players try to communicate through near-English sounds.\n- The chair/corpse is forgotten after the setup.\n- Players spend too long trying to get perfect certainty.\n- The stage murder transition is unclear or too timid.\n- The reveal becomes disorganized if players do not answer by category.\n- Players reveal in player order instead of working backward from the final player.\n- The game loses energy if the relay is treated as a puzzle rather than a performance.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Detective","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"ce3da94c1dad8bc5"}},{"id":"luxury-luxury","name":"Luxury / Luxury!","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"A four-player complaint and reframing game where players interrupt with \"Luxury!\" to make the previous problem seem desirable compared to their own worse problem.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","formatRole":"Short Form","standardHouseUnknownStatus":"Common short-form game / Flying Pig observed","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","playerCount":"4 players","minimumPlayers":"4","maximumPlayers":"4","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"Mid-High","energyLevel":"Medium-High","physicalityLevel":"Low-Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Show-ready escalation/reframing game; character POV; complaint-based status play","coreSkills":"reframing; escalation; character POV; status contrast; justification; concise ranting","tags":"Short Form, Escalation, Reframing, Complaint Game, Status, Character POV, Audience, Show Ready","confidenceReviewStatus":"Reviewed / Troy-confirmed","sourceBasisInferenceNotes":"Troy saw this at a February Flying Pig show and confirmed the standard Luxury! description matches exactly.","notesForFutureHTMLTool":"Add to short-form/show-ready filters; useful for advanced lineups needing a verbal escalation game; classify separately from guessing games."},"coreSkills":["reframing","escalation","character POV","status contrast","justification","concise ranting"],"tags":["Short Form","Escalation","Reframing","Complaint Game","Status","Character POV","Audience","Show Ready"],"fullMarkdown":"**Skills**\nreframing; escalation; character POV; status contrast; justification; concise ranting\n\n**Rules**\n- Host gets a pet peeve or minor complaint from the audience. Player 1 rants about it.\n- Another player interrupts with a theatrical \"Luxury!\" — then explains why Player 1's problem is actually desirable compared to their own worse situation, and begins ranting about that.\n- Repeat: each \"Luxury!\" must reframe the previous complaint as comparatively fortunate, then introduce a new, heightened problem.\n- Players keep the characters they establish. Game ends on a strong button.\n- Core pattern: \"You think that's bad? That would be a luxury compared to my situation…\"\n\n**Success Looks Like**\nEach \"Luxury!\" gets a laugh by flipping the prior complaint; problems escalate in a clear pattern; players maintain distinct characters; the chain builds to a comic peak.\n\n**For Students**\n- The reframe matters as much as the new complaint — justify why the previous problem sounds good before launching into yours.\n- Specific misery beats generic misery. The audience needs to understand your problem quickly.\n- Keep the character you establish — your complaints should reveal who you are, not just what's bad.\n\n**For Teachers**\n- Watch for players who yell \"Luxury!\" and then skip the reframe — that's where the comic reversal lives.\n- New complaints that aren't worse, sharper, or more specific kill the escalation. Coach players to top through specificity, not just extremity.\n- The game needs a button — coach the last player or the host to recognize and land the peak rather than letting it trail off.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Luxury / Luxury!","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"158b9cfb4afd4c8b"}},{"id":"big-booty","name":"Big Booty","category":"Warmups","type":"Warmup / Rhythm and Focus Game","formatRole":"Warmup / Focus Exercise","shortDescription":"A high-energy rhythm and focus warmup where players chant, slap thighs, track shifting numbers, and pass calls while staying on beat.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup / Rhythm and Focus Game","formatRole":"Warmup / Focus Exercise","standardHouseUnknownStatus":"Standard improv/theatre warmup; Flying Pig observed","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","playerCount":"Whole group","minimumPlayers":"4","maximumPlayers":"Class size","requiresHost":"No documented separate host","requiresAudience":"No","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid","energyLevel":"High","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Low","bestUse":"Rhythm; focus; vocal commitment; playful failure; group energy","coreSkills":"rhythm; focus; listening; number tracking; vocal commitment; recovery","tags":"Warmup / Focus Exercise, Rhythm, Chanting, Thigh Slaps, Number Tracking, High Energy, Recovery","confidenceReviewStatus":"Reviewed / Troy-confirmed","sourceBasisInferenceNotes":"Troy confirmed Flying Pig used thigh slaps and chanting and recognized the standard Big Booty structure as exactly the game performed. Exact Flying Pig chant wording still needs documentation.","notesForFutureHTMLTool":"Add to warmup/focus filters; useful for high-energy rhythm and concentration; not a show-piece recommendation."},"coreSkills":["rhythm","focus","listening","number tracking","vocal commitment","recovery"],"tags":["Warmup / Focus Exercise","Rhythm","Chanting","Thigh Slaps","Number Tracking","High Energy","Recovery"],"fullMarkdown":"**Skills**\nrhythm; focus; listening; number tracking; vocal commitment; recovery\n\n**Rules**\n- Players stand in a circle. One player is Big Booty; the rest are numbered in order.\n- The group establishes a shared rhythm using thigh slaps and chanting.\n- The group opens with the chant, then Big Booty starts the call sequence. Each player calls their own name/number, then passes to another.\n- If a player misses the rhythm, says the wrong number, or hesitates too long, they move to the end and numbers shift. Reset quickly and keep going.\n\nExample:\n- Everyone: \"Big Booty, Big Booty, Big Booty — ah Big Booty\"\n- Big Booty: \"Big Booty, Number 4.\"\n- Number 4: \"Number 4, Number 7.\"\n- Number 7: \"Number 7, Big Booty.\"\n\n**Success Looks Like**\nThe group holds a clear rhythm; players respond loudly and quickly; mistakes produce laughter and reset energy rather than embarrassment.\n\n**For Students**\n- Keep the thigh-slap rhythm going — it supports everyone, not just you.\n- Know your current number after each reset; that's the hardest part.\n- When you mess up, reset fast and loud. Collapsing the energy is worse than the mistake.\n\n**For Teachers**\n- Start slowly enough that the group can succeed, then increase speed once the structure is stable.\n- After each reset, confirm everyone knows their new number before restarting.\n- The point is not perfection — it's shared rhythm, attention, and recovery. Keep it moving.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Big Booty","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"f1e50dfb9556ccc3"}},{"id":"complaint-letter-3-words-at-a-time","name":"Complaint Letter / Complaint Letter 3 Words at a Time","category":"Warmups","type":"Warmup / Circle Writing Exercise","formatRole":"Warmup / Focus Exercise","shortDescription":"A circle writing exercise where players build a complaint letter three words at a time from a coach-provided complaint topic.","metadata":{"catalogCategory":"Warmups and Focus Exercises","type":"Warmup / Circle Writing Exercise","formatRole":"Warmup / Focus Exercise","standardHouseUnknownStatus":"Common improv complaint-letter exercise with Flying Pig 3-words-at-a-time variant observed","beginnerClassSuitability":"Mid","advancedClassSuitability":"Warmup","showSuitability":"Not primary show piece","playerCount":"Circle / whole group","minimumPlayers":"3","maximumPlayers":"Class size","requiresHost":"No separate host documented; coach facilitates","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–10 min","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Low","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Group writing; grammar; listening; complaint POV; verbal continuity","coreSkills":"listening; grammar; group writing; three-word constraint; complaint POV; continuity","tags":"Warmup / Focus Exercise, Circle Game, Group Writing, Complaint Letter, Three Words at a Time, Grammar, Listening, Verbal Constraint","confidenceReviewStatus
