":"Partial / Troy-described","sourceBasisInferenceNotes":"Troy described a Flying Pig circle exercise where each player contributes three words at a time to write a complaint letter; coach supplies the complaint topic. Exact Flying Pig title uncertain; likely Complaint Letter 3 Words at a Time, possibly Bad Review or Complaint Letter.","notesForFutureHTMLTool":"Add to verbal/circle/writing/listening filters; preserve alias search terms Complaint Letter, Bad Review, and Three Words at a Time."},"coreSkills":["listening","grammar","group writing","three-word constraint","complaint POV","continuity"],"tags":["Warmup / Focus Exercise","Circle Game","Group Writing","Complaint Letter","Three Words at a Time","Grammar","Listening","Verbal Constraint"],"fullMarkdown":"**Skills**\nlistening; grammar; group writing; three-word constraint; complaint POV; continuity\n\n**Rules**\n- Players stand in a circle. The coach gives the group something to complain about.\n- Players take turns contributing exactly three words at a time to build a complaint letter.\n- Each player must listen to the words immediately before their turn and continue the sentence or thought clearly.\n- Maintain the complaint-letter tone throughout. The group lands a natural ending; the coach may call it.\n\n**Success Looks Like**\nThe letter sounds like one shared complaint; grammar mostly holds; the complaint topic stays clear; the group lands a satisfying final line.\n\n**For Students**\n- Listen to the last few words before your turn — serve the sentence first.\n- Keep the complaint tone alive; specific complaints are stronger than generic negativity.\n- Don't plan ahead. A clear continuation beats a clever derailment.\n\n**For Teachers**\n- The three-word constraint gives players more room to derail than one-word-at-a-time — coach them to preserve grammar and direction, not just fill space.\n- Watch for: players ignoring the previous words, the letter losing its complaint frame, or over-extending after a natural ending has already arrived.\n- Call the ending once the letter lands a satisfying line rather than letting it drag.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Complaint Letter / Complaint Letter 3 Words at a Time","catalogCategoryFromMarkdown":"Warmups and Focus Exercises","markdownSha256Short":"25476373ef491e7d"}},{"id":"french-braid","name":"French Braid","category":"Long Form","type":"Long Form Structure","formatRole":"Long Form","shortDescription":"A long-form structure where multiple scene strands are created, interrupted, and returned to later, allowing callbacks, continuation, and braided scene development.","metadata":{"catalogCategory":"Long Form Structures and Techniques","type":"Long Form Structure","formatRole":"Long Form","standardHouseUnknownStatus":"Standard/common long-form structure; Flying Pig observed","beginnerClassSuitability":"","advancedClassSuitability":"Longform","showSuitability":"Yes","playerCount":"Ensemble / needs review","minimumPlayers":"Needs review","maximumPlayers":"Troupe size","requiresHost":"No documented","requiresAudience":"Maybe / typical long-form suggestion","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"10–25 min / needs review","difficulty":"High","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"High","audienceInteractionLevel":"Low-Medium","bestUse":"Long-form scene weaving; recurring scene strands; callbacks; interrupted scenes that return later","coreSkills":"long-form memory; callbacks; scene continuation; editing; re-entry timing; structural awareness","tags":"Long Form, French Braid, Scene Weaving, Callbacks, Recurring Scenes, Editing, Advanced, Show Ready","confidenceReviewStatus":"Partial / Troy-confirmed observed and practiced","sourceBasisInferenceNotes":"Troy confirmed he has both practiced French Braid and seen it performed, but exact Flying Pig-specific rules are not fully remembered. Preserve as separate from 3 Rooms.","notesForFutureHTMLTool":"Keep separate from 3 Rooms. Add to long-form filters, advanced/show-ready filters, callbacks, scene weaving, and high memory/tracking load."},"coreSkills":["long-form memory","callbacks","scene continuation","editing","re-entry timing","structural awareness"],"tags":["Long Form","French Braid","Scene Weaving","Callbacks","Recurring Scenes","Editing","Advanced","Show Ready"],"roles":["Player 1","Player 2","Player 3","Player 4","Player 5","Player 6"],"fullMarkdown":"**Skills**\nlong-form memory; callbacks; scene continuation; editing; re-entry timing; structural awareness\n\n**Structure**\nMultiple scene strands are created through interruptions and transitions.\n\nEarlier scenes return later and continue from where they left off — they don't restart.\n\nThe form braids between recurring threads rather than treating each scene as an unrelated montage.\n\nReturning scenes bring new information, callbacks, heightened relationships, or consequences.\n\n**Success Looks Like**\nThe audience recognizes returning scenes; earlier offers matter later; strands evolve rather than repeat; the form feels intentionally woven.\n\n**For Students**\nReturning scenes should continue, not reset. Pick up with consequence, escalation, or changed emotion.\n\nEach strand needs enough clarity in its first appearance to be recognizable when it returns.\n\nThe structure rewards patience and listening — resist interrupting before the current scene has produced usable material.\n\n**For Teachers**\nCommon failure: returned scenes restart instead of continuing, and the form collapses into montage.\n\nScene threads need to be distinct enough to track — if strands are too similar, the braid is invisible.\n\nStrong returns bring payoff: consequence, callback, or emotional shift from what was established before.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"French Braid","catalogCategoryFromMarkdown":"Long Form Structures and Techniques","markdownSha256Short":"903124b860d73e9e"}},{"id":"key-to-the-city","name":"Key to the City","category":"Short Form","type":"Short Form Guessing Game","formatRole":"Short Form","shortDescription":"A six-player superhero press-conference guessing game where a superhero must infer their name, power, and the disaster they saved the city from through clue-bearing questions and audience snap/clap feedback.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Guessing Game","formatRole":"Short Form","standardHouseUnknownStatus":"Unknown / Flying Pig observed guessing game","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","playerCount":"6 players","minimumPlayers":"6","maximumPlayers":"6","requiresHost":"Functionally yes — press secretary / presenter controls the game","requiresAudience":"Yes","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"5–10 min typical show/practice unit","difficulty":"High","energyLevel":"Medium-High","physicalityLevel":"Medium","verbalLanguageLoad":"High","memoryTrackingLoad":"High","audienceInteractionLevel":"High","bestUse":"Advanced guessing-game practice; show-ready press-conference guessing game; clue-giving through questions","coreSkills":"guessing; clue-giving; hosting; reporter characters; audience feedback; press conference framing","tags":"Short Form, Guessing Game, Advanced, Show Ready, Superhero, Press Conference, Reporter Questions, Audience Feedback, Clue-Giving","confidenceReviewStatus":"Reviewed / Troy-described","sourceBasisInferenceNotes":"Based on Troy's description and clarification. Six-player guessing game: superhero guesser leaves; press secretary gets superhero name, power, and disaster from audience; reporters ask clue-bearing questions; audience snaps when close and claps when correct.","notesForFutureHTMLTool":"Add to guessing-game filters, superhero/theme filters, six-player games, audience-feedback games, and advanced/show-ready recommendations."},"coreSkills":["guessing","clue-giving","hosting","reporter characters","audience feedback","press conference framing"],"tags":["Short Form","Guessing Game","Advanced","Show Ready","Superhero","Press Conference","Reporter Questions","Audience Feedback","Clue-Giving"],"roles":["Press Secretary","Superhero (guesser)","Reporter 1","Reporter 2","Reporter 3","Reporter 4"],"fullMarkdown":"**Skills**\nguessing; clue-giving; hosting; reporter characters; audience feedback; press conference framing\n\n**Rules**\n- Six players are selected.\n- One player is the superhero and guesser.\n- The superhero leaves the room or otherwise cannot hear the audience suggestions.\n- One player remains as the press secretary / presenter.\n- The remaining four players are reporters. They embed in the audience before the show begins — seated among the audience members so the opening feels like a real press conference being interrupted by reporters in the room.\n- The press secretary gets three audience suggestions:\n  - the superhero's name,\n  - the superhero's power,\n  - the disaster the superhero saved the city from.\n- The superhero is called back in.\n- The scene is framed as a press conference where the city is honoring the superhero after the disaster.\n\n**Success Looks Like**\n- The superhero guesses actively throughout the interview.\n- Reporters ask clear, funny, clue-bearing questions.\n- The press secretary keeps the press conference organized.\n- The audience understands the snap/clap feedback system and participates.\n- The three target answers are discovered through escalating clues.\n- The superhero name, power, and disaster feel theatrically justified by the end.\n- The game produces a strong reveal/payoff rather than simply checking off answers.\n\n**For Students**\n- The press secretary should explain the audience feedback before the superhero returns or immediately after the return.\n- The superhero should keep guessing; wrong guesses are useful.\n- Reporters should ask questions that sound like press questions while carrying clues.\n- Strong reporter questions reveal both clue information and reporter character.\n- The press secretary should track which of the three answers have been solved.\n- Once one answer is guessed correctly, shift the clue pressure toward the remaining answers.\n- The game works best when the superhero accepts the premise and behaves as if they really are being honored.\n- The press conference should feel official enough that the absurdity has a strong frame.\n- The audience snapping/clapping gives the guesser a feedback loop, so players should leave space for that feedback to register.\n\n**For Teachers**\n- Reporters ask questions that are too vague to help.\n- Reporters ask questions that are so obvious they give the answer away immediately.\n- The press secretary does not manage the order or pacing.\n- The superhero does not guess out loud often enough.\n- The audience feedback is not explained clearly.\n- Reporters forget to create their own identities or attitudes.\n- The questions become random instead of clue-bearing.\n- The press conference frame collapses into generic guessing.\n- The superhero guesses one category but the ensemble fails to pivot clearly to the remaining categories.\n- Players talk around the clue instead of making playable offers.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Key to the City","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":"b73c7a2e3d79513a"}},{"id":"best-friends","name":"Best Friends","category":"Exercises","type":"Short-form / Skills Exercise","formatRole":"Exercise","shortDescription":"A two-and-a-half-player scene exercise where two players match emotional, physical, and vocal energy as distinct aligned characters, then a third player enters near the end with opposing energy.","metadata":{"catalogCategory":"Scene, Character, and Story Exercises","type":"Short-form / Skills Exercise","formatRole":"Exercise","standardHouseUnknownStatus":"Flying Pig observed; exact standard status unknown","beginnerClassSuitability":"Late","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece / possible short-form-adjacent exercise","playerCount":"2.5 players / 3 with delayed third entrance","minimumPlayers":"3","maximumPlayers":"3","requiresHost":"No documented; coach facilitates","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"3–6 min per rep","difficulty":"Mid-High","energyLevel":"Medium to High","physicalityLevel":"Medium-High","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Low","bestUse":"Energy matching; partner alignment; shared POV; late contrast; character relationship work","coreSkills":"energy matching; partner listening; emotional synchronization; physical/vocal alignment; contrast; shared worldview","tags":"Exercise, Best Friends, Energy Matching, Partner Alignment, Contrast, Third Player Entrance, Character Relationship, Flying Pig Observed","confidenceReviewStatus":"Reviewed / Troy-described","sourceBasisInferenceNotes":"Based on Troy's description and clarification. Troy practiced it once. Two players do most of the scene from a word get, matching emotional/physical/vocal energy as distinct characters; third player enters near the end with opposing energy.","notesForFutureHTMLTool":"Add to scene exercise, character, partner listening, energy matching, and contrast filters. Do not classify as a standard show game unless later confirmed."},"coreSkills":["energy matching","partner listening","emotional synchronization","physical/vocal alignment","contrast","shared worldview"],"tags":["Exercise","Best Friends","Energy Matching","Partner Alignment","Contrast","Third Player Entrance","Character Relationship","Flying Pig Observed"],"fullMarkdown":"**Skills**\nenergy matching; partner listening; emotional synchronization; physical/vocal alignment; contrast; shared worldview\n\n**Rules**\n- Two players begin the scene.\n- The coach gives them a simple word suggestion.\n- The first two players use the word to initiate a scene.\n- The scene runs primarily as a two-person scene.\n- The two players should play distinct characters while matching each other's emotional, physical, and vocal energy.\n- A third player enters near the end with opposing energy.\n\n**Success Looks Like**\n- The first two players feel strongly connected.\n- Their shared energy is readable quickly.\n- The audience can tell why these two characters belong together.\n- The characters remain distinct while sharing emotional/physical/vocal tone.\n- The third player's entrance creates immediate contrast.\n- The contrast reveals something about the first two players.\n- The scene ends soon after the disruption lands.\n- The exercise sharpens partner awareness and energy matching.\n\n**For Students**\n- The first two players should quickly identify and heighten a shared energy.\n- Matching means emotional, physical, and vocal alignment, not identical behavior.\n- Distinct characters can still share the same rhythm, intensity, attitude, and worldview.\n- The third player should make a clean, contrasting offer.\n\n**For Teachers**\n- The first two players do not match energy clearly.\n- The players copy each other mechanically instead of sharing a playable energy.\n- The players become identical rather than distinct aligned characters.\n- The first two players should quickly identify and heighten a shared energy.\n- Matching means emotional, physical, and vocal alignment, not identical behavior.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Best Friends","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"c2c748bbb126757f"}},{"id":"status-inversion","name":"Status Inversion","category":"Exercises","type":"Skills Exercise / Status Scene Drill","formatRole":"Exercise","shortDescription":"A two-player status drill where players receive an uneven relationship, then reverse the actual power dynamic while keeping the external roles intact.","metadata":{"standardStatus":"Flying Pig observed; standard status-work concept","beginnerSuitability":"Maybe / after basic status concepts are introduced","advancedSuitability":"Strong","showSuitability":"Not primary show piece","playerCount":"Two players","minimumPlayers":2,"maximumPlayers":2,"requiresHost":"No documented; coach facilitates","requiresAudience":"No documented","requiresProps":"No documented prop requirement","propsMaterialsNeeded":"None documented","estimatedRuntime":"1–3 min per rep","difficulty":"Mid","energyLevel":"Medium","physicalityLevel":"Medium","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Low-Medium","audienceInteractionLevel":"Low","bestUse":"Status awareness, power dynamics, relationship clarity, role/status separation, audience readability","confidenceReviewStatus":"Reviewed / Troy-described","sourceBasisInferenceNotes":"Based on Troy's description and clarification. Two players receive an uneven relationship; during the scene the coach tells them to reverse status while keeping roles intact. Guest teacher emphasized making the inversion obvious to the audience.","notesForFutureHtmlTool":"Add to scene exercise, status, relationship, power dynamics, two-person exercise, and audience-readability filters. Do not classify as a show game.","beginnerClassSuitability":"","advancedClassSuitability":"Exercise"},"coreSkills":["status","power dynamics","relationship clarity","physical status","vocal status","audience readability"],"tags":["Exercise","Status","Status Inversion","Power Dynamics","Relationship","Two-Person Scene","Guest Teacher","Audience Readability"],"fullMarkdown":"**Skills**\nstatus; power dynamics; relationship clarity; physical status; vocal status; audience readability\n\n**Rules**\nTwo players are assigned an uneven relationship with a clear external hierarchy (boss/employee, teacher/student, parent/child). The player in the lower-status role must hold the actual power while maintaining the appearance of deference. The higher-status role must yield real control without appearing to. Status is expressed physically and vocally, not just through dialogue.\n\n**Success Looks Like**\nThe audience can clearly read both the official hierarchy and the inverted real power simultaneously; status shifts are visible in body language, space, and voice — not just in what is said; the inversion feels earned through behavior rather than stated.","source":{"catalogFile":"Flying_Pig_Improv_Game_Catalog_v13_new_show_and_circle_games.md","metadataFile":"flying_pig_activity_metadata_reviewed_v2.csv","catalogHeading":"Status Inversion","catalogCategoryFromMarkdown":"Scene, Character, and Story Exercises","markdownSha256Short":"11b56b8118bc7d3f"}},{"id":"questions-only","name":"Questions Only","category":"Short Form","type":"Short Form Game","formatRole":"Short Form","shortDescription":"Players must communicate entirely through questions; any statement or non-responsive question ends your turn.","metadata":{"catalogCategory":"Short Form Games","type":"Short Form Game","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Shortform","showSuitability":"Yes","formatRole":"Short Form","playerCount":"4+ players, 2 at a time on stage","minimumPlayers":"4","maximumPlayers":"No maximum documented","requiresHost":"No","requiresAudience":"Yes","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"5–10 min","difficulty":"Medium-High","energyLevel":"Medium","physicalityLevel":"Low","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Advanced class / show piece for language precision and group pressure","coreSkills":"active listening; agreement; quick thinking; language precision; scene work","tags":"Short Form, Medium-High, active listening, agreement, quick thinking, language precision, scene work, audience, questions","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Rules documented from Flying Pig class practice. Suitability and load fields are first-pass tooling inferences.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["active listening","agreement","quick thinking","language precision","scene work"],"tags":["Short Form","Medium-High","active listening","agreement","quick thinking","language precision","scene work","audience","questions"],"fullMarkdown":"**Skills**\nactive listening; agreement; quick thinking; language precision; scene work\n\n**Setup**\nTwo players take the stage. Remaining players wait on the sides, divided into two groups (left/right). Players self-manage — no host required.\n\n**Rules**\n- Players may only speak in questions. Any statement ends your turn immediately.\n- A statement followed by a question is not a valid response. For example, “It’s hot in here, are you sweating?” is a violation. (Note: this rule may be refined in future Flying Pig practice as experience accumulates.)\n- Each question must respond meaningfully to the previous question. Non-sequitur questions are not allowed. For example, if asked “Would you like a hot dog or a hamburger?” you cannot reply “Who is your favorite singer?”\n- You cannot repeat a question already asked in the scene.\n- When a player is buzzed out, a new player from the waiting group steps up and a new scene begins.\n\n**Success Looks Like**\nPlayers sustain genuine scene work — establishing location, relationship, and stakes — entirely through questions, with the constraint creating pressure rather than collapsing the scene.\n\n**For Students**\n- The hardest part is not the question format itself — it’s maintaining scene logic while under format pressure. Stay in the scene; the constraint will take care of itself.\n- A question that “responds” means you accept what the other player established. You can’t just fire off an unrelated question.\n- Sentences that start with a question word but trail into a statement are still statements. Monitor your phrasing.\n\n**For Teachers**\n- Buzz clearly and without hesitation — ambiguous calls slow the game and reduce the pressure that makes it work.\n- The “statement + question” rule (e.g., “It’s hot in here, are you sweating?”) is the most common gray area. Flying Pig rules treat this as a violation.\n- Watch for players who coast by asking vague, scene-neutral questions. The game is more interesting when questions have offers embedded in them.\n- New scenes reset each time someone steps up — don’t let players try to continue a prior scene.\n\n---","source":{"catalogFile":"Flying Pig class practice — not in catalog v13","metadataFile":"Troy Graber — direct documentation","catalogHeading":"Questions Only","catalogCategoryFromMarkdown":"Short Form Games","markdownSha256Short":""}},{"id":"turn-and-count","name":"Turn and Count","category":"Exercises","type":"Exercise","formatRole":"Exercise","shortDescription":"Group stands in a circle facing outward and attempts to count together without anyone speaking simultaneously — building group mind without visual cues.","metadata":{"catalogCategory":"Exercises","type":"Exercise","standardHouseUnknownStatus":"Standard improv practice; FP details documented","beginnerClassSuitability":"","advancedClassSuitability":"Exercise","showSuitability":"Not primary show piece","formatRole":"Exercise","playerCount":"Whole class","minimumPlayers":"4","maximumPlayers":"Class size","requiresHost":"No","requiresAudience":"No","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"10–20 min","difficulty":"Medium","energyLevel":"Low","physicalityLevel":"Low","verbalLanguageLoad":"Low","memoryTrackingLoad":"Low","audienceInteractionLevel":"None","bestUse":"Group mind and ensemble awareness exercise for advanced class","coreSkills":"group mind; active listening; presence; restraint","tags":"Exercise, Low, group mind, active listening, presence, restraint, ensemble, circle","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Rules documented from Flying Pig class practice. Suitability and load fields are first-pass tooling inferences.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["group mind","active listening","presence","restraint"],"tags":["Exercise","Low","group mind","active listening","presence","restraint","ensemble","circle"],"fullMarkdown":"**Skills**\ngroup mind; active listening; presence; restraint\n\n**Setup**\nThe group stands in a circle, then all turn to face outward so no one can see anyone else.\n\n**Rules**\n- Players count upward together, one number per speaker, in no fixed order — any player may say any number.\n- If two players speak at the same time, the count resets to 1 and the group tries again.\n- There is no signal, no turn order, and no coordination other than listening.\n\n**Success Looks Like**\nThe group sustains a long count without collision. High counts require the ensemble to develop a shared sense of timing and an instinct for when to hold back versus step forward.\n\n**For Students**\n- Restraint is as important as initiative. Knowing when *not* to speak is the skill.\n- Don’t try to “plan” when you’ll speak — stay present and let the number arrive naturally.\n- A long count feels different from a short one. Notice what changes internally when the group is in sync.\n\n**For Teachers**\n- This exercise reveals individual tendencies clearly: some players count frequently, others rarely. Neither extreme is ideal — the goal is shared initiative.\n- It also tests willingness to protect the group. Players who hold back too much are leaving the work to others; players who jump in too fast are prioritizing themselves.\n- Multiple rounds in a session are normal. The group often improves significantly across rounds, and the jump from a low count to a breakthrough count (e.g., reaching 39) can be a meaningful shared experience.\n- No facilitation is needed during the exercise itself — debrief afterward if useful.\n\n---","source":{"catalogFile":"Flying Pig class practice — not in catalog v13","metadataFile":"Troy Graber — direct documentation","catalogHeading":"Turn and Count","catalogCategoryFromMarkdown":"Exercises","markdownSha256Short":""}},{"id":"the-get","name":"The Get (Getting a Suggestion)","category":"Show Craft","type":"Show Craft / Stage Convention","formatRole":"Show Craft","shortDescription":"How to ask an audience for a suggestion — wording, technique, and how to use what you receive.","metadata":{"catalogCategory":"Show Craft","type":"Show Craft / Stage Convention","standardHouseUnknownStatus":"Flying Pig House Practice","beginnerClassSuitability":"Reference","advancedClassSuitability":"Reference","showSuitability":"Yes","formatRole":"Show Craft","playerCount":"1 (the player soliciting the suggestion)","minimumPlayers":"1","maximumPlayers":"1","requiresHost":"No","requiresAudience":"Yes","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"Under 1 min","difficulty":"Low","energyLevel":"Low","physicalityLevel":"Low","verbalLanguageLoad":"Medium","memoryTrackingLoad":"Low","audienceInteractionLevel":"High","bestUse":"Pre-scene ritual for shortform and longform; teachable moment for new performers","coreSkills":"audience connection; suggestion interpretation; offer framing","tags":"Show Craft, audience, suggestion, get, ritual, shortform, longform","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Flying Pig house wording documented by Troy Graber. Interpretation coaching from Sharla.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["audience connection","suggestion interpretation","offer framing"],"tags":["Show Craft","audience","suggestion","get","ritual","shortform","longform"],"fullMarkdown":"**Skills**\naudience connection; suggestion interpretation; offer framing\n\n**The Flying Pig Wording**\nAt Flying Pig, a suggestion is always solicited with: **\"May I please have (a / something) ...\"**\n\nThis phrasing is a house convention. Variations like \"Can I have...\", \"Give me...\", or \"Tell me...\" are incorrect and will be corrected in class.\n\n**Good Examples**\n- \"May I please have something that fits into a box this big.\" *(mime the size)*\n- \"May I please have a word with multiple meanings.\"\n- \"May I please have a non-geographical location, like a bathroom or a studio.\"\n\n**Bad Examples**\n- \"Give me something small.\"\n- \"Can I have a word with multiple meanings.\"\n- \"Tell me a location that isn't geographical, like a bathroom or a studio.\"\n\n**Constraint and Creativity**\nHow specific you make the ask shapes what you get back.\n\n- A *constrained* ask (\"May I please have a job that starts with the letter P\") is more likely to produce common, predictable answers — Plumber, Painter, Pilot.\n- An *open* ask (\"May I please have a type of job\") is more likely to produce unexpected answers — Paleontologist, Puppeteer, Patent Attorney.\n\nUse constraint deliberately: if the game needs a mundane, workable suggestion, constrain more. If the game benefits from a surprising or unusual one, constrain less.\n\n**Interpreting the Get (A to C)**\nDon't use the suggestion literally. Take it from A to C.\n\nIf the suggestion is *Diamonds*, don't do a scene about diamonds. Instead, go to something the suggestion *invokes* — jewelry broadly, smuggling, mining, wealth, pressure, engagement, DeBeers marketing. The suggestion is a launching point, not a script note.\n\nThis is especially important in longform, where using the get too literally produces a narrow or on-the-nose scene. Shortform games may use the get more directly depending on format.\n\n*(A-to-C framing attributed to Sharla.)*\n\n**For Students**\n- Memorize the \"May I please have\" phrasing — it is a house convention, not a suggestion.\n- When asking for something specific, less constraint usually produces more interesting material.\n- When you receive the suggestion, your first instinct (A) is often what everyone else would think of. Go one step further (C).\n\n**For Teachers**\n- Correct \"Can I have\" and \"Give me\" immediately and consistently — the phrasing carries the relationship with the audience.\n- The A-to-C principle is especially worth reinforcing before longform sets, where lazy gets produce flat openers.\n\n---","source":{"catalogFile":"Flying Pig class and show practice — not in catalog v13","metadataFile":"Troy Graber — direct documentation","catalogHeading":"The Get (Getting a Suggestion)","catalogCategoryFromMarkdown":"Show Craft","markdownSha256Short":""}},{"id":"show-opener","name":"Show Opener","category":"Show Craft","type":"Show Craft / Show Ritual","formatRole":"Show Craft","shortDescription":"The structured opening sequence that welcomes the audience, explains improv, covers safety, trains the audience, and brings the troupe on stage.","metadata":{"catalogCategory":"Show Craft","type":"Show Craft / Show Ritual","standardHouseUnknownStatus":"Flying Pig House Practice","beginnerClassSuitability":"","advancedClassSuitability":"","showSuitability":"Yes","formatRole":"Show Craft","playerCount":"1 host plus full troupe","minimumPlayers":"2","maximumPlayers":"Class size","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"3–5 min","difficulty":"Medium","energyLevel":"Medium","physicalityLevel":"Low","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"High","bestUse":"Opens every Flying Pig show","coreSkills":"audience connection; host presence; show structure","tags":"Show Craft, audience, host, ritual, opener, shortform, longform","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Documented from Flying Pig show observation by Troy Graber.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["audience connection","host presence","show structure"],"tags":["Show Craft","audience","host","ritual","opener","shortform","longform"],"fullMarkdown":"**Skills**\naudience connection; host presence; show structure\n\n**Structure**\n\n**1. Thank the audience**\n> \"Thank you for coming to Flying Pig Improv.\"\n\n**2. Explain what improv is**\n> \"The show you see tonight will be completely unique — there will never be another one like it — because we do improv. That means we don't work with scripts; we make everything up on the spot. We do shortform games, which you might be familiar with from *Who's Line Is It Anyway?*, and we also do longform, which is basically unscripted theatre.\"\n\n**3. Safety**\n> \"The main door to the theatre is the one you came in. If for some reason that exit is blocked, there is a second exit from the back of the greenroom — but that door leads directly out onto Douglas, so be careful if you have to exit that way.\"\n\n**4. Train the audience**\n> \"We don't have microphones, so if you're having trouble hearing us, just hold up two fingers in a V and we will speak louder.\"\n\n> \"We're going to ask you to help us from time to time. To give you a sense of how that goes — can anyone tell me what they had for breakfast this morning?\"\n\n*(If a guessing game is in the show:)*\n> \"We also have a guessing game tonight. If the player guesses close, please snap your fingers. If they guess right, give them some claps.\"\n\n**5. Summon the troupe**\n> \"We are ready to go. The last thing we need to do is summon our troupe — and I need your help with that. On the count of three, please yell '[troupe name], get in here!' One. Two. Three.\"\n\n**6. Troupe introduction**\nTroupe enters and introduces themselves by first name, stage left to stage right.\n\n**7. Transition to first scene.**\n\n**For Hosts**\n- The audience training section is functional, not decorative — it establishes participation norms before the first game begins.\n- The breakfast question is a low-stakes warm-up that shows the audience what giving a suggestion feels like and confirms they're willing to participate.\n- The guessing game instructions are conditional — include them only if that format is in the show.\n- The troupe summon is a ritual moment; commit to it fully and hold the energy through the intro.\n- Keep the opener moving — it should feel welcoming but not stall before the first scene.\n\n---","source":{"catalogFile":"Flying Pig show observation — not in catalog v13","metadataFile":"Troy Graber — direct documentation","catalogHeading":"Show Opener","catalogCategoryFromMarkdown":"Show Craft","markdownSha256Short":""}},{"id":"show-closing","name":"Show Closing","category":"Show Craft","type":"Show Craft / Show Ritual","formatRole":"Show Craft","shortDescription":"The structured closing sequence that thanks the audience, promotes upcoming shows and classes, and sends the troupe off stage.","metadata":{"catalogCategory":"Show Craft","type":"Show Craft / Show Ritual","standardHouseUnknownStatus":"Flying Pig House Practice","beginnerClassSuitability":"","advancedClassSuitability":"","showSuitability":"Yes","formatRole":"Show Craft","playerCount":"1 host plus full troupe","minimumPlayers":"2","maximumPlayers":"Class size","requiresHost":"Yes","requiresAudience":"Yes","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"2–4 min","difficulty":"Low","energyLevel":"Medium","physicalityLevel":"Low","verbalLanguageLoad":"High","memoryTrackingLoad":"Medium","audienceInteractionLevel":"Medium","bestUse":"Closes every Flying Pig show","coreSkills":"audience connection; host presence; show structure","tags":"Show Craft, audience, host, ritual, closing, shortform, longform","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Documented from Flying Pig show observation by Troy Graber.","notesForFutureHTMLTool":"Use as filter row; do not display inferred suitability as Flying Pig fact. Preserve original catalog entry for full expanded view."},"coreSkills":["audience connection","host presence","show structure"],"tags":["Show Craft","audience","host","ritual","closing","shortform","longform"],"fullMarkdown":"**Skills**\naudience connection; host presence; show structure\n\n**Structure**\n\n**1. Thank the audience**\n> \"Thank you so much for coming to see us. If you enjoyed it, please leave us a review.\"\n\n**2. Invite to upcoming Flying Pig events**\n\n*Shows:*\n> \"We do a new show every Friday and Saturday night. Every show is unique, so come and see them.\"\n\n*Sketch Comedy:*\n> \"At the end of the month, we have a sketch comedy group that performs here after our show.\"\n\n*Classes:*\n> \"If this looks like something you'd like to try, we run classes.\"\n- Drop-in Shortform class: every Saturday at 11 AM\n- Silver Improv (55+): every Tuesday at 11 AM\n- Advanced class (short and longform): Thursday evenings\n\n**3. Troupe farewell**\nTroupe introduces themselves by first name, stage left to stage right, then exits.\n\n**For Hosts**\n- The review ask is brief but worth delivering clearly — it's one of the most valuable things an audience member can do for the theatre.\n- The class pitch is a genuine invitation, not just housekeeping. Deliver it like you mean it.\n- Class times are current as of documentation but may change — verify before each show.\n- The troupe introduction mirrors the opener; it bookends the show and gives the audience a final moment with each performer by name.\n\n---","source":{"catalogFile":"Flying Pig show observation — not in catalog v13","metadataFile":"Troy Graber — direct documentation","catalogHeading":"Show Closing","catalogCategoryFromMarkdown":"Show Craft","markdownSha256Short":""}},{"id":"viola-spolin-history","name":"History of Improv / Viola Spolin","category":"Show Craft","type":"Show Craft / Context","formatRole":"Show Craft","shortDescription":"The origin of theater games and modern improv — Viola Spolin, her settlement house work, Paul Sills, and the lineage to Second City.","metadata":{"catalogCategory":"Show Craft","type":"Show Craft / Context","standardHouseUnknownStatus":"Flying Pig House Context","beginnerClassSuitability":"Reference","advancedClassSuitability":"Reference","showSuitability":"Reference","formatRole":"Show Craft","playerCount":"N/A","minimumPlayers":"N/A","maximumPlayers":"N/A","requiresHost":"No","requiresAudience":"No","requiresProps":"No","propsMaterialsNeeded":"None","estimatedRuntime":"N/A","difficulty":"N/A","energyLevel":"N/A","physicalityLevel":"N/A","verbalLanguageLoad":"N/A","memoryTrackingLoad":"N/A","audienceInteractionLevel":"N/A","bestUse":"Context and lineage for students and performers; Jesse references this in class","coreSkills":"improv history; context","tags":"Show Craft, context, history, Viola Spolin, Paul Sills, Second City, theater games","confidenceReviewStatus":"High enough for first-pass tooling","sourceBasisInferenceNotes":"Historical facts from violaspolin.org, secondcity.com, Jewish Women's Archive, WTTW Chicago. Jesse's version documented by Troy Graber.","notesForFutureHTMLTool":"Reference entry — no suitability filtering applies. Display as context/history."},"coreSkills":["improv history","context"],"tags":["Show Craft","context","history","Viola Spolin","Paul Sills","Second City","theater games"],"fullMarkdown":"**Context**\nThis is not a game or exercise — it is background on where improv comes from. Jesse references this history in class.\n\n**Jesse's Version (as told in class)**\n\"I'll bet you think these feel a bit like children's games. Well, actually they were initially invented by a woman named Viola Spolin, who created them to help neurodivergent children and ESL children communicate better. To this day her kids are running Spolin workshops.\"\n\n**The Historical Record**\nViola Spolin (1906–1994) was born in Chicago to Russian Jewish immigrants. In the late 1930s and early 1940s, she worked as a drama supervisor for the WPA's Recreational Project, developing games for use with immigrant and inner-city children in settlement houses. Her key insight: lectures about theater technique were useless with children or adults who had limited English, but when those techniques became the focus of a *game*, students could absorb them organically. She was influenced by Neva Boyd, whose work at Chicago's Group Work School explored using traditional game structures to break down cultural and ethnic barriers.\n\nHer games were designed to reach across divisions of culture and language — the \"ESL children\" framing Jesse uses is essentially accurate, though \"ESL\" is modern terminology for what Spolin was observing in the 1930s.\n\nThe \"neurodivergent children\" framing does not appear explicitly in the historical record, though the exercises were demonstrably useful in therapeutic contexts for children with learning differences. (See Troy's commentary.)\n\nIn 1955, Spolin taught her games to actors working with her son, **Paul Sills**, at the University of Chicago. Sills used them with the **Compass Players** — the first improvisational theater in America — whose cast included Mike Nichols, Elaine May, and Alan Alda. Sills went on to co-found **The Second City** in Chicago in 1959.\n\nIn 1963, Spolin published *Improvisation for the Theater*, which compiled her theater games. It remains the foundational text of the form.\n\n**\"Her kids are running Spolin workshops\"**\nJesse's reference to \"her kids\" points to Paul Sills (1927–2008), who was her son and the primary carrier of her work into the American improv tradition. Sills died in 2008. The Spolin estate and website (violaspolin.org) continue to maintain and promote her work and theater games.\n\n**Why It Matters**\nThe games used at Flying Pig — including warmups, exercises, and shortform formats — are part of a continuous lineage from Spolin's settlement house work. They were never designed primarily as entertainment; they were tools for human connection across barriers. That origin is still visible in how they function.\n\n---","source":{"catalogFile":"Flying Pig class context — not in catalog v13","metadataFile":"Troy Graber — direct documentation; historical research via violaspolin.org, secondcity.com, Jewish Women's Archive","catalogHeading":"History of Improv / Viola Spolin","catalogCategoryFromMarkdown":"Show Craft","markdownSha256Short":""}}],"validation":{"metadataRows":67,"activitiesCreated":67,"missingMarkdownEntries":[],"categoryMismatches":[],"excludedMarkdownHeadings":["Existential Crisis Opening","Existential Crisis Closing","1. Clear structure supports risk","2. Physical commitment is treated as central","3. Fast recovery matters more than perfection","4. Audience care is a repeated hidden skill","5. Jesse’s teaching pushes large readability","6. Advanced work often fails at transitions before it fails at scene content","7. Hosting and producer roles are real performance skills","8. Constraint games reveal specific technical growth","9. Scene-memory forms require clearer teaching progressions"]}};

const ACTIVITIES = DATASET.activities;
const CATEGORY_ORDER = [
    'Rituals',
    'Warmups',
    'Exercises',
    'Short Form',
    'Long Form',
    'Closers'
];
const DIFF_SORT = ['Low','Mid-Low','Mid','Mid-High','High'];
function catRank(a) {
    const r = CATEGORY_ORDER.indexOf(a.category);
    return r === -1 ? 999 : r;
}
function diffRank(a) {
    const r = DIFF_SORT.indexOf(a.metadata.difficulty);
    return r === -1 ? 999 : r;
}

function getById(id) { return ACTIVITIES.find(a => a.id === id); }

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

const DIFF_GROUPS = {
    low: ['Low','Mid-Low'],
    medium: ['Mid'],
    high: ['Mid-High','High'],
};

function filterActivities() {
    state.search = document.getElementById('search').value.toLowerCase();
    state.filterCategory = document.getElementById('filter-category').value;
    state.filterSuitability = document.getElementById('filter-suitability').value;
    state.filterDifficulty = document.getElementById('filter-difficulty').value;
    renderActivityList();
}

function getFiltered() {
    return ACTIVITIES.filter(a => {
        const m = a.metadata;
        if (state.search) {
            const hay = [a.name, a.category, (a.coreSkills||[]).join(' '), (a.tags||[]).join(' '), a.formatRole||''].join(' ').toLowerCase();
            if (!hay.includes(state.search)) return false;
        }
        if (state.filterCategory && a.category !== state.filterCategory) return false;
        if (state.filterSuitability) {
            if (state.filterSuitability === 'beginner' && !['Early','Mid','Late','Capstone','Closer'].includes(m.beginnerClassSuitability||'')) return false;
            if (state.filterSuitability === 'advanced' && !['Warmup','Exercise','Shortform','Longform','Closer'].includes(m.advancedClassSuitability||'')) return false;
            if (state.filterSuitability === 'show' && !['Strong','Yes'].some(v => (m.showSuitability||'').includes(v))) return false;
        }
        if (state.filterDifficulty) {
            const grp = DIFF_GROUPS[state.filterDifficulty] || [];
            if (!grp.includes(m.difficulty||'')) return false;
        }
        return true;
    }).sort((a,b) => {
        const rd = catRank(a) - catRank(b);
        if (rd !== 0) return rd;
        const dd = diffRank(a) - diffRank(b);
        return dd !== 0 ? dd : a.name.localeCompare(b.name);
    });
}

function renderActivityList() {
    const acts = getFiltered();
    const container = document.getElementById('activity-list');
    document.getElementById('result-count').textContent = acts.length + ' of ' + ACTIVITIES.length + ' activities';
    if (!acts.length) {
        container.innerHTML = '<p class="no-results">No activities match your filters.</p>';
        return;
    }
    container.innerHTML = acts.map(renderCard).join('');
}

function normDiff(d) {
    if (d === 'Low') return 'low';
    if (d === 'Mid-Low') return 'mid-low';
    if (d === 'Mid-High') return 'mid-high';
    if (d === 'High') return 'high';
    return 'medium';
}

function renderCard(a) {
    const m = a.metadata;
    const isExp = state.expandedId === a.id;
    const badges = [];
    const BEG_VALID = ['Warmup','Early','Mid','Late','Capstone','Closer'];
    const ADV_VALID = ['Warmup','Exercise','Shortform','Longform','Closer'];
    const bsuit = m.beginnerClassSuitability||'';
    if (BEG_VALID.includes(bsuit))
        badges.push(`<span class="badge badge-beginner">Beg: ${bsuit}</span>`);
    const asuit = m.advancedClassSuitability||'';
    if (ADV_VALID.includes(asuit))
        badges.push(`<span class="badge badge-advanced">Adv: ${asuit}</span>`);
    if (['Strong','Yes'].some(v => (m.showSuitability||'').includes(v)))
        badges.push('<span class="badge badge-show">Show</span>');

    const inner = isExp ? `
    <div class="activity-full">
        <div class="activity-meta-grid">
            <div><strong>Format Role:</strong> ${a.formatRole||'—'}</div>
            <div><strong>Difficulty:</strong> ${m.difficulty||'—'}</div>
            <div><strong>Energy:</strong> ${m.energyLevel||'—'}</div>
            <div><strong>Players:</strong> ${m.playerCount||'—'}</div>
            <div><strong>Runtime:</strong> ${m.estimatedRuntime||'—'}</div>
            ${['No','No / Optional','No documented prop requirement'].includes(m.requiresProps||'') ? '' : `<div><strong>Props:</strong> ${m.requiresProps}</div>`}
        </div>
        ${a.coreSkills && a.coreSkills.length ? '<p class="meta-skills"><strong>Core Skills:</strong> ' + a.coreSkills.join('; ') + '</p>' : ''}
        ${m.bestUse ? '<p class="meta-use"><strong>Best Use:</strong> ' + m.bestUse + '</p>' : ''}
        ${m.avoidWhen && !m.avoidWhen.startsWith('Needs Review only') ? '<p class="meta-avoid"><strong>Avoid When:</strong> ' + m.avoidWhen + '</p>' : ''}
        ${a.introScript ? `<div class="intro-script-block"><div class="intro-script-label">Intro Script</div><div class="intro-script-text">${a.introScript.replace(/\n/g,'<br>')}</div></div>` : ''}
        <div class="full-markdown">${renderMD(a.fullMarkdown)}</div>
    </div>` : '';

    return `<div class="activity-card${isExp?' expanded':''}" id="card-${a.id}">
        <div class="activity-header" onclick="toggleCard('${a.id}')">
            <div class="activity-name-row">
                <span class="activity-name">${a.name}</span>
                <span class="expand-icon">${isExp?'▲':'▼'}</span>
            </div>
            <div class="activity-meta-row">
                <span class="activity-category">${a.category}</span>
                <span class="activity-difficulty diff-${normDiff(m.difficulty)}">${m.difficulty||''}</span>
                <span style="display:inline-flex;gap:4px;align-items:center;">${badges.join('')}</span>
            </div>
            ${!isExp && a.shortDescription ? `<div class="activity-short-desc">${a.shortDescription}</div>` : ''}
        </div>${inner}</div>`;
}

function toggleCard(id) {
    state.expandedId = state.expandedId === id ? null : id;
    renderActivityList();
    if (state.expandedId) {
        setTimeout(() => {
            const el = document.getElementById('card-' + id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 50);
    }
}

function renderMD(text) {
    if (!text) return '';
    let html = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>');
    const lines = html.split('\n');
    const out = [];
    let inUL = false;
    for (const line of lines) {
        if (/^### /.test(line)) {
            if (inUL) { out.push('</ul>'); inUL = false; }
            out.push('<h3>' + line.slice(4) + '</h3>');
        } else if (/^## /.test(line)) {
            if (inUL) { out.push('</ul>'); inUL = false; }
            out.push('<h2>' + line.slice(3) + '</h2>');
        } else if (/^# /.test(line)) {
            if (inUL) { out.push('</ul>'); inUL = false; }
            out.push('<h1>' + line.slice(2) + '</h1>');
        } else if (/^- /.test(line)) {
            if (!inUL) { out.push('<ul>'); inUL = true; }
            out.push('<li>' + line.slice(2) + '</li>');
        } else if (/^---$/.test(line.trim())) {
            if (inUL) { out.push('</ul>'); inUL = false; }
            out.push('<hr>');
        } else if (line.trim() === '') {
            if (inUL) { out.push('</ul>'); inUL = false; }
        } else {
            if (inUL) { out.push('</ul>'); inUL = false; }
            out.push('<p>' + line + '</p>');
        }
    }
    if (inUL) out.push('</ul>');
    return out.join('\n');
}

function mkSlot(activity, slotType, locked, reasonTags, extra) {
    return Object.assign({ activity, slotType, locked, reasonTags }, extra||{});
}

function isBeginnerElig(a) {
    const s = a.metadata.beginnerClassSuitability||'';
    return ['Early','Mid','Late','Capstone','Closer'].includes(s);
}
function isAdvancedElig(a) {
    const s = a.metadata.advancedClassSuitability||'';
    return ['Warmup','Exercise','Shortform','Longform','Closer'].includes(s);
}
function isShowElig(a) {
    const s = a.metadata.showSuitability||'';
    return s === 'Strong' || s === 'Yes';
}
function isHard(d) { return d==='Hard'||d==='High'||d==='Moderate to Hard'; }

function autoTags(a, mode) {
    const m = a.metadata;
    const tags = [];
    const suit = mode==='beginner' ? m.beginnerClassSuitability :
                 mode==='advanced' ? m.advancedClassSuitability : m.showSuitability;
    if ((suit||'').includes('Strong')) tags.push(mode + ' · strong');
    else tags.push(mode + '-eligible');
    if (a.formatRole) tags.push(a.formatRole.toLowerCase().replace(' / ','/'));
    (a.coreSkills||[]).slice(0,2).forEach(s=>tags.push(s));
    if ((m.difficulty||'').toLowerCase().includes('low')||(m.difficulty||'').toLowerCase().includes('easy')) tags.push('no props');
    return tags.slice(0,5);
}

// ── BEGINNER ──────────────────────────────
function genBeginner() {
    const slots = [];
    const used = new Set();

    // Fixed openers
    slots.push(mkSlot(getById('jesses-opening-meditation'),'opening',true,
        ['fixed class opening','Flying Pig ritual','presence','risk readiness']));
    slots.push(mkSlot(getById('zip-zap-zop'),'warmup',true,
        ['fixed class warmup','circle game','focus','eye contact']));
    used.add('jesses-opening-meditation'); used.add('zip-zap-zop');

    // Pick N activities from a given tier, randomized
    function pickTier(tier, count) {
        const pool = ACTIVITIES.filter(a =>
            !used.has(a.id) &&
            (a.metadata.beginnerClassSuitability||'') === tier
        );
        shuffle(pool);
        return pool.slice(0, count);
    }

    // Typical class: ~2 per tier, range 1-3, cap total at 6
    let earlyCount = 1 + Math.floor(Math.random()*3);
    let midCount   = 1 + Math.floor(Math.random()*3);
    let lateCount  = 1 + Math.floor(Math.random()*3);
    // Cap at 6: reduce Late first, then Mid — never below 1
    const over = earlyCount + midCount + lateCount - 6;
    if (over > 0) {
        lateCount  = Math.max(1, lateCount  - over);
        const over2 = earlyCount + midCount + lateCount - 6;
        if (over2 > 0) midCount = Math.max(1, midCount - over2);
    }
    // Floor at 6: pad Late up to 3, then pad Mid with any remainder
    const under = 6 - (earlyCount + midCount + lateCount);
    if (under > 0) {
        const latePad = Math.min(under, 3 - lateCount);
        lateCount += latePad;
        const midPad = under - latePad;
        if (midPad > 0) midCount += midPad;
    }

    pickTier('Early', earlyCount).forEach(a => {
        slots.push(mkSlot(a,'early',false,autoTags(a,'beginner')));
        used.add(a.id);
    });
    pickTier('Mid', midCount).forEach(a => {
        slots.push(mkSlot(a,'mid',false,autoTags(a,'beginner')));
        used.add(a.id);
    });
    pickTier('Late', lateCount).forEach(a => {
        slots.push(mkSlot(a,'late',false,autoTags(a,'beginner')));
        used.add(a.id);
    });

    // Capstone: 3-Line Scenes or I Am a Tree
    const capPool = ACTIVITIES.filter(a => (a.metadata.beginnerClassSuitability||'')==='Capstone');
    shuffle(capPool);
    if (capPool[0]) {
        slots.push(mkSlot(capPool[0],'capstone',false,['capstone exercise','scene work','beginner: capstone']));
        used.add(capPool[0].id);
    }

    // Closer: Five Things or Name Game
    const closerPool = ACTIVITIES.filter(a => (a.metadata.beginnerClassSuitability||'')==='Closer');
    shuffle(closerPool);
    if (closerPool[0]) {
        slots.push(mkSlot(closerPool[0],'closer',false,['class closer','high energy','group support']));
    }

    return {mode:'beginner',label:'Beginner Class',duration:'~90 min',slots};
}

// ── ADVANCED ──────────────────────────────
function genAdvanced() {
    const slots = [];
    const used = new Set();
    const ADV_SKIP = new Set(['jesses-opening-meditation','zip-zap-zop','five-things','name-game']);

    slots.push(mkSlot(getById('jesses-opening-meditation'),'opening',true,
        ['fixed class opening','Flying Pig ritual','presence','risk readiness']));
    slots.push(mkSlot(getById('zip-zap-zop'),'warmup',true,
        ['fixed warmup','variant-ready','focus','speed']));
    used.add('jesses-opening-meditation'); used.add('zip-zap-zop');

    function pickAdv(tier, count) {
        const pool = ACTIVITIES.filter(a =>
            !used.has(a.id) && !ADV_SKIP.has(a.id) &&
            (a.metadata.advancedClassSuitability||'') === tier
        );
        shuffle(pool);
        return pool.slice(0, count);
    }

    // Warmup: 1-2 additional exercises after Zip Zap Zop
    pickAdv('Warmup', 1+Math.floor(Math.random()*2)).forEach(a => {
        slots.push(mkSlot(a,'warmup',false,autoTags(a,'advanced'))); used.add(a.id);
    });

    // Skills + Shortform: max 6 combined; Skills 1-3, Shortform 2-4
    const skillsCount = 1 + Math.floor(Math.random()*3);   // 1-3
    const shortformMax = Math.min(2 + Math.floor(Math.random()*3), 6 - skillsCount); // 2-4, cap at 6 total
    pickAdv('Exercise', skillsCount).forEach(a => {
        slots.push(mkSlot(a,'skills',false,autoTags(a,'advanced'))); used.add(a.id);
    });
    pickAdv('Shortform', shortformMax).forEach(a => {
        slots.push(mkSlot(a,'shortform',false,autoTags(a,'advanced'))); used.add(a.id);
    });

    // Longform: 1 required long-form structure
    const lfOpts = ADVANCED_LF.filter(id=>!used.has(id));
    shuffle(lfOpts);
    if (lfOpts[0]) {
        slots.push(mkSlot(getById(lfOpts[0]),'longform',false,
            ['required long-form','ensemble tracking','late-show structure']));
    }

    slots.push(mkSlot(getById('five-things'),'closer',true,
        ['required closer','high energy','group support']));

    return {mode:'advanced',label:'Advanced Class',duration:'~2.5 hours',slots};
}

// ── SHOW ──────────────────────────────────
const SHOW_FILLER = ['oh-waiter','worlds-worst'];

function genShow() {
    const slots = [];
    const used = new Set();

    // Pick longform — determines whether Town Hall opens
    const lfOpts = [...SHOW_LF]; shuffle(lfOpts);
    const lfId = lfOpts[0]; used.add(lfId);
    const lfAct = getById(lfId);
    const townHallOpens = lfId === 'town-hall';

    // Town Hall goes before Formal Opening
    if (townHallOpens) {
        slots.push(mkSlot(lfAct,'longform',false,
            ['opens show','town hall','long-form','ensemble']));
    }

    // Formal Opening (always fixed)
    slots.push(mkSlot(null,'formal-opening',true,
        ['formal opening','host framing'],
        {displayName:'Formal Opening / Host Framing',
         displayDesc:'Host introduces troupe, frames the show, gets audience suggestion(s).'}));

    // Build shortform pool (excludes guessing games, longforms, filler)
    const COMPLEX_FIRST = new Set(['lines-from-a-box','pillars','spelling-bee','home-shopping-network-hsn']);
    const sfPool = ACTIVITIES.filter(a => {
        if (used.has(a.id)) return false;
        if (!isShowElig(a)) return false;
        if (SHOW_GG.includes(a.id) || SHOW_LF.includes(a.id) || SHOW_FILLER.includes(a.id)) return false;
        return a.category === 'Short Form';
    });
    shuffle(sfPool);

    // Pick opener — avoid complex-setup games first; sfPool already shuffled
    const opCands = sfPool.filter(a => !COMPLEX_FIRST.has(a.id));
    const opener = opCands[0] || sfPool[0];
    if (opener) { slots.push(mkSlot(opener,'shortform',false,autoTags(opener,'show'))); used.add(opener.id); }

    // 1-2 more shortform games before guessing
    const beforeGG = sfPool.filter(a => !used.has(a.id)).slice(0, 1+Math.floor(Math.random()*2));
    beforeGG.forEach(a => { slots.push(mkSlot(a,'shortform',false,autoTags(a,'show'))); used.add(a.id); });

    // Guessing game (required)
    const ggOpts = SHOW_GG.filter(id => !used.has(id)); shuffle(ggOpts);
    if (ggOpts[0]) {
        const ggAct = getById(ggOpts[0]); used.add(ggOpts[0]);
        slots.push(mkSlot(ggAct,'guessing',false,['required guessing game','audience-readable','host structure']));
    }

    // 1-2 shortform games after guessing (only in non-Town Hall shows)
    if (!townHallOpens) {
        const afterGG = sfPool.filter(a => !used.has(a.id)).slice(0, 1+Math.floor(Math.random()*2));
        afterGG.forEach(a => { slots.push(mkSlot(a,'shortform',false,autoTags(a,'show'))); used.add(a.id); });

        // Longform (last game)
        slots.push(mkSlot(lfAct,'longform',false,['required long-form','last game','ensemble tracking']));
    }

    // Filler (always planned; cut on the night if running long)
    const fillerOpts = SHOW_FILLER.filter(id => !used.has(id)); shuffle(fillerOpts);
    if (fillerOpts[0]) {
        slots.push(mkSlot(getById(fillerOpts[0]),'filler',false,
            ['filler','cut if running long'],
            {optional:true}));
    }

    // Conducted Song (~1 in 4 shows)
    if (Math.random() < 0.25) {
        const cs = getById('conducted-song-show-closing-conducted-song');
        if (cs) slots.push(mkSlot(cs,'conducted-song',false,
            ['optional closer','~1 in 4 shows'],
            {optional:true}));
    }

    // Formal Closing (always fixed)
    slots.push(mkSlot(null,'formal-closing',true,
        ['formal closing','announcements'],
        {displayName:'Formal Closing / Announcements',
         displayDesc:'Host thanks the audience, announces upcoming shows and classes.'}));

    return {mode:'show',label:'Show',duration:'~75 min',slots};
}

// ═══════════════════════════════════════════
// REGENERATE SLOT
// ═══════════════════════════════════════════
function regenSlot(idx) {
    if (!state.lineup) return;
    const slot = state.lineup.slots[idx];
    if (!slot||slot.locked) return;
    const mode = state.lineup.mode;
    const used = new Set(state.lineup.slots
        .filter((s,i)=>i!==idx&&s.activity).map(s=>s.activity.id));
    const st = slot.slotType;
    let newAct=null, newTags=[];

    if (st==='capstone') {
        const opts=['3-line-scenes','i-am-a-tree'].filter(id=>!used.has(id));
        if (opts.length) { newAct=getById(opts[Math.floor(Math.random()*opts.length)]); newTags=['capstone','scene work','beginner-eligible']; }
    } else if (st==='closer'&&mode==='beginner') {
        const opts=['five-things','name-game'].filter(id=>!used.has(id));
        if (opts.length) { newAct=getById(opts[Math.floor(Math.random()*opts.length)]); newTags=['class closer','high energy','group support']; }
    } else if (st==='guessing') {
        const opts=SHOW_GG.filter(id=>!used.has(id)); shuffle(opts);
        if (opts.length) { newAct=getById(opts[0]); newTags=['required guessing game','audience-readable','host structure']; }
    } else if (st==='longform') {
        const pool=(mode==='show'?SHOW_LF:ADVANCED_LF).filter(id=>!used.has(id)); shuffle(pool);
        if (pool.length) { newAct=getById(pool[0]); newTags=['required long-form','ensemble tracking']; }
    } else if (st==='filler') {
        const opts=SHOW_FILLER.filter(id=>!used.has(id)); shuffle(opts);
        if (opts.length) { newAct=getById(opts[0]); newTags=['filler','cut if running long']; }
    } else if (st==='early'||st==='mid'||st==='late'||st==='circle') {
        const tierMap = {'early':'Early','mid':'Mid','late':'Late','circle':null};
        const tier = tierMap[st];
        const p=ACTIVITIES.filter(a=>{
            if(used.has(a.id))return false;
            const s=a.metadata.beginnerClassSuitability||'';
            return tier ? s===tier : ['Early','Mid','Late'].includes(s);
        }); shuffle(p);
        if(p.length){newAct=p[0];newTags=autoTags(p[0],'beginner');}
    } else if (st==='warmup') {
        const ADV_SK=new Set(['jesses-opening-meditation','zip-zap-zop','five-things']);
        const p=ACTIVITIES.filter(a=>{
            if(used.has(a.id)||ADV_SK.has(a.id))return false;
            return (a.metadata.advancedClassSuitability||'')==='Warmup';
        }); shuffle(p);
        if(p.length){newAct=p[0];newTags=autoTags(p[0],'advanced');}
    } else if (st==='skills') {
        const p=ACTIVITIES.filter(a=>{
            if(used.has(a.id))return false;
            return (a.metadata.advancedClassSuitability||'')==='Exercise';
        }); shuffle(p);
        if(p.length){newAct=p[0];newTags=autoTags(p[0],'advanced');}
    } else if (st==='shortform'||st==='opener') {
        const isS=mode==='show';
        const p=ACTIVITIES.filter(a=>{
            if(used.has(a.id))return false;
            if(isS) return isShowElig(a)&&a.category==='Short Form'&&!SHOW_GG.includes(a.id)&&!SHOW_LF.includes(a.id)&&!SHOW_FG.includes(a.id);
            return (a.metadata.advancedClassSuitability||'')==='Shortform';
        }); shuffle(p);
        if(p.length){newAct=p[0];newTags=autoTags(p[0],isS?'show':'advanced');}
    }

    if (newAct) {
        state.lineup.slots[idx] = mkSlot(newAct, st, false, newTags);
        renderLineup();
        buildPrint();
    }
}

// ═══════════════════════════════════════════
// ACTIVITY PICKER
// ═══════════════════════════════════════════
let _pickerIdx = -1;
let _pickerPool = [];

function getPickerPool(idx) {
    if (!state.lineup) return [];
    const slot = state.lineup.slots[idx];
    if (!slot || slot.locked) return [];
    const mode = state.lineup.mode;
    const st = slot.slotType;
    const used = new Set(state.lineup.slots
        .filter((s,i) => i !== idx && s.activity).map(s => s.activity.id));

    let pool = [];

    if (st === 'capstone') {
        pool = ['3-line-scenes','i-am-a-tree'].map(getById).filter(Boolean);
    } else if (st === 'closer' && mode === 'beginner') {
        pool = ['five-things','name-game'].map(getById).filter(Boolean);
    } else if (st === 'guessing') {
        pool = SHOW_GG.map(getById).filter(Boolean);
    } else if (st === 'longform') {
        pool = (mode === 'show' ? SHOW_LF : ADVANCED_LF).map(getById).filter(Boolean);
    } else if (st === 'filler') {
        pool = SHOW_FILLER.map(getById).filter(Boolean);
    } else if (st === 'formal-opening' || st === 'formal-closing' || st === 'conducted-song') {
        return []; // not replaceable
    } else if (st === 'early' || st === 'mid' || st === 'late' || st === 'circle') {
        const tierMap = {'early':'Early','mid':'Mid','late':'Late','circle':null};
        const tier = tierMap[st];
        pool = ACTIVITIES.filter(a => {
            const s = a.metadata.beginnerClassSuitability||'';
            return tier ? s === tier : ['Early','Mid','Late'].includes(s);
        });
    } else if (st === 'warmup') {
        const skip = new Set(['jesses-opening-meditation','zip-zap-zop','five-things']);
        pool = ACTIVITIES.filter(a => {
            if (skip.has(a.id)) return false;
            return (a.metadata.advancedClassSuitability||'') === 'Warmup';
        });
    } else if (st === 'skills') {
        pool = ACTIVITIES.filter(a => (a.metadata.advancedClassSuitability||'') === 'Exercise');
    } else if (st === 'shortform' || st === 'opener') {
        const isS = mode === 'show';
        pool = ACTIVITIES.filter(a => {
            if (isS) return isShowElig(a) && a.category === 'Short Form'
                && !SHOW_GG.includes(a.id) && !SHOW_LF.includes(a.id) && !SHOW_FILLER.includes(a.id);
            return (a.metadata.advancedClassSuitability||'') === 'Shortform';
        });
    } else {
        // Fallback: all eligible for current mode
        pool = ACTIVITIES.filter(a => mode==='beginner' ? isBeginnerElig(a) :
            mode==='advanced' ? isAdvancedElig(a) : isShowElig(a));
    }

    // Sort by name, mark current
    pool.sort((a,b) => a.name.localeCompare(b.name));
    return pool;
}

function showPicker(idx, event) {
    event.stopPropagation();
    const picker = document.getElementById('activity-picker');

    // Toggle off if same slot
    if (_pickerIdx === idx && picker.classList.contains('open')) {
        closePicker(); return;
    }

    _pickerIdx = idx;
    _pickerPool = getPickerPool(idx);
    document.getElementById('picker-search').value = '';
    renderPickerList('');

    // Position: bottom sheet on mobile, near-button on desktop
    const btn = event.currentTarget;
    const rect = btn.getBoundingClientRect();
    if (window.innerWidth <= 640) {
        // Mobile: anchor to bottom of screen as a sheet
        picker.style.top = 'auto';
        picker.style.bottom = '8px';
        picker.style.left = '8px';
        picker.style.width = (window.innerWidth - 16) + 'px';
        picker.style.maxHeight = '52vh';
    } else {
        // Desktop: drop down (or flip up) near the button
        picker.style.bottom = 'auto';
        picker.style.width = '240px';
        picker.style.maxHeight = '280px';
        let top = rect.bottom + 4;
        if (top + 280 > window.innerHeight) top = rect.top - 284;
        picker.style.top = Math.max(4, top) + 'px';
        let left = rect.left;
        if (left + 240 > window.innerWidth - 8) left = window.innerWidth - 248;
        picker.style.left = Math.max(4, left) + 'px';
    }
    picker.classList.add('open');

    setTimeout(() => document.getElementById('picker-search').focus(), 50);
}

function renderPickerList(query) {
    const list = document.getElementById('picker-list');
    const current = state.lineup && state.lineup.slots[_pickerIdx] && state.lineup.slots[_pickerIdx].activity;
    const currentId = current ? current.id : null;
    const q = query.toLowerCase();
    const filtered = _pickerPool.filter(a =>
        !q || a.name.toLowerCase().includes(q) ||
        (a.coreSkills||[]).join(' ').toLowerCase().includes(q)
    );
    if (!filtered.length) {
        list.innerHTML = '<div id="picker-empty">No matches</div>';
        return;
    }
    list.innerHTML = filtered.map(a =>
        `<div class="pick-item${a.id===currentId?' current':''}" onclick="pickActivity(${_pickerIdx},'${a.id}')">${a.name}</div>`
    ).join('');
}

function pickActivity(idx, id) {
    const a = getById(id);
    if (!a || !state.lineup) return;
    const slot = state.lineup.slots[idx];
    if (!slot) return;
    state.lineup.slots[idx] = mkSlot(a, slot.slotType, false,
        autoTags(a, state.lineup.mode));
    closePicker();
    renderLineup();
    buildPrint();
}

function closePicker() {
    _pickerIdx = -1;
    document.getElementById('activity-picker').classList.remove('open');
}

// Close picker on outside click
document.addEventListener('click', e => {
    const picker = document.getElementById('activity-picker');
    if (picker && picker.classList.contains('open') && !picker.contains(e.target)) {
        closePicker();
    }
});

// ═══════════════════════════════════════════
// GENERATE + RENDER LINEUP (SCREEN)
// ═══════════════════════════════════════════
function generateLineup(mode) {
    if (mode==='beginner') state.lineup=genBeginner();
    else if (mode==='advanced') state.lineup=genAdvanced();
    else state.lineup=genShow();

    ['beginner','advanced','show'].forEach(m=>{
        document.getElementById('btn-'+m).classList.toggle('active',m===mode);
    });
    renderLineup();
    buildPrint();
}

function slotLabel(st, mode) {
    const sfLabel = mode==='show' ? 'Short Form' : 'Short Form / Technical Reps';
    return {opening:'Opening',warmup:'Warmup',circle:'Circle Games / Exercises',
        skills:'Exercises',capstone:'Capstone',closer:'Closer',shortform:sfLabel,
        longform:'Long Form',guessing:'Guessing Game',final:'Show Closer',
        opener:'Show Opener','formal-opening':'Opening'}[st]||st;
}

function renderLineup() {
    if (!state.lineup) return;
    const {label,duration,slots} = state.lineup;
    let num=0; let lastSection='';
    const html = slots.map((s,i)=>{
        const a=s.activity;
        if (a||s.displayName) num++;
        const name = a?a.name:s.displayName;
        const desc = a?(a.metadata.bestUse||''):(s.displayDesc||'');
        const tags = s.reasonTags||[];
        const sec = slotLabel(s.slotType, state.lineup.mode);
        let sectionHdr = '';
        if (sec!==lastSection) { sectionHdr=`<div style="font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin:8px 0 4px;">${sec}</div>`; lastSection=sec; }
        return sectionHdr+`<div class="lineup-slot slot-${s.slotType}">
            <div class="slot-number">${num}</div>
            <div class="slot-body">
                ${a ? `<div class="slot-name slot-name-link" onclick="openActivityModal('${a.id}')">${name}</div>` : `<div class="slot-name">${name}</div>`}
                ${desc?`<div class="slot-desc">${desc}</div>`:''}
                <div class="slot-tags">${tags.map(t=>`<span class="reason-tag">${t}</span>`).join('')}</div>
            </div>
            <div class="slot-actions">${!s.locked?`<button class="regen-btn" onclick="regenSlot(${i})" title="Random swap">↺</button><button class="pick-btn" onclick="showPicker(${i},event)" title="Pick a game">Pick ▾</button>`:'<span class="locked-icon">🔒</span>'}</div>
        </div>`;
    }).join('');

    document.getElementById('lineup-display').innerHTML = `
    <div class="lineup-header">
        <div class="lineup-title-row"><h2>${label}</h2><span class="lineup-duration">${duration}</span></div>
        <button class="print-btn" onclick="window.print()">🖨 Print Lineup</button>
        ${(state.lineup && (state.lineup.mode==='show' || state.lineup.mode==='custom-show')) ? '<button class="print-btn" onclick="printSetList()" style="margin-left:6px">🎭 Print Set List</button>' : ''}
    </div>
    <div class="lineup-slots">${html}</div>`;
}

// ═══════════════════════════════════════════
// PRINT PANELS
// ═══════════════════════════════════════════
const MED_BEATS = [
    'Breath from belly · eyes closed · grounding cord to earth · feel your energy',
    'Body scan — toes → legs → torso → shoulders → head → fingertips',
    'Agreements: Take a risk · Release judgment of others · Release judgment of self',
    '3 rounds: inhale → hands high → exhale with audible sigh · open eyes'
];

// Game Reference lists — derived dynamically from ACTIVITIES dataset
const _bycat = cat => ACTIVITIES.filter(a=>a.category===cat).map(a=>a.name).sort();
const REF5 = {
    'Warmups': ACTIVITIES.filter(a=>a.category==='Warmups'&&a.id!=='jesses-opening-meditation').map(a=>a.name).sort(),
    'Closers': _bycat('Closers'),
    'Scene & Character': _bycat('Exercises')
};
const REF_GUESSING = SHOW_GG.map(id=>{ const a=ACTIVITIES.find(x=>x.id===id); return a?a.name:null; }).filter(Boolean);
const REF_SF = ACTIVITIES.filter(a=>a.category==='Short Form'&&!SHOW_GG.includes(a.id)).map(a=>a.name).sort();
const REF_LF = _bycat('Long Form');

function buildPrint() {
    if (!state.lineup) return;
    const {label,duration,slots} = state.lineup;
    const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

    // Number all slots
    let n=0;
    slots.forEach(s=>{ if(s.activity||s.displayName) s._n=++n; else s._n=0; });

    const allSlots = slots.filter(s=>s._n);

    function actHtml(s) {
        const a=s.activity;
        const name=a?a.name:s.displayName;
        const isMed = a&&a.id==='jesses-opening-meditation';
        const isZZZ = a&&a.id==='zip-zap-zop';
        let h=`<div class="pp-activity"><div class="pp-activity-name">${s._n}. ${name}</div>`;
        if (isMed) {
            MED_BEATS.forEach(b=>h+=`<div class="pp-activity-desc">${b}</div>`);
            h+=`<div class="pp-activity-tags">presence · risk readiness · class container · 5–10 min</div>`;
        } else if (isZZZ) {
            h+=`<div class="pp-activity-desc">Standard → move quickly to reverse or phonetic variant</div>`;
            h+=`<div class="pp-activity-tags">focus · eye contact · speed · variant-ready · 3–10 min</div>`;
        } else {
            const m=a?a.metadata:{};
            const desc=a?(m.bestUse||''):(s.displayDesc||'');
            if(desc) h+=`<div class="pp-activity-desc">${desc}</div>`;
            const tags=(s.reasonTags||[]).slice(0,4);
            if(tags.length) h+=`<div class="pp-activity-tags">${tags.join(' · ')}</div>`;
        }
        h+=`</div>`;
        return h;
    }

    // PANEL 1: all lineup slots flow naturally across two CSS columns
    const mode = state.lineup.mode;
    const sfLabel = mode==='show' ? 'Short Form' : 'Short Form / Technical Reps';
    const SEC_MAP={opening:'Opening',warmup:'Warmup',circle:'Circle Games',
        skills:'Exercises',shortform:sfLabel,longform:'Long Form',
        capstone:'Capstone',closer:'Closer',
        guessing:'Guessing Game',opener:'Short Form',final:'Show Closer',
        'formal-opening':'Opening'};
    let p1=`<div class="pp-title">${label} · ${today}</div>`;
    p1+=`<div class="pp-subtitle">Flying Pig Improv · ${duration}</div>`;
    let lastSec='';
    allSlots.forEach(s=>{
        const sec=SEC_MAP[s.slotType]||s.slotType;
        if(sec!==lastSec){
            if(lastSec) p1+=`<div class="pp-divider">— ${sec} —</div>`;
            lastSec=sec;
        }
        p1+=actHtml(s);
    });

    // SECTION 2: Skill Focus — all activities flow across 2 CSS columns
    const allActs = allSlots.filter(s=>s.activity);
    let p2=`<div class="pp-title">Skill Focus</div>`;
    allActs.forEach(s=>{
        const a=s.activity;
        const skills=(a.coreSkills||[]).join(' · ');
        const bu=a.metadata.bestUse||'';
        const av=a.metadata.avoidWhen||'';
        const generic=av.startsWith('Needs Review only');
        p2+=`<div class="pp-look-row"><div class="pp-look-game">${s._n}. ${a.name}</div>`;
        p2+=`<div class="pp-look-cues">${skills}`;
        const showBU = bu && bu!=='Warmup group focus, energy, and technical readiness'
            && bu!=='Skill-building reps before heavier scene or show work'
            && bu!=='Practice/show piece when matching skills are the lesson or format need'
            && bu!=='Positive class exit / group support';
        if(showBU) p2+=` · ${bu}`;
        if(!generic&&av) p2+=`<span class="pp-avoid"> · Avoid: ${av}</span>`;
        p2+=`</div></div>`;
    });

    // SECTION 3: Game Reference — flat list flows across 2 CSS columns
    let p3=`<div class="pp-title">Game Reference</div>`;
    // Warmups + Closers + Scene & Character
    Object.entries(REF5).forEach(([cat,games])=>{
        p3+=`<div class="pp-ref-cat">${cat}</div>`;
        games.forEach(g=>p3+=`<div class="pp-ref-game">${g}</div>`);
    });
    // Short Form (guessing games excluded)
    p3+=`<div class="pp-ref-cat">Short Form</div>`;
    REF_SF.forEach(g=>p3+=`<div class="pp-ref-game">${g}</div>`);
    // Guessing Games
    p3+=`<div class="pp-ref-cat">Guessing Games</div>`;
    REF_GUESSING.forEach(g=>p3+=`<div class="pp-ref-game">${g}</div>`);
    // Long Form
    p3+=`<div class="pp-ref-cat">Long Form</div>`;
    REF_LF.forEach(g=>p3+=`<div class="pp-ref-game">${g}</div>`);

    document.getElementById('pp1').innerHTML = p1;
    document.getElementById('pp2').innerHTML = p2;
    document.getElementById('pp3').innerHTML = p3;
    ['pp4','pp5','pp6'].forEach(id=>{ const el=document.getElementById(id); if(el) el.innerHTML=''; });
}
